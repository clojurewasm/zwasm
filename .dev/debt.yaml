      blocked-by: a **moving/compacting collector OR AOT GC-root serialization (§12.5)** — the precise `zir.GcRootMap` stack-map walker is the residual gap. **2026-06-04 UPDATE (§15.1 close, ADR-0148): GC reclamation + the CONSERVATIVE native-stack rooting LANDED (`be4357be`; ADR-0146/0147) — a non-moving collector needs only the conservative scan (ADR-0128 §2), so reclamation is now correctness-complete WITHOUT precise GcRootMap. The precise walker is carved out of §15.1; it becomes load-bearing only for a moving collector (pointer relocation) or §12.5 AOT `.cwasm` GC-root serialization, neither committed. JIT-trampoline collection trigger split to D-258.** **2026-06-03 RE-SEQUENCE (ADR-0135): the rooting part (ex-§11.4) moved from Phase 11 to Phase 15, paired with GC reclamation. Rooting is untestable until reclamation frees objects (a missed root can only UAF post-reclaim; the Phase-10 collector is β no-reclaim, `collector_mark_sweep.zig:214`), reclamation was unowned by any phase, and rooting is NOT a §11.P exit criterion. The residual GC-op-emit gap (no `struct*`/`array*`/`ref_cast`/`ref_test` JIT emit file → interp-only) stays noted here, independent of rooting.** **2026-06-03 UPDATE (Phase-10 close): the §10.G JIT GC op-emit is DONE — the gc spec corpus is GREEN under `ZWASM_SPEC_ENGINE=jit` (402/0/5); the "GC is the ONLY Wasm-3.0 proposal the JIT does not emit" framing below is STALE (kept as history). Only precise rooting / stack-map walk is deferred, and that is SAFE (non-moving + β no-reclaim ⇒ a missed root can't UAF). NOT a §10 blocker.** (Historical:) GC-on-JIT codegen was the headline 10.G deliverable, once thought **required by the §10 exit criterion** ("all proposals' spec tests pass on BOTH backends" — ROADMAP §10 / line ~1331). The close-invariant I16 SKIP ("regalloc 3-axis JIT-side work; deferred to 10.E/G JIT") CONTRADICTS that exit criterion, and the spec corpus runs interp-only (`instance.invoke`), so "both backends" is unmet + unverified for GC. Open as its own bundle (handover Active task; **ADR-0128 Accepted = implement to 100% on both backends**). **Difficulty corrected (ADR-0128 §2)**: NON-moving collector + β no-reclamation ⇒ deferred rooting is SAFE → this is op-emit (same shape as the landed EH/TC op files), NOT the regalloc-3-axis stack-map work I16 implied (that is the moving-collector path zwasm does not take). | **GC is the ONLY Wasm-3.0 proposal the JIT does not emit.** `codegen/{arm64,x86_64}/ops/wasm_3_0/` emits tail-call (`return_call{,_indirect,_ref}`) + function-references (`br_on_null`/`br_on_non_null`/`ref_as_non_null`/`call_ref`) + EH (`throw`/`throw_ref`/`try_table`), all `runI32Export`-verified (cyc232-233). i31 (`ref.i31`/`i31.get_s`/`i31.get_u`) now emits on BOTH arches (cyc245-246, `runI32Export`-verified); there is still NO `struct*`/`array*`/`ref_cast`/`ref_test`/`gc*` emit file in `codegen/` → those GC ops run interp-only (legacy `_dispatch.run` switch). The spec corpus ITSELF runs via the INTERPRETER (`instance.invoke`→`_dispatch.run`, `src/zwasm/instance.zig:169`), so the green gc corpus is INTERP coverage; `test-realworld-run-jit` SKIPs `needs_gc_heap` (`build.zig:69-71`). Per ADR-0128 §2 the rooting is DEFERRED (non-moving + β no-reclaim ⇒ a missed root can't use-after-free; conservative native-stack scan lands with Phase-11 reclamation, ZERO codegen change). Per-op lowering recipe in ADR-0128 §2 (struct/array = base+field_off load/store; ref.cast/test = Cohen supertype-vector display with the load-bearing `n1>=n2` guard per CVE-2024-4761; i31 = tag `(v<<1) | 1`). Discharge: `op_gc` emit handlers both arches (struct.new/get/set, array.new/get/set/len, ref.cast/test, i31, ref.eq) + GC modules green through the **spec-corpus JIT execution mode** (ADR-0128 §1) + I16 flips PASS. Multi-cycle → its own bundle.
