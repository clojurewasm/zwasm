    layer: "code"
    status: "note"
    description: |-
      MOSTLY RESOLVED @51bafd5f6 — the single-byte ABSTRACT reftypes (anyref 0x6E /
      eqref 0x6D / i31ref 0x6C / structref 0x6B / arrayref 0x6A / exnref 0x69 + null{,extern,
      func,exn}ref 0x71-0x74) now validate (opSelectTyped) + lower (lower.zig 0x1c) + JIT-exec on
      BOTH arches (arm64 select emit routes reftypes→gpr64, x86_64 default already 64-bit; fixture
      select_typed_gcref=7; wasm-3.0-assert all-pass). RESIDUAL (low-pri): typed-ref `(ref ht)` /
      `(ref null ht)` operands (0x63/0x64 + heaptype index) — doesn't fit select_typed's single-byte
      `extra` encoding (the heaptype index would be lost); needs threading the heaptype through the
      select_typed ZIR encoding. Extremely rare (concrete typed-ref in select); no toolchain emits it.
      ORIGINAL: typed select accepted only i32/i64/f32/f64/v128/funcref/externref.
      Per Wasm spec §3.3.2.2 `select t` admits ANY valtype. Surfaced while closing
      D-491 (typed-select-v128): `opSelectTyped` (validator.zig:3041) + `lower.zig:354`
      hand-roll PARTIAL valtype-byte switches that diverge from the canonical
      `parse/init_expr.zig:readValType` (which handles all GC reftypes). あるべき論 fix =
      route both through readValType (or a shared subset) instead of the hand-rolled copy.
      CODEGEN GOTCHA (verified, latent — not active since the validator rejects today):
      the arm64 select dispatch (emit.zig:1277) maps only i64/funcref/externref → gpr64;
      all OTHER bytes fall to `else => .gpr32` — a GC reftype would TRUNCATE the 64-bit
      reference. So the fix MUST add the GC reftype bytes to the gpr64 arm on BOTH arches
      (arm64 emit.zig:1278 + x86_64 emitSelectCtx ref-width) + a fixture. VERY LOW PRIORITY:
      no toolchain emits typed-select with a GC ref (even typed-select-v128 was niche; refs
      are select-able but compilers use untyped 0x1b / control flow). Discharge predicate:
      a `(select (result anyref) ...)` fixture validates + lowers + JIT-executes without
      ref truncation on both arches.
