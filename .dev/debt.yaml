    description: |-
      blocked-by: no corpus fixture exercises distinct-layout cross-module func import matching (the spec cross-module subtype corpus duplicates type defs, so importer + exporter share a type space). Discharge: extend cyc192's `validator.funcTypeImportCompatible` + `checkImportTypeMatches` to compare the source sig's CONCRETE-ref indices against the importer's via a cross-module STRUCTURAL canonical compare (resolve each side in its OWN `Types`), not by reusing the importer's `types` for both. Exporter types are reachable via `source_rt` (`Runtime.module_types` + `gc_type_infos.canonical_ids`), but the rec-group structure for `canonicalEqual`-across-two-`Types` is not threaded into the `cross_module` binding. | **PHASE A LANDED cyc236 (`38bb0e0e`, ubuntu-verified)**: the C-API Linker positive direction — `linker.zig` cross_module_func arm now uses `funcTypeImportCompatible` (subtyping) not exact `sigEqual`, so `.30/.48/.50` instantiate (cyc192 had fixed only the `instantiate.zig` path, but the spec runner links via the C-API Linker). **PHASE B remaining = the FINALITY direction** (`.35/.36/.42/.52/.54` assert_unlinkable, counted fail=5): the linker must reject when the importer's declared type is FINAL but the exporter's is open `(sub …)`. **PHASE B-finality LANDED cyc239**: `ExportType.func` widened to `ExportFuncType{ sig, final }` (finality captured in `buildExportTypes` where the parse-time `Types.finals` is in scope); `CrossModuleFuncEntry.source_final` threaded via `defineCrossModuleFunc`; the linker cross_module_func arm now rejects a FINAL import (`module_types.finals[typeidx]`) resolving against an open exporter (`!source_final`). **assert_unlinkable 5→4** (one fixture correctly rejected), no regression (gc 349/96/60 unchanged, `.30/.48/.50` still link). **PHASE C remaining = the other 4 assert_unlinkable**: they differ by DECLARED-SUPERTYPE / cross-module canonical type-identity, NOT just the finality bool. cyc240 fixture inspection: `.36` is the OPPOSITE direction of `.35` — importer imports as OPEN `(sub (func))` (type 0) but the exporter provides a structurally-identical-yet-distinct type-def, so `funcTypeImportCompatible` passes the param/result structure while `$E` is NOT `<: $I` by declared-supertype/canonical. So the finality-bool check (cyc239) was insufficient by construction (it only fires when the IMPORTER is final). PHASE C = the FULL import-type check: `$E <: $I` iff canonically-equal OR the exporter type declares the import type in its supertype chain — needs threading the exporter's supertype chain + a cross-`Types` `canonicalEqual` across the two modules' type spaces. REGRESSION-RISKY (a naive type-index compare breaks the green distinct-layout multi-mem/EH cross-module imports per the note below). **Design drafted: ADR-0127 (Proposed, cyc241)** — the rule is `funcTypeImportCompatible` (structural, PHASE A) AND type-def compatibility (`canonicalEqual` cross-`Types` OR supertype-reach), threading the exporter's typeidx+supertypes like PHASE B-finality threaded `final`; no-regression set = multi-mem 407 + EH 34 + `.30/.48/.50`. Impl per the ADR in a fresh-context cycle (or after user-Accept given the regression risk). **cyc192 cross-module import subtyping uses a same-typespace simplification** (monotonic-safe, corpus-correct): `funcTypeImportCompatible(want, src, importer_types)` interprets the source FuncType's concrete-ref indices in the IMPORTER's type space. Correct + verified for .30/.48/.50 (duplicate type defs ⇒ index-aligned). A hypothetical importer declaring an import type subtype-compatible-yet-structurally-laid-out-differently from the exporter would be mis-judged; no fixture exercises this. **cyc193 CONCRETE evidence** (assert_unlinkable now implemented): gc/type-subtyping `.35/.36/.42/.52/.54` (5) WRONGLY LINK — they import a func under a type that differs only in FINALITY / type-definition identity (e.g. .35 imports M2.f1 actual type0 `(sub (func))` open AS type1 `(func)` final; identical `()->()` sig). `funcTypeImportCompatible` compares flattened param/result STRUCTURE (matches) but not type-definition identity (finality + declared supertype + canonical), so it accepts what the spec rejects. Fixing needs the source func's TYPE INDEX (+ finality) threaded into the `cross_module` binding, then a type-identity check — but a naive type-index compare would REGRESS the distinct-layout multi-mem/EH cross-module imports (their importer/exporter type indices don't align), so it requires the SAME cross-module canonical comparison as the distinct-layout gap above. The 3 `.31/.32/.33` that correctly reject have CONCRETE-result-ref mismatches `funcTypeImportCompatible` already catches. Discharge fixes both facets: cross-module structural canonical type-def comparison (incl. finality).
