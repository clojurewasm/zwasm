      **x86_64 regalloc v128-spill OOB ‚ÄĒ FIXED 2026-06-16 (ADR-0194 rework, Phase I-V)**. Root was THREE
      inconsistent spill-frame origins: mint `max(gpr,fp)` / `spill_offsets` sizing hardcoded `max_reg_slots_gpr_default=8`
