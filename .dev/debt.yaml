    description: |-
      note (D-244 JIT-WASI retrospective follow-up): **PHASE-B ANCHOR of the 2026-06-14 real-world reproduction
      agenda — see `.dev/realworld_reproduction_plan.md`.** Live signal (cljw-excluded, `ZWASM_JIT_RUN=1` on the
      50-fixture corpus 2026-06-14): interp 55/55 but JIT 35 pass / **6 RUN-TRAP** (tinygo_{fib,hello,json,sort},
      rust_file_io, c_sha256_hash — interp-passes ⇒ JIT miscompile/WASI-gap) / **9 COMPILE-OP** (all go_* —
      UnsupportedOp ⇒ unimplemented JIT op). Triage+fix per the plan.
      ---
      **TRIAGE FINDING 2026-06-14 — the "RUN-TRAP" premise was WRONG.** The 12 RUN-TRAP (current 56-fixture corpus)
      are NOT JIT miscompiles: `run_runner_jit.zig`'s run stage invokes `_start` via `engine.runner.runVoidExport`
      → `runVoidExportWasi(.., wasi_host=NULL, ..)` — i.e. it runs the JIT-compiled program with **NO WASI host**, so
      any fixture that reaches a WASI call (`fd_write`/`proc_exit`) mid-run traps. Proven: the WASI-aware CLI path
      `zwasm run --engine jit <fixture>` runs BOTH `emcc_primes` and `tinygo_sort` (sampled from the trap set)
      CORRECTLY (right stdout, exit 0), consistently. So the JIT compiles AND executes these fine; the harness just
      lacks a WASI host. DISCHARGE (per this row's own text): add a **`--jit` lane to `diff_runner.zig`** (mirror the
      landed `--aot`/`--wasmer` lanes) that runs each fixture via the WASI-aware JIT path + byte-diffs stdout vs
      wasmtime — the real JIT-correctness net. The 9 COMPILE-OP (go_* UnsupportedOp) remain genuine unimplemented-op
      gaps (separate, real).
      ---
      **LANE LANDED 2026-06-15 `219dbd17`** (`zig build test-realworld-diff-jit`; `runWasmJitCaptured`). REAL signal
      replacing the false 12-trap framing: **`diff_runner [jit]: 45/56 matched vs wasmtime, 2 mismatched, 9 skipped`**.
      So the true remaining JIT work is precise: (A) **2 genuine JIT miscompiles** — `c_sha256_hash` (wasmtime 107B /
      jit 91B) + `emcc_fasta` (154B / 87B); interp byte-matches wasmtime, JIT emits SHORT/wrong output ⇒ a real
      codegen bug (next: root-cause via debug_jit_auto — bundle B2). (B) **9 `go_*` UnsupportedOp** compile-gaps
      (unimplemented JIT op at a specific func) — discharge predicate clear, file/fix per-op. Lane stays REPORT-ONLY
      until (A)+(B) clear, then gates. **CLEARED 2026-06-20 → 56/56 matched, lane now GATING @3b6f8d5b5.** (A): both
      c_sha256 (D-330 liveness) + emcc_fasta now byte-match. (B): the 9 go_* were NOT compile-gaps (they compile)
      but exit-HANGS — JIT proc_exit didn't terminate (D-468/ADR-0199 post-call trap_flag check); all 9 now exit
      rc=0 + match wasmtime. `diff_runner [jit]` fails on any byte mismatch. JIT-lane reason for `note` discharged;
      only the AOT-subprocess-lane note (below) remains. — the realworld WASI corpus is NOT exercised
      end-to-end under
      `--engine jit`. `test/realworld/run_runner_jit.zig` compiles the fixtures via JIT (46/55 compile-pass) but its
      RUN stage is OPT-IN (`ZWASM_JIT_RUN=1`, default-off) — so the new full-46 JIT WASI surface (D-244,
      `wasi/jit_dispatch.zig` + `cli/run.zig runWasmJit`) is verified by per-syscall unit tests + a handful of
      runWasmJit smoke tests, NOT by running real programs (c_hello_wasi / tinygo / rust) under the JIT and
      byte-diffing stdout against wasmtime like the interp `diff_runner` does. DISCHARGE: run the corpus with
      `ZWASM_JIT_RUN=1`, triage failures (some fixtures use ops the JIT can't yet compile — separate from WASI), and
      either enable the JIT run stage by default for the runnable subset OR a JIT variant of `diff_runner` that
      stdout-diffs `--engine jit` vs wasmtime. Confidence is currently good (3-host green + interp handlers reused)
      but this is the missing differential net. Not blocking — D-244 is functionally complete + 3-host green.
      ---
      AOT update (2026-06-05, `a81a388e`+`d7e3f131`): an opt-in **AOT** differential lane landed
      (`test-realworld-diff-aot`; `diff_runner.zig --aot`, <64KB fixture cap). Result: **AOT byte-matches wasmtime
      on 7/7 runnable fixtures, 0 MISMATCH-AOT** — the AOT-WASI differential net now EXISTS for the small corpus.
      REMAINING (why this stays a note): (1) the in-process lane can't per-fixture-timeout slow JIT-compiles, so
      large libc/Go/Rust guests are SKIP-AOT-LARGE — a **subprocess-based** lane (`zwasm run <.cwasm>` per fixture,
      like wasmtime) would cover them + isolate native exec; (2) the symmetric JIT lane (above) is still opt-in.
