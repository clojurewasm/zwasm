    status: "blocked-by"
    description: |-
      **2026-06-04 RECURRENCE FLAG (session retrospective): the "MOV-install cohort WITHOUT prologue stack-save"
      convention (ADR-0017 sub-2d-ii) is a recurring root cause — it has now generated callee-saved-preservation
      bugs at FOUR seams: D-142 + D-206 (cross-module bridge), D-210 (frame-consuming tail-call, this row), and
      D-245 (host→JIT, fixed 2026-06-04 by yet another per-seam patch — the clobber-trampoline `510ffce9`). Each
      was patched at the SEAM rather than at the root. This row IS the root fix (prologue cohort stack-save). The
      structural decision to make consciously: either SCHEDULE the root fix (D-210) — after which D-245's
      trampoline + the cross-module bridge could simplify AND frame-consuming cross-module tail-calls become
      legal — OR accept "perpetual per-seam patching" as policy + document that every NEW host→JIT / cross-rt
      emit path must add its own cohort save. Do not let it silently stay deferred forever; pick one. See
      [[2026-06-04-session-retrospective-structural-risks]].** blocked-by: arm64 prologue MOV-installs the pinned cohort (X19 + X24-X28) from the rt rather than stack-saving it (ADR-0017 sub-2d-ii), so a frame-consuming cross-module tail-jump (`BR X16` to a different-rt callee) corrupts a same-module grand-caller's cohort — the callee can't restore values it never saved. Discharge: add a prologue cohort stack-save (Option B of `abi_callee_saved_pinning.md`) on arm64, after which `frame_teardown` can restore the cohort before `BR X16` and both arches adopt the frame-consuming path. ADR-grade + multi-cycle (touches every prologue/epilogue + all emit byte-snapshot tests + a perf tradeoff vs the MOV-install convention); its own bundle when scheduled. | **Cross-module `return_call` is call-and-return, NOT proper-tail-call** (ADR-0112 Amendment 2026-05-30, landed D-206 step 2). The cross-module path lowers to `call $import` (via the ADR-0066 cohort-preserving bridge thunk) + epilogue + RET: cohort-correct on both arches, results correct, but A's frame stays live across the call → unbounded *cross-module* mutual tail-recursion grows the native stack (eventually overflows) instead of constant space. Same-module `return_call` stays proper-tail-call (frame consumed). x86_64's per-frame R15 save would permit a frame-consuming `JMP R11` today, held back only for cross-arch consistency. Result-correct + cohort-safe for all terminating programs; only deep cross-module tail recursion is affected. Preventive guard: `runner.zig` "same-module grand-caller's cohort survives → mem[0]=99".
