      SLICE-4c DONE (`8980bebe`): the 4 core GC accessors (struct.get/set + array.get/set) ‚ÄĒ null-deref ‚Üí code 10
      null_reference; array index OOB ‚Üí code 6 oob_memory (the interp raises OutOfBoundsLoad/Store for array
