  - id: "D-293"
    layer: "code"
    status: "partial"
    description: |-
      note (2026-06-06; spun out of D-292 A3): the JIT `bounds_fixups` channel is a generic catch-all that
      multiplexes MANY trap kinds, not just oob_memory. D-292 A1‚ÄďA3 demuxed the common 4 (unreachable / div /
      overflow / oob_memory). STILL-GENERIC (report "kind not yet distinguished" on JIT/AOT, a v1/interp-parity
      gap): oob_table (op_table.zig table.get/set/copy/init + call_indirect bounds), invalid_conversion +
      trunc int_overflow (op_convert.zig / arm64 bounds_check.zig float‚Üíint trap), null_reference
      (ref.as_non_null, struct/array null deref, call_ref null), cast_failure (ref.cast / i31.get), array_oob
      (array.get/set/fill/copy/init/new_*). A per-site classification table exists (the A3 survey). The clean
      fix is a KINDED-FIXUP REFACTOR: replace `bounds_fixups: ArrayList(u32)` with a kinded list (byte+kind) or
      add a per-kind channel each, route every append to its kind, emit one stub per kind. ~50 sites across both
      arches ‚Üí an architectural/rework-style chunk, NOT a quick fix. Lower frequency than the common 4 so
      deferred behind D-292 B/C/D; pick up as a follow-on widening (or fold into workstream D's audit-gap close).
      SLICE-5 (array_oob) DONE ‚ÄĒ COMPLETE across all 6 array trap sites: array.get_s/get_u rerouted
      (`855ca5ca`); array.fill/copy trampolines now return ARRAY_NULL_SENTINEL (2) so callers split
      null‚Üínull_reference (10) vs OOB‚Üíoob_memory (6) (`dafab5ce`). All array null/OOB now precise +
      consistent with array.get/set + interp; tests via wasm-tools `(array (mut i8))`. **D-293 trap-kind
      demux is now effectively complete**; only residual is the D-294-R2 code-2 SUB-split (call_indirect
      "undefined element" vs table-access "out of bounds table access", both code 2 today), conformance-
      neutral CLI-message polish (suite matches by kind) ‚Üí tracked under D-294 R2.
      SLICE-1 DONE (`15a54fdf`): oob_table (code 2) now precise + UNIFIED across arm64+x86_64 for table-access
      (get/set/fill/copy/init) + call_indirect bounds (x86_64 oobtable_fixups channel built; arm64 op_table
      re-routed to cind_bounds_fixups; sig/null sites correctly left generic). Test: table.get OOB ‚Üí code 2.
      SLICE-2 DONE (`24a405eb`): indirect_call_mismatch (code 3) now precise + UNIFIED ‚ÄĒ x86_64 demuxed its
      inline-sig JNE (op_call.zig table-0 548 + multi-table 599; op_tail_call both) out of generic
      bounds_fixups into a new cind_sig_fixups channel ‚Üí emitTrapExitStub code 3, matching arm64 (already
      code-3). Subtyping-trampoline null (497) + call_ref null (708) correctly left generic. Test: ()->()
      funcref called as (i32)->() ‚Üí code 3 (JIT+interp parity, CLI-confirmed).
      SLICE-3 DONE (`0892ee36`): trapping-trunc cohort (i32/i64.trunc_f32/f64_s/u). NaN (x86_64 UCOMI-self JP /
      arm64 FCMP-self B.VS) ‚Üí new invalid_conv_fixups channel ‚Üí code 9 = invalid_conversion (new jitTrapCode 9);
      out-of-range (JAE/JB/JBE / B.GE/B.LT) ‚Üí existing overflow_fixups ‚Üí code 8 = int_overflow (shared w/ div_s).
      Both arches (x86_64 op_convert.emitFpTruncTrap{Signed,Unsigned} thread 2 channels; arm64
      bounds_check.emitTrunc{32,64}BoundsCheck route per-condition). Test: nan‚Üí9, 1e30‚Üí8 (JIT+interp parity).
      SLICE-4a DONE (`ebb87e33`): completed the trap SURFACE. Discovery: null_reference / cast_failure /
      uncaught_exception existed in runtime.Trap but were ABSENT from the TrapKind surface enum + mapInterpTrap,
      so the INTERP itself mis-reported them as binding_error ("host invocation error") ‚ÄĒ a real interp-parity
      bug, not just a JIT gap. Added the 3 variants (C-ABI 11/12/13) + spec messages ("null reference" / "cast
      failure" / "uncaught exception") + mapInterpTrap arms. Observable: interp ref.as_non_null/null ‚Üí kind=
