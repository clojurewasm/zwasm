  - id: "D-297"
    layer: "api"
    status: "note"
    description: |-
      note (cross-module aliasing memory-safety audit, 2026-06-06 — Phase-16 完成形 memory-safety dimension).
      Audited the Zig facade's cross-module aliasing lifetime model (Linker aliases a source Instance's live
      funcs/memories/globals/tables into an importer). RESULT: model is SOUND. The c_api zombie-parking
      architecture (`wasm_instance_delete` parks runtime+arena on the store's zombie list, reaped only at
      `wasm_store_delete` — instance.zig:263) keeps aliased storage alive past individual instance deletes, so
      memory/global/table/func aliases cannot dangle early (DISPROVED an audit's claimed table-refs-UAF). ONE
      real gap found + FIXED (`477a9004`, docs): the **Linker must outlive every Instance it instantiates that
      imports a host/cross-module func** — the importer runtime holds a raw ptr into the Linker-owned CallCtx
      (ctx_storage, linker.zig:548), so a cross-module call after `Linker.deinit` is UAF. Was real + necessary
      but lived only in an internal union comment; now on the file header + deinit docstring.
      OPTIONAL FUTURE HARDENING (low priority, deferred): a debug-mode fail-loud guard — Linker tracks a
      live-importer count (Instance back-ref decremented on its deinit) + `std.debug.assert(count==0)` in
      `Linker.deinit`. Turns the silent-UAF footgun into a loud panic in Debug/ReleaseSafe. Contract-based (no
      guard) is acceptable for a v0.1 systems embedding API (mirrors wasmtime's Store-ownership model; Zig has
      no borrow checker), so this is a nice-to-have, not a correctness gap. DISCHARGE DECIDED 2026-06-14
      (contract suffices for v1.0 — guard REJECTED): the live-importer counter would need balanced inc/dec
      across EVERY path that aliases `ctx_storage` — the facade `_zwasm.Instance` (instance.zig:33, holds only
      handle+c_store, NO Linker back-ref), the C-API store path, AND component.zig / component_wasi_p2.zig —
      each a distinct Instance type + deinit path. Any unbalanced path makes `assert(count==0)` FALSE-FIRE in
      the ReleaseSafe test net (ADR-0177); a partial guard (one path) is worse than none (false protection +
      spurious panic). The footgun is already mitigated by (a) the documented LIFETIME CONTRACT on the
      `src/zwasm/linker.zig` file header + `deinit` docstring and (b) the alias being a raw pointer (explicit,
      not a silent default) — acceptable misuse-resistance for a systems embedding API, mirroring wasmtime's
      contract-based Store ownership. (Stale ref corrected: ctx_storage lives at `src/zwasm/linker.zig:68`, not
      the cited linker.zig:548.) Residual CLOSED.
    first_raised: "2026-06-06"
    last_reviewed: "2026-06-06"
    refs: |-
