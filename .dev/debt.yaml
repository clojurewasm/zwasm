    description: |-
      blocked-by: iso-recursive rec-group structural subtype validation. `validator.validateTypeSection` (ADR-0124) `gcTypeDefIsSubtype`/`gcFieldSubtype` compare field reftypes `(ref N)` vs `(ref M)` by concrete-index identity (or supertype-chain reach), which does NOT account for rec-group structural equivalence — two structurally-identical types in different `rec` groups are equivalent in Wasm 3.0 GC but have different indices. Discharge: implement rec-group canonicalisation / iso-recursive type equivalence per Wasm 3.0 GC §3.3 — **ADR-0126 filed (cyc167); phased: 10a structural canonicalization (fixes ref_test test-canon + cross-module sig fails type-subtyping.45/46/48/50) → 10b iso-recursive coinductive validator (fixes the 6 within-module cross-rec-group fails below)**. | **Biggest gc compile-fail cluster (6 fixtures, M3-attributed cyc154)**: type-subtyping.9/12/21/24/39/45 fail `type-section subtype validation rejected (ADR-0124)`. They declare cross-rec-group subtypes, e.g. `(rec (type 4 (sub 0 (func))) (type 5 (sub 1 (struct (field (ref 0))...(field (ref 4))))))` where type 5's supertype (type 1) lives in a different rec group and fields self-reference rec-group-local types. **Hypothesis (verified at cyc154 via wasm-tools print + M3)**: the conformance check requires field-ref index equality/chain-reach, rejecting structurally-equivalent-but-differently-indexed rec-group refs. The simpler same-rec-group subtypes (br_on_cast.1, cyc153) pass; only cross-rec-group with self-refs fail. **cyc175 re-scope (ADR-0126 "Phase-10b RE-SCOPED")**: residual = 3 FAILsetup + 2 FAILval, all in the Runtime-types `ref.test`-on-funcref modules (`.wast` 348-440), NOT the Linking cross-module imports (those pass → Linker `sigSubtype` is OFF the path). Three coordinated pieces for cyc176: (1) validator `gcCanonicalEqual` [verified safe, invalid 57]; (2) funcref→**RAW** typeidx resolution in `ref_test_ops.gcRefMatchesNonNull` (the gap cyc170-172 missed — funcrefs aren't heap object