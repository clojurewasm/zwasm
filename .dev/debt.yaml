  - id: "D-446"
    layer: "code"
    status: "note"
    front: D-wasi03
    description: |-
      note (front② gap-mining; wasmtime task-return-traps.wast L106-150). A
      `canon task.return` MUST have a result type + canonopts that MATCH the
      current async task's lifted-export result type + opts, else the spec traps
      "invalid task.return signature and/or options for current task". Three
      cases: (1) task.return declares `(result u32)` but the lifted export has no
      result; (2) task.return declares `(memory ..)` the lift's result doesn't
      need; (3) task.return declares `string-encoding=utf16` ≠ the lift's. zwasm
      currently only BOUNDS-checks task.return's result type-index + opts
      (validate.zig checkCanons `.task_return` arm) — it does NOT compare them
      against the owning lift. BARRIER: associating a task.return canon with its
      async lift. Statically (validate.zig) requires tracing the lifted core
      module's import graph to the task.return canon provided via the core
      instance `with`; at runtime (wasmtime's approach) requires threading the
      current task's expected result/opts to p2TaskReturn. Either is real
