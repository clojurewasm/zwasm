    description: |-
      note — DEFERRED low-ROI (reassessed 2026-06-06 §0.5 sweep; prior "now" prose was stale, status always note):
      spec-100% is ALREADY met — `readMemargOffset` (lower.zig:913) decodes at u64 then rejects `> maxInt(u32)`
      with `BadMemarg`, which is spec-CONFORMANT because the official memory64 corpus carries offsets `≥ 2^32`
      ONLY in assert_malformed/assert_invalid (validator-rejected, never executed; see discharge analysis below).
      Lifting the reject only accepts an exotic spec-GRAMMAR `> 4 GiB` *static* offset no real code + no
      conformance test uses, and would need multi-arch 64-bit base+offset codegen for zero measured benefit. The
      "blocker dissolved (payload now u64)" makes it POSSIBLE, not worthwhile — keep deferred until a real
      consumer needs it.
      SCOPE PINNED 2026-06-06 (codegen investigation; do not re-investigate): the lowerer reject is NOT a
      "minimal lift" — accepting a `> 4 GiB` offset is the deferred **10.M-4b work (ADR-0111 D4)**. arm64
      `op_memory.zig:71-72` documents "i64-idx memory64 wrap-check + 64-bit offset materialise lands at 10.M-4b
      (ADR-0111 D4)", and the offset staging (`op_memory.zig:~188-190`) emits MOVZ/MOVK for offset lanes 0/1 only
      ("Wasm offset is u32 so lanes 2/3 are zero"). So the real fix = lift the lowerer cap + extend the MOVZ/MOVK
      to lanes 2/3 + the i64-idx wrap-check, on BOTH arches + edge fixture = a multi-arch architectural chunk,
      not a 1-line check-removal. It is a spec-GRAMMAR corner with NO conformance test + NO consumer →
      measure-first/lightweight (memory `feedback_perf_measure_first`) says do NOT build it speculatively; the
      ADR-0111 D4 deferral stands. Discharge predicate updated: implement 10.M-4b (ADR-0111 D4) when a real
      memory64 `> 4 GiB`-static-offset consumer appears, OR consciously close as won't-do for v1.0.
      `ZirInstr.payload` is already **u64** (10.Z), so the "payload u32" framing below is obsolete. **Realworld memory64 memarg-offset gap — common case FIXED cyc214**: clang `--target=wasm64` / lld emit the memarg `offset` as a width-padded (9-byte) LEB128, valid for a u64 (memory64) offset (≤ 10 bytes) but the validator (`skipMemarg`/`readMemargCheckAlign`) + lowerer (`emitMemarg`/`emitMemargLane`) decoded it at u32 width → `Error.Overlong`. The spec corpus only emits minimal-LEB offsets so this was invisible until the `clang_wasm64/wasm64_load_store` realworld fixture ran. Fix: validator decodes the offset at u64 width for memory64 (`skipMemargOffset`, keyed on `memory0_idx_type`); lowerer decodes at u64 then range-checks ≤ u32 for the payload slot (`readMemargOffset`). **Residual (the blocked-by)**: a genuine memory64 offset > 4 GiB (> u32 max) is rejected with `Error.BadMemarg` because `payload` is u32 — spec-valid but unsupported. Real code never uses > 4 GiB *static* offsets (large memory ≠ large offset), and the spec corpus doesn't exercise it, so deferred. Discharge (ADR-0128 §4 — web-verified): the official memory64 corpus's max EXECUTED offset is `2^32−1` (`address64.wast offset=4294967295`); offsets ≥ 2^32 appear only in assert_malformed/assert_invalid (validator path, never reach the lowerer), so spec-100% does NOT need the lowerer to accept `> 4 GiB`. The only residual is a leftover `> maxInt(u32)` reject in `readMemargOffset` (`lower.zig:864-867`) + `lower_simd.zig:372` — return u64 + drop the reject + ensure 64-bit `base+offset` math with wrap-trap + add an edge-case fixture for offset `> 2^32−1`. NO ZirInstr layout change / side-table (that plan is obsolete). | **STALE blocker (payload now u64); minimal fix = lift the leftover u32 check; spec corpus max offset = 2^32−1 so this never blocked spec-100%.**
