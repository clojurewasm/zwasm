  - id: "D-183"
    layer: ""
    status: "note"
    description: |-
      Cross-frame EH dispatch fixed via TWO surgical changes. (1) **Module-relative PC normalisation** (`src/engine/codegen/shared/code_map.zig::normalizeForUnwind` + `src/engine/codegen/shared/zwasm_throw.zig::dispatchThrow` `initial_pc` computation): both now compute `ret_addr - block_addr` where `block_addr = entries[0].start_addr` (the first defined function's start = JitBlock base). Prior code returned function-relative `hit.relative_pc` which only happened to equal module-relative for the first defined function; multi-func modules' `ExceptionTable.lookup` consistently missed because `collectModuleTable` shifts pc_start/pc_end to module-relative. (2) **DWARF-convention return-address adjustment** (`src/engine/codegen/shared/frame_chain_adapter.zig::loadFrameLink`): subtract 1 from the saved LR/RIP before normalisation so the lookup lands at the prior instruction's byte. The saved-LR points to the instruction AFTER the CALL/BL; when CALL is the LAST instruction in a try_table body, the unadjusted address lands exactly at `pc_end` (half-open) and would reject the match. Mirrors libunwind / wasmtime / WAMR convention. End-to-end test `runI32Export: cross-frame throw — callee throws, caller's try_table catches (D-183)` returns 42 on Mac aarch64; x86_64 SysV verified via ubuntu (Step 0.7 next cycle). Three unit tests updated to match new convention.
