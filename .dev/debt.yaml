    layer: "test"
    status: "blocked-by"
    description: |-
      Status: blocked-by: corpus diversity for **AssemblyScript** and a **WasmGC lang**
      (Kotlin/Wasm or Dart) — Phase A1 follow-ups in `.dev/realworld_reproduction_plan.md`.
      Two distinct barriers: (1) PROVISIONING — `asc` (AssemblyScript) is not on PATH in
