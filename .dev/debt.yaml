      `i32x4.dot_i16x8_s` / `i16x8.extmul_*`** (`compileWasm → NotImplemented`); x86_64 HAS
      them (`x86_64/ops/wasm_2_0/*extmul*`) → an arm64-emit hole; a full SIMD-op JIT-emit
      coverage sweep (narrow/extend/q15mulr/relaxed/dot/extmul on BOTH arches) belongs in
      Phase 15. (2) No >3× per-op perf gap means the §9.10 Track A candidates (AVX/CPUID
      path, MOVAPS peephole, SIMD coalescing) are NOT gap-justified — they stay opportunistic.
      CAVEAT (Phase-15 refinement): the `--quick` micro-benches are startup/compile-confounded
      (comparators pay an optimizing-compile cost zwasm's single pass skips) → a steady-state
      re-profile (≥10× iters, or subtract a no-op-module baseline) must precede acting on any
      per-op ratio. Discharge: Phase-15 SIMD work consumes the profile + closes the arm64
      dot/extmul emit hole.
