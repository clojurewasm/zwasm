      deserialize re-parses + each instance re-compiles ‚ÄĒ functionally correct, not the startup-perf shortcut the
      API implies. ENHANCEMENT (not a bug): if an AOT/compiled-artifact cache lands (cf. ¬ß14 AOT work), serialize
      could emit it for faster deserialize. Until then the byte-model is the honest, correct impl.
