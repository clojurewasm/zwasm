      i16x8.splat(1<<i) locals OR-chained ‚Üí i32x4.extend_low_i16x8_s ‚Üí i32x4.extract_lane 0; build the balanced
      or-chain programmatically (manual paren-counting fails). Same x86_64-only + spill_base_off-threading pattern
      for ExtaddPairwise + replace_lane (also reads scalar) + op_simd.zig binop dsts.
      EVIDENCE: (1) x86_64 `codegen/x86_64/gpr.zig resolveXmm` EXPLICITLY rejects a `.spill` v128 vreg ("handler not
      XMM-spill-aware") ‚Üí e.g. `emitV128IntReplaceLane` UnsupportedOp (this is the root cause of the x86_64 ubuntu
      red on the D-460 runI32Export tests). (2) arm64 `op_simd_int_cmp_lane.zig` extract/replace_lane are partially
