      blocked-by: Windows resource exhaustion / SSH stall at test-all runner-transition (leading hypothesis per 2026-05-22 W1 measure); originally framed as zig 0.16 IPC stability — superseded by enumerated hypotheses in body | `bash scripts/run_remote_windows.sh test-all` occasionally aborts with `error: test runner failed to respond for 1m4ms` even though 795/805+ tests passed in the failed run (only `test runner failed to respond` itself is the failure). Observed twice during §9.7 / 7.5d sub-b chunk 9 + §9.7 / 7.7-alu (commit `741a9b4`). Retry succeeds every time. **Trigger condition (named in concrete terms per `extended_challenge.md` Step 1)**: long-running test executable on Windows (zig 0.16's MSVC-spawned test process), exit code 1 with the IPC-timeout message rather than test failures. **Reproduction**: re-run after a successful run; flake rate observed 2/30 commits ≈ 6%. Workaround: retry once. The /continue loop's "windowsmini transient" treatment lets it slip past, but root-cause investigation needs upstream zig issue search (extended_challenge.md Step 4 — WebFetch ziglang/zig issues for "test runner failed to respond" + "Windows IPC"). **2026-05-05 follow-up**: 10 連続 (private/d028-logs/run-1..10.log @ commit eea7e75) で 0 fail。WebSearch も upstream 報告ゼロ → 汎用 zig 0.16 + Windows 問題ではない。再現条件は (a) 特定の commit 内容、(b) windowsmini ホスト側の I/O 状況、(c) test count 増加に伴う confluence の何れか。**2026-05-22 W1 partial-measure follow-up** (private/notes/p9-d028-flake-rate.md @ HEAD `1b4a5b5a`): 2/2 failures collected before subagent loop terminated. Run 1 = exit 3 (binary failure) after 1692/1721 tests, NOT IPC-timeout signature. Run 2 = WEDGED > 120 min mid-corpus (wast_runner completed 1158/1158, never reached spec_assert_runner). Both failures occur LATE in corpus (post-1600 tests). **Hypotheses** (numbered; predicted signatures + probes per hypothesis_enumeration.md): 1. ~~IPC-timeout (original D-028 framing)~~ — not refuted but signature does not match 2026-05-22 evidence; no `test runner failed to respond` line observed; downgraded from leading. 2. Specific-commit dependency (`1b4a5b5a` vs `eea7e75`) — partially supported (signatures differ across commits); distinguishing probe: re-run 5× at HEAD `eea7e75` to compare. 3. **Windows resource exhaustion / SSH buffering stall at runner transition** (active, leading from W1) — predicted signature: hang occurs at spec_assert_runner spawn (large child-process creation); fd-table or SSH buffer fullness during test-all orchestration; probe: add per-runner timestamp + peak fd/memory logging in test-all, run 5× and inspect logs. 4. Test-count confluence / cumulative resource drift (active, weakly supported) — predicted signature: failures cluster after N=1600+ tests regardless of which runner is active; probe: bisect by running `test-spec` vs `test-realworld` standalone. 5. **Windows Defender real-time scan interference at process spawn / JIT page** — **CONFIRMED** (refinement of #3 at the mechanism level). Distinguishing probe: clean up the Defender exclusion list (4 stale `*_runner_non_simd.exe`-style basenames that didn't match real `zwasm-*-runner.exe` PE/COFF names were ineffective no-ops) → register correct exclusion process names + add `C:\Program Files\LLVM` / `%LOCALAPPDATA%\zwasm-tools\sysinternals-*` / `%LOCALAPPDATA%\CrashDumps` to ExclusionPath → reboot → re-run test-all. Result @ `ba68a896` post-Defender-fix run: completed without wedge (1692/1721 tests, 37/39 build steps; only D-161 Win64 entry helper @panic failed — separate bug class). **Discharge plan**: N=5 consecutive `bash scripts/run_remote_windows.sh test-all` runs without wedge (per `.claude/rules/heisenbug_discharge.md` empirical-streak rule). Currently N=1; needs 4 more confirming runs (after D-161 lands so test-all can complete green, OR with D-161-tolerant counting that distinguishes wedge-class from runtime-panic-class failures). **Leading hypothesis**: #5 (CONFIRMED by post-fix run). **Next probe**: track 4 more consecutive runs once D-161 land or via filter-out-D-161 measurement.
