  - id: "D-294"
    layer: "code"
    status: "partial"
    description: |-
      partial: JIT call_indirect on a NULL (uninitialized, in-bounds) table element mislabelled its trap as
      indirect_call_mismatch (code 3); interp + all 3 reference engines (wasmtime/wasmer/v1, D-292-D audit) say
      "uninitialized element". A pure LABEL bug (always trapped, exit 1 — only the kind was wrong, D-293 class).
      ✅ INLINE PATHS FIXED (4fa16b29, 2026-06-06): a null slot's stored typeidx is maxInt(u32) (the no-func
      sentinel; compile_init.zig pre-seeds the typeidxs buffer), distinct from any canonical id. Clean insertion
      at each inline cind-sig site — `CMP/CMN typeidx, 0xFFFFFFFF ; J(E/B.EQ) → uninitialized_elem (code 13)`
      PRECEDES the sig CMP (typeidx already loaded). New uninit_elem_fixups channel mirrors cind_sig → code-13
      stub both arches (x86_64 CMP+JE→emitTrapExitStub; arm64 CMN W16,#1 + B.EQ→EmitCindStub). Covers
      call_indirect + return_call_indirect, table-0 + multi-table, both arches. jitTrapCode 13 =>
      uninitialized_elem. Tests: runner_trap_test exec (null → 13) + byte-exact emit tests updated. Verified
      JIT+interp both emit "uninitialized element". 3-host pending (ubuntu test-all kicked @4fa16b29).
      RESIDUAL 1 (narrow): the SUBTYPING resolve-trampoline path (jitCallIndirectResolve, op_call.zig arm64 ~309
      / x86_64 equiv) collapses OOB/sig/NULL all into funcptr=0 → a null elem under a subtyping module still
      reports code 3. Fixing it needs the trampoline to RETURN a distinct null sentinel (not funcptr=0) so the
      caller can branch to code 13 — a different (non-inline) mechanism. Low priority (subtyping + null elem is rare).
      RESIDUAL 2 (cosmetic): call_indirect OOB-INDEX prints `out of bounds table access` (oob_table) but spec
      canonical is "undefined element"; table.get OOB stays "out of bounds table access".
      REASSESSED 2026-06-06 (NOT cheap — folds into D-293): JIT trap-code 2 (oob_table) is SHARED by
      call_indirect bounds AND table.get/set/copy/fill OOB (op_table.zig routes all to cind_bounds_fixups →
      code 2). Giving call_indirect OOB a distinct "undefined element" needs SPLITTING the shared code-2
      channel into call_indirect-bounds vs table-access-bounds — precisely the D-293 kinded-fixup refactor, not
      a standalone constant. AND it is conformance-neutral: the spec runner matches by trap-KIND
      (wast_runtime_runner.zig:959) and the corpus baker maps `undefined element → OutOfBoundsTableAccess`
      (regen_wasmtime_misc tag_map), so the suite passes today; RESIDUAL 2 = bare-CLI-message polish only.
      → Both residuals (R1 subtyping-trampoline sentinel, R2 code-2 channel split) are D-293-class; the
      load-bearing D-294 bug (inline null-elem mislabel) is FIXED (4fa16b29). Residuals fold into D-293.
    first_raised: "2026-06-06"
    last_reviewed: "2026-06-06"
    refs: |-
      Fixed: 4fa16b29. src/engine/codegen/{arm64,x86_64}/{op_call,op_tail_call,ctx,emit}.zig +
