  - id: "D-450"
    layer: "code"
    status: "note"
    front: D-perf
    description: |-
      now (front ④ perf — measure-first ROI target, 2026-06-16). The all-engine
      matrix (`bench/results/all_engine_matrix.md`, ReleaseFast, Mac aarch64,
      2026-06-05) shows zwasm-jit vs wasmtime ratios cluster ~1.5–4× (the expected
      single-pass-vs-Cranelift tradeoff: fib2 1.5×, sieve 1.6×, heapsort 2.5×,
      keccak 3.7×, matrix 3.9×) — EXCEPT **shootout/base64 at 13.6×** (zwasm-jit
      781 ms vs wasmtime 57 ms; wasmer 62, wazero 79 — all optimizing comparators
      ~60–80 ms, so it is a zwasm-specific hotspot, not a fixture artifact). 13.6×
      is far beyond the single-pass baseline. **PHASE I DONE (2026-06-16, profiled
      via `sample` + `ZWASM_DEBUG=jit.dump`)**: the hot loop is wasm func 52's
      branchless base64-ENCODE kernel (`base64.wat` loop @4, 15 i32 locals + ~30
      mask constants, pure i32 bit-shuffle — the static i64-op count is a red
      herring, not in the kernel). The emitted JIT is **59–68% spill traffic**
      (sp-relative ldr/str: 553/813 mem ops in the hot window, ~5:1 vs ALU) because
      only 8 GPRs are allocatable (arm64 abi.zig X9-13+X20-22) and the deep
      expression tree + 30 constants + 15 locals blow past 8.
      CLASSIFICATION: **bulk = class B (optimizing-tier ceiling)** — keeping the
      kernel's constants + operand-stack intermediates register-resident across the
      loop is a GLOBAL regalloc / LICM problem single-pass structurally cannot solve
      without violating §1.3/§3.2 (Cranelift/LLVM win base64 exactly via global
      regalloc + mask hoisting). Honest outcome for the bulk: ACCEPTED single-pass
      register-pressure ceiling, do not chase to 57 ms.
      **BOUNDED class-A win (single-pass-legal, GENERAL — helps all spill-heavy
      fixtures, not just base64)**: a peephole in the emit pass — (1) re-materialize
      a spilled `i32.const` via `mov` instead of `ldr`-from-slot (a const is cheaper
      to recompute than spill+reload; `op_const.zig:66` emitI32Const); (2) elide the
      ~110 store-then-immediately-reload-same-slot pairs (`str x,[slot]` then
      `ldr y,[slot]` when the value is still in a stage reg) — a 1-deep reg cache in
      `gpr.zig` gprStoreSpilled/gprLoadSpilled (+ x86_64 sibling). NO new IR pass, NO
      CSE/GVN. Est. ~1.3–2× on base64 (781→~400-600 ms) + broad spill-heavy benefit;
      will NOT reach wasmtime (that needs the forbidden global regalloc). This sits
      atop a class-B gap.
      **ROI VERDICT (2026-06-16, after inspecting gpr.zig): NOT PURSUED — accept the
      ceiling.** The class-A "peephole" is NOT a contained helper tweak: the spill
      model stages every operand/result through op-LOCAL scratch regs (X14/X15,
      reused per op; `abi.spill_stage_gprs`), so store-reload-elision needs CROSS-OP
      emit state (a last-stored-slot→reg cache threaded through every op emitter +
      invalidated on each clobber) and const-rematerialization needs const-ness
      threaded through the regalloc Allocation model. Both are cross-cutting
      emit-layer / regalloc-model changes in the MOST miscompile-prone subsystem
      (D-265-class), for a PARTIAL win (~1.3-2×, doesn't reach parity) on an outlier
      workload. High cost + high risk + partial gain = ROI-insufficient
      (`feedback_perf_measure_first`). Raising `allocatable_gprs` past 8 is likewise
      non-trivial (prologue save/restore cost on every fn + the ADR-0018/pinned-reg
      X19/X24-28 invariants). CONCLUSION: zwasm's perf is "lightweight-yet-fast
      WITHIN single-pass" (1.5-4× of Cranelift on compute, massively beats
      interpreters, beats wazero on small fixtures); the base64/matrix/keccak gaps
      are the accepted single-pass-vs-optimizing-tier tradeoff (§1.3/§3.2 forbids
      the tier that would close them). Re-open ONLY if the spill machinery is
      reworked for another reason (then the class-A peephole rides along as a
      general win). Lesson `2026-06-16-base64-single-pass-register-pressure-ceiling`.
    first_raised: "2026-06-16"
    last_reviewed: "2026-06-16"
    refs: |-
      bench/results/all_engine_matrix.md (the measured ratios);
      bench/runners/wasm/shootout/base64.wasm (profile target);
      scripts/run_bench.sh (--bench=shootout/base64); .claude/skills/debug_jit_auto
  - id: "D-452"
    layer: "code"
    status: "now"
    front: "B-hardening"
    description: |-
      Status: now — br_table label-type check is exact-eql, spec needs subtyping.
      `labelTypesEq` (validator.zig:3379, used at :2794 for br_table) requires all
      br_table target labels to be PAIRWISE-EQUAL when the stack is not polymorphic.
      Wasm 3.0 §3.3.8.8 is more permissive: there need only exist an operand type
      sequence t* that is a subtype of EVERY label's type (labels need not be equal
      to each other) — e.g. labels `[funcref]` and `[(ref func)]` are jointly valid
      with operand `(ref func)`. Same exact-eql-vs-subtyping class as the return_call
      (`9064faa5`) + table.copy (`480809af`) fixes, but the correct fix restructures
      br_table validation (pop operands against each label via `subtypeCtx`, or
      compute the meet) rather than a one-line swap — deserves its own TDD cycle with
      adversarial fixtures (incl. the polymorphic-stack interaction at :2794). Surfaced
      by the same front-③ GC-corpus audit that found the two fixed siblings; not yet
      observed to block a real fixture (Hoot's module tripped return_call first), so
      latent. Discharge: br_table accepts compatible-but-unequal reftype labels +
      still rejects genuinely-incompatible ones (cross-hierarchy), with fixtures.
    first_raised: "2026-06-16"
    last_reviewed: "2026-06-16"
    refs: |-
      src/validate/validator.zig:2794 (br_table call site) + :3379 (labelTypesEq);
