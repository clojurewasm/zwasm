    description: |-
      RATIFIED interp-only (2026-06-23, option ii) — evidenced structural barrier, not a
      deferral excuse. On x86_64 the fuel/interrupt prologue poll is gated on
      `uses_runtime_ptr` (usage.zig:57 / emit.zig:193); a TRIVIAL leaf fn (no mem/global/
      call) skips R15 install + the poll, so a host-set `fuel=0` / pending interrupt does
      NOT immediately trap a trivial straight-line fn on x86_64 JIT (arm64 installs X19
      unconditionally so it DOES). **RUNAWAY-SAFETY IS INTACT on both arches** (loops are
      back-edge-polled); ONLY the fuel=0-immediate-trap semantic on a trivial leaf fn
      differs. The 3 facade sandbox tests asserting it are `.interp`-pinned (module.zig
      fuel=0; instance.zig interrupt + setFuel). WHY NOT FIXED (investigation 2026-06-23,
      agent a748eff3): the targeted fix (i) is intractable without a disproportionate ABI
      overhaul — (a) forcing always-R15 REGRESSES Win64 buffer-write param-shuffle
      (entry_buffer_write reads overflow args at `[RBP+16+r15_save_off+8*slot]`,
      emit.zig:516; r15_save_off 0→8 shifts every stack-arg read → ABRT; proven by the
      prior reversion), (b) the RAX-poll alternative fails because the trap stub writes
      `trap_kind` to `[R15+trap_kind_off]` (structurally needs R15), (c) the only correct
      path = always-R15 + a Win64 frame-offset fix + recompute 59 byte-exact emit tests.
      Disproportionate for a niche semantic (host fuel=0 on a trivial JIT leaf fn is rare;
      the security invariant already holds). Reopen only if a real consumer hits the gap.
