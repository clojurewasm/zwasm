      RE-SURVEYED 2026-06-14 (barrier RE-CONFIRMED, stays deferred): walked the full mechanism ‚ÄĒ the proper
      fix needs (a) a NEW stub variant per arch that sets trap_flag but does NOT MOVZ a static trap_kind (the
      helper owns the kind), since EmitCindStub bakes ONE static code per channel and these sites demux ‚Č•6
      modes dynamically; (b) a new gc_array_trap_fixups channel √ó2 arches; (c) a ~30-site convention where each
      helper failure path writes its precise TrapKind to rt.trap_kind (the trap_kind_off field) before
      `return 0` ‚ÄĒ gated on an interp-parity survey of each mode's exact TrapKind. Overloading the return slot
      to carry ref-or-kind would trip single_slot_dual_meaning. Net: multi-cycle architectural surface for ZERO
      conformance gain (spec runner passes today) + ZERO default-engine gain (interp already precise) ‚Üí correctly
