ll_indirect sig-check is EXACT (`sigEq`), but a `$t1` func called via `call_indirect (type $t0)` (`$t1<:$t0`) must succeed. **Verified-correct fix (re-apply as part of a .17 bundle)**: in `mvp.zig` replace the 4 `sigEq(callee.sig, expected)` checks (call_indirect/call_ref + return_ variants) with `sigCompatible` = `sigEq OR (fe.runtime==rt AND ref_test_ops.concreteReaches(rt, fe.raw_typeidx, declared_idx))` (make `concreteReaches` pub). That advanced .17 past the call_indirects → exposed root cause #2: a further `Trap.Unreachable` (NOT unbound-op, NOT control-bad-index — unidentified; likely the recursive self-ref func types / ref.cast-blocks / br-0-with-12-stacked-operands). **DEFERRED**: .17 is 1 exotic fixture needing ≥2 coordinated runtime fixes, each non-observable until the whole `run` passes (spike §2) — low ROI; land as one bundle when prioritised. Uncounted: .30/.48/.50 bare-module cross-module `SignatureMismatch` (linker `sigEqual` exact, needs sigSubtype + exporter type info). **cyc191 refined**: exact site = `checkImportTypeMatches` (instantiate.zig:1649-1654) — exact `sp.eql(wp)` per param/result on the `.cross_module` arm. Binding carries `source_rt` (exporter Runtime → exporter types REACHABLE) + flat `source_signature`. Fix is MONOTONIC-SAFE (eql-first, subtype-fallback only WIDENS acceptance → the green 407 multi-mem + 34 EH cross-module imports all pass eql, unaffected by construction). Core = func subtyping (contravariant params / covariant results, Wasm 3.0 §3.3) where the result reftypes are self-ref CONCRETE (`(ref null 1)`, `(ref 0)`); .30/.48/.50 import the SAME name under multiple subtype-related sigs. Open Q for the bundle: are M/M8/M9 type-spaces identical to importer (→ same-space `gcValTypeSubtype` on want_ft vs source actual) or distinct (→ NEW cross-module structural `canonicalEqual` across two `Types`)? First bundle step = `wasm-tools print` the M/M8/M9 source modules (find in manifest) to decide. **cyc192 RESOLVED** (`6a77cb19`): `validator.funcTypeImportCompatible` (func subtyping, contravariant params / covariant results) wired into `checkImportTypeMatches` `.cross_module` arm; M(.29)≡importer(.30) confirmed identical type-spaces so the importer's `types` suffice (same-typespace simplification → D-202). **SignatureMismatch 3→0; .30/.48/.50 instantiate.** Count correction: these are `module` directives (positive instantiate tests), NOT counted return/trap assertions, so gc 349/96 is UNCHANGED — the prior "349→350" prediction was a misattribution. The remaining return_fail=1 (`.17 run InvokeFailed`) + trap_fail=4 are the SEPARATE .17 multi-mechanism rabbit hole. Negative (reject) direction is corpus-gated on `assert_unlinkable` (skip-impl; cyc193 implements to verify+count, mirror cyc184 assert_uninstantiable).
