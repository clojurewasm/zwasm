  - id: "D-330"
    layer: "code"
    status: "partial"
    description: |-
      **PRIMARY MECHANISM FIXED 2026-06-15 `6790c204`** (ADR-0037 amendment): the JIT `%s`/strnlen
      miscompile was the LSRA free-pool expiry coalescing a RESULT vreg into the slot of a same-pc
      last-use OPERAND (`active.last_use_pc <= new.def_pc`) ‚ÄĒ their closed intervals overlap at that
      pc; safe only if every op emit reads operands before writing result (unenforced; violated by a
      byte-loop op in emscripten vfprintf's strnlen null check ‚Üí empty `%s` + dropped `\n`). Fix =
      strict `<` expiry. Arch-INDEPENDENT (arm64 == x86_64-Rosetta ‚áí shared codegen). repro2 correct;
      **emcc_fasta byte-exact MATCH**; full test + test-spec green; +1 slot worst-case (vfprintf
      12‚Üí13). Lesson `2026-06-15-regalloc-boundary-coalesce-read-after-write`; trail private/spikes/jit-vararg.
      ---
      **RESIDUAL (partial)**: `c_sha256_hash` improved 91B ‚Üí 106B (the sha256 hash output is now
      CORRECT) but still drops ONE trailing `\n` ("verify: OK\n" ‚Üí "verify: OK", 107 vs 106 bytes)
      under `--engine jit`. This is a SEPARATE bug that was MASKED by the coalescing corruption and
      surfaced only after it was fixed ‚ÄĒ NOT the coalescing class (strict `<` removes ALL boundary
      coalescing yet this persists). emcc_fasta is fully fixed; c_sha256 alone has the residual.
      MECHANISM PINNED (2026-06-15, fdWrite trace): the final `printf("verify: OK\n")` flushes as TWO
      ciovecs (musl line-buffered `__stdio_write`): iov[0]="verify: OK" len=10, iov[1]="\n" len=1.
      Under JIT the guest passes **iov[1].buf_len = 0** (interp passes 1) ‚Üí the `\n` write is empty.
      So a length value (the unbuffered-tail byte count) is MISCOMPUTED to 0 under JIT ‚ÄĒ a SEPARATE
      codegen miscompile from the coalescing one (strict `<` did NOT fix it; not boundary-coalescing).
      Both engines share `wasi_fd.fdWrite` (fd.zig:75), so it's guest-side. DEEP-TRACED 2026-06-15
      (subagent, ring-buffer probes correlating func-11 prologue `buf`/X30-LR + interp callIndirect
      `(caller,buf,len)`): the `{0,0}` iovec is built by **func 11 `__stdio_write`** (correct ‚ÄĒ stores
      what it's given), but the DIVERGENCE is its 3rd-entry CALLER. interp: caller=**func 8 `__overflow`**,
      buf=&'\n' len=1 ‚Üí `\n` written. jit: caller=**func 6** (exit fflush), buf=0 len=0 (empty wbase
      flush) ‚Üí `\n` dropped. ROOT: **func 8 `__overflow` is called 2√ó in interp but its write-path runs
      of the write path... ‚ÄĒ **THIS func-8 ROOT WAS WRONG** (2nd subagent 2026-06-15, runtime ring-probes):
      func 8 is invoked only 1√ó under JIT (2√ó interp); the func-8/caller framing was a red herring.
      **CORRECTED ROOT = func 4 (`_start`), a BLOCK-RESULT MERGE at `end`@676** (NOT a store/branch/compare):
      the final `printf("verify: OK\n")` inlines two `putchar('\n')` blocks; the 2nd (the final `\n`) is
      gated by `pc678 i32.ne; pc679 br_if 1` with operands `i32.ne(lhs = block@676 result, rhs = local.get 0)`.
      interp: `i32.ne(10,10)`‚Üífalse‚Üínot taken‚Üí2nd putchar runs‚Üí`\n`. JIT: `i32.ne(0,10)`‚Üí**true**‚Üítaken‚Üí`\n`
      SKIPPED (106 vs 107). The lhs is WRONG: block@676's single result should be `local.get 2` (=10, the
      `call 10`/fwrite byte count, verified correct), but pc678's i32.ne reads **vreg 477 (homed X22 / slot 7)
      holding 0** ‚ÄĒ a STALE/wrong vreg (NOT the local.get outputs 483/514/519; possibly left from the dropped
      `i32.eq`@672 result vreg 522). So the operand-stack/vreg threading at `end`@676 MIS-BINDS the block
      result (the block-result vreg X22/slot7 left holding 0 instead of MOV'd from the result operand).
      Concrete: interp@pc678 `(wn=10,wm=10)` vs JIT `(wn=0,wm=10)`; CMP-EMIT `lhs_vreg=477, slot=.reg=7(X22)`.
      Homed-local X9 preserved across `call 10` (pre=10/post=10) ‚Üí NOT the D-291 spill/reload. SAME FAMILY as
      lesson `jit-eh-landing-pad-emit-gotchas` (block/catch result vregs must be minted liveness+emit LOCKSTEP).
      FIX SITE: `src/engine/codegen/arm64/emit.zig` `.end` handler (~1642) ‚Üí `op_control.emitEndIntra` +
      `src/engine/codegen/arm64/op_control_merge_mov.zig`. Two candidates (NEXT PROBE to disambiguate): (a)
      regalloc slot-collision ‚ÄĒ block-result vreg + an unrelated vreg share X22/slot7 (run the allocation
      overlap check on func 4); (b) emitEndIntra fails to MOV the result operand into the block-result vreg.
      ARCH-INDEPENDENT (arm64 == x86_64-Rosetta) ‚áí shared (liveness/regalloc), MOV emit per-arch. CAUTION:
      **FOUR investigations have now mis-localized this (func-11‚Üífunc-8‚Üífunc-4-block-merge‚Üínumbering-desync);
      all DISPROVEN.** Empirical disproofs (own probes, all REVERTED): (1) func 4 regalloc is VALID ‚ÄĒ 0
      same-slot overlaps, n_slots=15, ranges=567 ‚Üí NOT a slot-collision. (2) liveness‚ÜĒemit are in PERFECT
      LOCKSTEP for func 4 ‚ÄĒ instrumented BOTH passes per-pc: identical 847 pcs, identical final vreg count
      (561=561), ZERO per-pc divergence ‚Üí NOT a vreg-numbering desync (so the subagent's "pc678 reads vreg 477"
      was simply WRONG ‚ÄĒ 477 is def=696, unreachable at 678). **NOT the same class as D-331(B) go_regex**
      (that one's emit DID exceed liveness ranges.len; func 4 does not ‚ÄĒ the prior "unification" was wrong,
      built on the bad vreg-477 claim). So the c_sha256 `\n` is a GENUINE VALUE-MISCOMPILE in some op's
      machine code (a value that should be 10 reads 0 at the branch that gates the final putchar) ‚ÄĒ NOT
      regalloc, NOT vreg-numbering, NOT a known structural class. DISCHARGE now requires RUNTIME
      instruction-level tracing (disassemble func 4's JIT bytes, single-step/log register values, find where
      10‚Üí0) ‚ÄĒ source-level hypothesizing has failed 4√ó. **DEPRIORITIZED**: NICHE cosmetic (one trailing `\n`;
      the sha256 + verify VALUES are correct; interp correct; 55/56 corpus byte-exact). Disproportionate
      effort already spent; do NOT re-chase the 4 dead hypotheses.
      ---
      **TOOLING NOW EXISTS (2026-06-15 `db3109d8`)**: the instruction-level lens that all 4 prior
      (IR-level) attempts lacked. `ZWASM_DEBUG=jit.dump zwasm run --engine jit <wasm>` prints each
      func's body-relative machine bytes as a hex line (`[jit.dump] func=N len=L hex=...`). Disasm
      arm64 via llvm-mc (NO objdump `-b` in llvm-21): `echo "$HEX" | sed -E 's/(..)/0x\1 /g' |
      /nix/store/*llvm-21*/bin/llvm-mc --disassemble --triple=aarch64`. Done for func 4 (10580 B =
      2645 insns). The earlier disasm-region speculation (mem[2056] lbf load; "full buffering") was
      UNCONFIRMED guessing ‚ÄĒ superseded by the hard iovec data below.
      ---
      **MECHANISM CONFIRMED 2026-06-15 (`<this-commit>`, via `scripts/jit_value_trace.sh` + lldb)**:
      c_sha256 is **LINE-buffered** (one WASI `fd_write` per printf line, 3 total ‚ÄĒ NOT full-buffered).
      Read both ciovecs at each `fd_write` (break `jit_dispatch.zig:78`; `memory read --format x --size 4
      --count 4 \`mem.ptr + iovs_ptr\``; musl `__stdout_write` passes `iov[0]={wbase, wpos-wbase}` +
      `iov[1]={new buf, len}`):
        - write 1 "input: ‚Ä¶\n": iov[0] len=22, iov[1] len=1 ‚Üí `\n` present. **CORRECT.**
        - write 3 "verify: OK\n": iov[0] len=**10** ("verify: OK"), iov[1]=**{0,0}**. The `\n` is in
          NEITHER iovec ‚Üí the buffered length `wpos-wbase` is 10, should be 11. The final `putc('\n')`
          for the LAST line did NOT advance `wpos` (or stored a short count). So `\n` is dropped at
          BUFFER-CONSTRUCTION, not at the write. A length value miscomputed to 10-not-11 ‚ÄĒ same
          "value should be N reads N-1/0" family as the (now-discharged) D-330 coalescing primary.
      **NEXT (well-defined)**: trace the putc/`__fwritex` that appends the verify line's `\n` to stdout's
      buffer (the `wpos` store) ‚ÄĒ find why `wpos` ends at +10 not +11. Reproduce the iovec read above to
      re-confirm, then `jit_value_trace.sh disasm`/`trace` the buffering func at its `wpos`-store,
      interp-vs-jit. STILL DEPRIORITIZED (niche cosmetic; values+interp correct; 55/56 byte-exact).
      ---
      **CORRECTION 2026-06-15 (`<this-commit>`, runtime lldb + linear-mem reads; trace
      private/notes/c_sha256_trace_2026-06-15.md)**: the "wpos ends +10 not +11 / buffer-construction
      miscompute" mechanism above is ~~DISPROVEN~~ by hard data ‚ÄĒ at the verify-line flush BOTH engines
      read `wpos`=2290 `wbase`=2280 (FILE struct: wpos@byte1996, wbase@byte2004), buffered len 10 in
      both. `wpos` is NOT miscomputed. The guest uses `puts()` = fputs(str)+putc('\n'); 3 line-buffered
      writes. The REAL divergence is the UNBUFFERED-TAIL iovec into `__stdio_write` (func 11): interp
      emits an EXTRA per-line immediate flush `__stdio_write(buf=&'\n', len=1)` for the verify line; JIT
      does NOT (its only func-11 call is the correct exit `{0,0}` flush via func4 _start atexit). So the
