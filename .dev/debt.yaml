  - id: "D-290"
    layer: "infra"
    status: "note"
    description: |-
      note (user-directed 2026-06-05): COMPLETE the wabt → wasm-tools toolchain migration so the repo uses
      ONE modern wasm CLI (wasm-tools, broader/current proposal coverage). SURVEY 2026-06-06 found the
      inventory is LARGER than first rowed; full live wast2json site list below. METHODOLOGY established this
      session (reuse for every remaining script): wabt's wast2json emits MINIMAL name-free modules; wasm-tools
      `json-from-wast` adds a `name` custom section (+ uses extended element-segment encoding, +2B per active
      elem-seg) → pipe each emitted `.wasm` through `wasm-tools strip --all` to recover near-byte-parity. D-179
      gotchas reconfirmed: no `--enable-all` (proposals on by default, so the four `--enable-*` flags drop);
      and the KEY distiller gotcha — wasm-tools emits some quote/text modules as `.wat` where wabt compiled
      `.wasm` (proven: comments.wast module[4] → `.wat`), so any JSON-distiller script that copies only `.wasm`
      must add a `wasm-tools parse <wat> -o <wasm>` conversion for `.wat`-typed `filename`s.
      KEY CONSTRAINT (found 2026-06-06): the committed spec corpora are SNAPSHOTS with NO recorded upstream
      pin, and upstream has drifted (e.g. func.wast: committed manifest 56 entries vs current-wabt 53 — a
      coverage reduction). So re-running ANY distiller (wabt or wasm-tools) against current upstream produces a
      large diff dominated by spec-content drift, NOT the tool swap — byte-verifying the migrated script vs the
      committed corpus is IMPOSSIBLE. Therefore each distiller migration is a TOOL-ONLY SCRIPT SWAP, validated
      by: regenerate IN PLACE → run the script's `test-spec*` target green (proves the migrated tool emits a
      valid, consumable corpus) → `git checkout -- <corpus>` + `git clean -fd <corpus>` (revert data; commit
      ONLY the script). A genuine corpus refresh (bump upstream + accept dropped coverage) is a DELIBERATE
      separate initiative, out of D-290 scope.
      DONE THIS SESSION: `build.zig` spectest → `wasm-tools parse` (`b0bb147a`, build-time gen, zero churn,
      ubuntu+win green); `regen_test_data.sh` → json-from-wast + strip --all (`c43aba23`, 7/9 byte-identical,
      committed nop/unreachable +2B — those 2 fixtures WERE committed since drift-free); DELETED orphaned
      `regen_v1_carry_over.sh` (`615b9c10`, dissolved corpus); `regen_test_data_2_0.sh` → .wat-aware distiller
      (`503fb429`, script-only, validated test-spec-wasm-2.0 green 1151 passed then data reverted);
      `regen_spec_1_0_assert.sh` → i32/i64 unsigned-mask + .wat-aware (`00d24722`, test-spec-assert green 212).
      SECOND CONSTRAINT (found 2026-06-06, the harder one): the SIMPLE corpora above migrate cleanly, but the
      PROPOSAL-LADEN ones do NOT — wasm-tools and wabt produce DIFFERENT output for the same .wast, breaking
      v2's curated-green gates. PROVEN on regen_wasmtime_misc.sh: upstream wasmtime is STABLE (old-wabt script
      reproduces the committed corpus EXACTLY: basic 72/0, runtime 266/0), yet the wasm-tools swap yields basic
      72/1 + runtime 327/35 — i.e. NOT drift but a genuine tool-output divergence. Concrete failure:
      `memory-copy.1.wasm` is `valid` under wabt but FAILS in the wasm-tools run; plus wasm-tools emits ~91 more
      runtime directives than wabt on the proposal-heavy fixtures, surfacing 35 v2 gaps. PROBE 2026-06-06
      (memory-copy): NOT a v2 validator gap — wasm-tools' memory-copy.1.wasm is wabt's exact 219-byte module +
      a 38-byte `name` section (strip --all recovers parity), and the module is multi-memory (`memory.copy 1
      0`). The failure is tool-migration encoding/strip/indexing entanglement on proposal-laden fixtures, not a
      v2 correctness bug — so no separate v2-validator debt; the blocker is purely the distiller tool-swap. So these are NOT tool-only swaps — they'd need per-fixture
      re-curation (drop the now-failing fixtures from the BATCH/NAMES lists) OR a v2 encoding-acceptance fix,
      both beyond D-290's tool-hygiene scope. STATUS: the 3 proposal-laden distillers
      (`regen_wasmtime_misc.sh`, `regen_spec_2_0_assert.sh` 912 LOC, `regen_spec_simd_assert.sh` v128) +
      dropping the `flake.nix` wabt pin are BLOCKED on that re-curation decision; wabt STAYS for now. Remaining
      tool-only-safe bits: none left among the simple corpora. `regen_spec_3_0_assert.sh` already migrated
      (D-179 precedent — note it may have the same latent divergence, unverified).
      DISCHARGE (revised): either (a) re-curate the 3 proposal-laden corpora to wasm-tools + accept the new
      gate-state, or (b) keep wabt for those 3 (one CLI is then NOT achievable — re-scope the goal). Needs a
      direction call. `rg -n 'wat2wasm|wast2json|wabt' scripts/ build.zig flake.nix` discharge unchanged.
      Low urgency (current tooling works).
