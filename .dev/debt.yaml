  - id: "D-235"
    layer: "code"
    status: "resolved"
    description: |-
      **RESOLVED 2026-06-03 (`2b48dfdc`).** Ported ADR-0131 gti subtype semantics to JIT `call_indirect`. JIT corpus: gc/type-subtyping assert_trap **4â†’0**; assert_return 762/2/531 (no regression); Mac test-all + lint green. SHIPPED mechanism DEVIATED from the prep (two latent prep gaps): (1) JIT `setup.zig` also had to materialise gti for FUNC-only-subtyping modules â€” D-232 fixed only the interp (`instantiate.zig`); setup still gated gti on `needs_gc_heap` â†’ a func-subtyping module got `gc_type_infos_ptr=null` â†’ trampoline over-rejects. (2) The prep's "trampoline ON CMP-mismatch" had a FATAL regalloc flaw: ANY trampoline call inserted mid-`call_indirect` clobbers caller-saved regs holding the op's arg/idx operands (regalloc doesn't model the inserted call). SHIPPED: store RAW typeidx in `typeidx_base` for subtyping modules; a `jitCallIndirectResolve(rt,table_idx,idx,expected)â†’funcptr|0` trampoline (bounds+`concreteReachesGti`+funcptr lookup) called BEFORE marshalling; operands force-spilled via regalloc inclusive crossing for `call_indirect` (`ZirFunc.uses_type_subtyping`, mirroring struct.new) so they survive the C-ABI clobber; arm64 stashes funcptr in X17, x86_64 re-derives inline (all-callee-saved pool). Non-subtyping byte-identical (gated). Lesson `2026-06-03-jit-trampoline-mid-op-clobbers-operands`. (Prep doc now stale on mechanism; bug analysis below stands.) ---- ORIGINAL PREP SUMMARY:
      **FULL EXECUTION PREP â†’ `.dev/jit_call_indirect_subtype_prep.md`** (complete design + reference chain + edit plan per file + RED-test bytes + verification; built for a FRESH CLEAR session to execute in one pass per user directive 2026-06-02 â€” do NOT half-bake in bloated context). Summary below. JIT `call_indirect` type-check is D-111 STRUCTURAL FuncType equality (`canonical_type.canonicalTypeidx` = lowest index with `funcTypeEql` params/results) â€” FINALITY-BLIND and SUBTYPE-BLIND. typeidx_base[idx] stores the D-111-canonical typeidx (setup.zig:441/621/692); the sig-check is `LDR W16,[X24,X17,LSL#2]; CMP W16,#expected_d111canonical; B.NE trap` (arm64 op_call.zig:239-250 + x86_64 equiv). Two REAL bugs (NOT harness â€” corrects the cyc-4 audit note that wrongly called the 4 gc fails harness): (A) OVER-acceptance â†’ the **4 gc/type-subtyping assert_trap fails**: `$t1=(sub (func))` vs `$t2=(sub final (func))` are both FuncType `()->()` â†’ SAME D-111 canonical â†’ CMP matches â†’ JIT wrongly ACCEPTS `fail1`/`fail2` (must trap; distinct identity/finality). (B) UNDER-acceptance â†’ the gc/type-subtyping **`"run"` RETURN-fail**: `$t1=(sub $t0 (func (result (ref null $t1))))` <: `$t0` but their FuncTypes DIFFER (result `(ref null $t1)` vs `(ref null func)`) â†’ different D-111 canonical â†’ CMP mismatch â†’ JIT wrongly TRAPS a legit subtype. The interp fixed BOTH via D-232/ADR-0131 (gti `concreteReaches` authoritative + canonical_ids distinguish finality); the JIT still uses the coarse D-111 structural compare. FIX (mirror interp D-232 on JIT; hot-path, both arches): when gti present, the sig-check must use the gti subtype check, not D-111 structural. Mechanism: (1) store the gti canonical id (ADR-0126, finality-aware) in typeidx_base when gti present (else keep D-111 for non-GC modules) â€” so structurally-equal-but-distinct types get DIFFERENT canonical â†’ CMP no longer wrongly matches; (2) on the CMP mismatch, CALL a trampoline `jitCallIndirectSubtypeOk(rt, callee_typeidx, expected_typeidx) callconv(.c) u32` = `concreteReachesGti(gti, callee, expected)` (the declared-supertype-chain subtype check; make `concreteReachesGti` pub) before trapping. This fixes (A) [mismatch â†’ trampoline â†’ not-subtype â†’ trap] AND (B) [mismatch â†’ trampoline â†’ is-subtype â†’ accept]. RED tests: (A) `$t1`/`$t2` structurally-equal-distinct â†’ call_indirect on the wrong one TRAPS; (B) `$t1<:$t0` (declared, FuncType differs) â†’ accepts. MUST NOT regress 762 assert_return / non-GC call_indirect. CRUX/RISK: reconciling the typeidx_base canonicalization (currently D-111) with the gti canonical_ids/supertype chains â€” verify alignment for non-GC (no gti â†’ D-111 unchanged) and GC modules. Implements ADR-0131 semantics on the JIT (cite). Closes 4 gc assert_trap + 1 return fail; the other return fail = eh/try_table (separate/deeper).
