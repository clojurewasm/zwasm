uses D-111 structural equality instead of the gti subtype check. Full corrected scope + fix → D-235. CYCLE 6 (2026-06-03, `f507bf33`): added a PERMANENT isolation repro for the lone memory64 *assert_return* fail (corpus `i64.load 0xfff8` got=0x6867666564000000, low 3 bytes 'a''b''c' zeroed) — a fresh `JitInstance` on a hand-assembled minimal mem64 module (data "abcdefgh" @0xfff8) loads it CORRECTLY (0x6867666564636261). 6th proof path: the near-boundary load + data-init codegen is correct; this return-fail is the SAME persistent-`cur_jit`/sequencing artifact as the 51 assert_trap fails. NET: 0 genuine JIT memory64 codegen fails (the §10-exit JIT-0-real-fail is met for memory64). Discharge of D-234 = the runner-side harness fix so the corpus stops false-reporting; NEXT pin the exact trigger (cur_jit-state-across-asserts vs baked-vs-raw manifest bytes) then the runner fix.
