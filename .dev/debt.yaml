      not wrapped — TableFull needs MAX_LENGTH mints (unrealistic), low priority;
      (2) host-FAILURE errors (WriteFailed, NoMemory, realloc) still hit the @panic
      if ever returned mid-dispatch — but those are host-side, not guest-triggerable.
      The clean general fix is a host-call error contract (guest-fault => trap,
      host-failure => a propagating InvokeError.HostError) — ADR-grade, deferred.
