ndle re-opened cyc228 (D-206-cross-module-TC). (b) **`return_call_ref`** â€” **DISCHARGED cyc206-207** (both arches, ungated): arm64 via manual `emit.zig` switch (cyc206 `5453141f`); x86_64 via collected per-op (`x86_64/op_tail_call.emitReturnCallRef` + `dispatch_collector_ops` register, cyc207). `ref.func + return_call_ref` tail-call â†’ 42 via `runI32Export` on both hosts. The tail-call JIT matrix (direct/indirect/ref) is now COMPLETE both arches. **Only (a) cross-module tail-call remains** in D-206. | **D-206 FULLY DISCHARGED cyc232** â€” cross-module `return_call` JIT landed via call-and-return through the ADR-0066 bridge thunk (`7131d711`; Mac arm64 green + ubuntu x86_64 `OK (HEAD=bc47d75e)`). NOT the frame-consuming BR-bridge of ADR-0112 D4: that corrupts a same-module grand-caller's pinned cohort on arm64 (X19/X24-X28 MOV-installed, not stack-saved). The proper-tail-call (frame-consuming) cross-module residual is tracked separately as **D-210** (needs arm64 prologue cohort-save). (a) cross-module + (b) return_call_ref (cyc206-207) both done; tail-call JIT matrix complete both arches.
