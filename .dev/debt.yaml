no `test runner failed to respond` line observed; downgraded from leading. 2. Specific-commit dependency (`1b4a5b5a` vs `eea7e75`) — partially supported (signatures differ across commits); distinguishing probe: re-run 5× at HEAD `eea7e75` to compare. 3. **Windows resource exhaustion / SSH buffering stall at runner transition** (active, leading from W1) — predicted signature: hang occurs at spec_assert_runner spawn (large child-process creation); fd-table or SSH buffer fullness during test-all orchestration; probe: add per-runner timestamp + peak fd/memory logging in test-all, run 5× and inspect logs. 4. Test-count confluence / cumulative resource drift (active, weakly supported) — predicted signature: failures cluster after N=1600+ tests regardless of which runner is active; probe: bisect by running `test-spec` vs `test-realworld` standalone. 5. **Windows Defender real-time scan interference at process spawn / JIT page** — **CONFIRMED** (refinement of #3 at the mechanism level). Distinguishing probe: clean up the Defender exclusion list (4 stale `*_runner_non_simd.exe`-style basenames that didn't match real `zwasm-*-runner.exe` PE/COFF names were ineffective no-ops) → register correct exclusion process names + add `C:\Program Files\LLVM` / `%LOCALAPPDATA%\zwasm-tools\sysinternals-*` / `%LOCALAPPDATA%\CrashDumps` to ExclusionPath → reboot → re-run test-all. Result @ `ba68a896` post-Defender-fix run: completed without wedge (1692/1721 tests, 37/39 build steps; only D-161 Win64 entry helper @panic failed — separate bug class). **Discharge plan**: N=5 consecutive `bash scripts/run_remote_windows.sh test-all` runs without wedge (per `.claude/rules/heisenbug_discharge.md` empirical-streak rule). Currently N=1; needs 4 more confirming runs (after D-161 lands so test-all can complete green, OR with D-161-tolerant counting that distinguishes wedge-class from runtime-panic-class failures). **Leading hypothesis**: #5 (CONFIRMED by post-fix run). **Next probe**: track 4 more consecutive runs once D-161 land or via filter-out-D-161 measurement.
