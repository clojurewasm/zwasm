      runner_gc_test; `zwasm run --engine jit --invoke f` repros UnsupportedOp (interp traps on SIMD BY DESIGN ‚ÄĒ use
      JIT). **LANDMINE confirmed**: xmmLoadSpilledV128 stage XMMs (14/15) collide with an op's internal scratch ‚ÄĒ audit
      scratch-XMM use per-op + force-spill fixture each (i16x8 proved it). REMAINING result-WRITE ops (Extend/Extadd write v128 via resolveXmm(result_v);
      replace_lane reads vec + writes dst; op_simd.zig binop dsts at :249/282/313/343/373/402) need source-swap +
      dest `xmmDefSpilledV128`/`xmmStoreSpilledV128` + stage allocation + fixtures. op_simd.zig binop SOURCES already
      spill-aware (:95-96, why v128.or worked). EXOTIC (high-v128-pressure only); concrete D-460 blocker already
      cleared by extract_lane. Float lane ops (op_simd_float.zig) = separate sibling-set.
      RESULT-WRITE AUDIT 2026-06-16: **arm64 unops (Extend/Extadd/etc.) ALREADY spill-aware** via shared
      `op_simd.emitV128Unop` (qLoadSpilled+qDefSpilled) ‚ÄĒ so the result-write fix is **x86_64-only** for the unop
      category. x86_64 has NO shared v128-unop helper; each op has its own emit. **Extend** (x86_64
      `emitV128ExtendLow`/`High`, op_simd_int_cmp_lane.zig): src+dst both resolveXmm ‚Üí need
      xmmLoadSpilledV128(src,stage0)+xmmDefSpilledV128(dst,stage1)+xmmStoreSpilledV128 ‚ÄĒ BUT the helpers need
      `spill_base_off` which the extend signature lacks ‚Üí must thread it through ~26 sites (12 per-width fns + 12
      *Ctx wrappers [have ctx.spill_base_off] + 2 inner helpers). ExtendHigh uses dst as PSHUFD scratch (distinct
