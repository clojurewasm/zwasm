      IV PROGRESS 2026-06-16: **arm64 i32x4.extract_lane i32-result spill-aware DONE** (`97afa4d4`,
      gprDefSpilled+gprStoreSpilled; the v128 source was already qLoadSpilled). Characterization test (12 live v128
