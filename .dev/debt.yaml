  - id: D-305
    layer: code
    status: partial
    description: |-
      **(b4) RECORD-WITH-STRING RESULT DONE @17e84953b (2026-06-20)**: a record
      result containing an internal pointer returns via retptr but can't be
      raw-copied (b2) — B-relative pointers. The boundary invokes B's producer
      (→ pointer to the record in B's mem), `canon.load`s it from B (lifts the
      string), `canon.store`s it into A's retptr (lowers the string into A's OWN
      mem + A-relative pointers). load/store recurse over fields. Detected by
      `resultRecordWithPointer`. rec_str_result fixture (mk()→{msg:"hi",n:5}, A
      reads n+first_byte=109 — proves bytes crossed); comp-assert 170/0.
      **record-with-string now works BOTH directions.** REMAINING (niche,
      consumer-gated): list<record>, multi-param-with-pointer, variant payloads.
      **FILE-SIZE GATE**: `component_graph.zig` at 1895/2000 — the NEXT CM-marshal
      slice MUST first extract the boundary trampolines/marshalling into a sibling
      (e.g. `component_boundary.zig`) per ADR-0099, else it breaches the hard cap.
      **(b3) RECORD-WITH-STRING param DONE @35a543854 (2026-06-20)**: a record
      param containing an internal pointer (string/list) crosses via the canonical
      round-trip `liftFlat(importer_cx, A_words)` → `lowerFlat(callee_cx, value)`
      (reuses canon.zig recursion + round-trip test :1212; no per-field hand-walk).
      Gated by `canonHasPointer`; flat records keep pass-through. `CoreValue` ==
      operand `RtValue` so args feed liftFlat verbatim. rec_str_param fixture
      (f({msg:"hello",n:3})→8); comp-assert 169/0. The round-trip path generalizes
      to list params + nested records for free (lowerFlat recurses). REMAINING
      (consumer-gated): record-with-pointer RESULT (retptr + lowerFlat into A's
      return area), multi-param-with-pointer, variant payloads.
      **(b) RECORD AGGREGATE DONE (2026-06-20)**: core record param+result both
      marshal. **(b1) flat-record PARAM @b3ee9fcf0**: a record whose fields all
      flatten to i32 (point{x,y:u32}) → N direct core words, pass-through (no
      memory); `boundaryFlatShape` resolves each param's CanonType + sums
      `canonFlatWidth`. **(b2) flat-record RESULT @3b5a0a4f8** (retptr): a record
      result > MAX_FLAT_RESULTS=1 returns via a return area — the LIFT producer
      (B) RETURNS a storage pointer (NOT retptr-in, unlike the string-result
      path), the boundary raw-copies the blob to A's retptr (flat record = no
      internal pointer → copy IS the lower). Fixtures record_param/record_result
      (authored via the nominal-type spelling the spike found:
      `(export $pe "point" (type $point))` + alias wiring — see lesson
      [[host-fn-two-value-types]] sibling `component-record-retptr-asymmetry`).
      comp-assert 168/0. REMAINING long-tail (consumer-gated, do NOT grind):
      mixed flat-params + record-result, single-field records, records CONTAINING
      string/list (nested-pointer aggregates need recursive canon.store/load),
      variant/enum/flags results. The "rare shape" worry is now structurally
      dissolved for the common record case.
      **(a) ARITY-COLLAPSE DONE @4c8329428 (2026-06-20)**: STOPPED the per-arity
      churn — replaced BoundarySig/3/4 + boundaryTrampoline/3/4 with ONE generic
      Value-slice path. New `linker.defineFuncRaw` (runtime-arity: arity travels
      in `host_func_marshal.RawHostFnCtx`, `rawThunk` pops n_params operands into
      a []Value; bridges operand-stack `runtime.Value` ↔ public `zwasm.Value` —
      two distinct unions) + single `boundaryTrampolineRaw`. `boundaryShapeOk`
      now accepts ANY flat-scalar arity (bounded by `raw_max_words`=32), no
      hand-coded ceiling. arity5_graph fixture proves it (comp-assert 166/0);
      D-466 unsupported fixture repointed at a wide-u64 param. REMAINING = only
      **(b) record/result AGGREGATE marshalling** (below): still fixture-blocked
      on the nominal-type WAT wasm-tools-validate snag, NOT on engine code. The
      arity-churn worry is now structurally closed; do NOT add per-arity Zig fns.
      **RARE-SHAPE PROGRESS 2026-06-19**: **3-PARAM ARITY DONE @db79e7df** — added
      BoundarySig3 + boundaryTrampoline3 (3 flat-4 scalars → 3 core i32 words,
      pass-through; boundaryShapeOk + install dispatch on params.len). Fixture
      arity3_graph (sel(a,b,c)->c). Follow-ons (same recipe, each needs a fixture):
      4..7 flat-scalar arities. AGGREGATE params/results (record/result/tuple) are
      a SEPARATE harder shape: (a) a record is a NOMINAL type — the cross-component
      fixture must EXPORT the type from B + IMPORT it in A (an anonymous record in an
      import/export func sig is rejected by wasm-tools; structural string/list are
      fine), and the lift/lower need (memory)+(realloc) options even when flat; a
      flat record{u32,u32} flattens to 2 direct words so the CODE is pass-through,
      but the nominal-type graph WAT hit a wasm-tools validate snag (print OK,
      validate "func not valid to be used as export" at the A-side) still to be
      resolved; (b) non-flat aggregates need recursive canon.store/load (already
      built+tested in feature/component/canon.zig). DRIVABLE without an external
      consumer: hand-authored 2-component fixtures + wasmtime offline oracle (see
      test/component/README_adder_graph.md). See also [[D-466]] (failed-graph
      cleanup double-free, observed via the arity3 RED run).
      Status: blocked-by: a fully-general component linker needs each child's
      canon-lower + instance-wiring structure decoded to map a component-level
      import to its core import — not yet built. CM-C2-3b-2
      (`api/component.zig` `instantiateGraph`) LINKS + RUNS a 2-component graph
      (add-five calls across into adder, returns 15) but takes two shortcuts:
      (1) a child component's core imports are satisfied by NAME-matching a
      prior instance's func export (works because wasm-tools names the core
      import after the interface func, e.g. A's "deps"/"adder" ↔ B's "adder");
      (2) only flat func imports (the canon-lowered flat-u32 cross-component
      call is a direct core call — no canon lift/lower at the boundary). General
      multi-component linking needs: resolve each `instance` instantiate's
      `with` args (name → sortidx) through the child's component import index
      space → its canon-lower → its core import; and canon lift/lower for
      aggregate (string/list/record) cross-component args. Lands when a fixture
      demands aggregate cross-component values.
      **SCOPE PINNED 2026-06-17 (RED fixture `test/component/strlen_graph.wat`)**: a realistic aggregate-passing
      component needs a `$libc` core module (memory + cabi_realloc) PLUS its main module — but `instantiateGraph`
      (`component.zig:470` `firstCoreModule`) compiles only the FIRST core module per child, so a 2-module child's
      `run` export is never instantiated → `error.ExportNotResolved`. So the FIRST barrier is **multi-core-module /
      multi-core-instance graph linking** (iterate the child's core instances, resolve each `(with ...)` arg incl.
      canon-lowered import instances + the libc memory), THEN the canon lower→core→lift cross-component STRING
      marshalling (A-mem→B-mem copy) at the boundary. Full fully-general linker = genuinely multi-cycle (matches the
      original "disproportionate effort" assessment). RED fixture committed (asserts `run()==0x5A`); wire its test
      WITH the impl (can't commit a failing test). Incremental plan: (1) multi-module graph linking (flat args, new
      flat 2-module fixture) → green; (2) canon boundary aggregate marshalling (strlen_graph) → green.
      **FIRST MILESTONE DONE 2026-06-17 (@4cceeb1e, ADR-0196)**: two-level graph linking + cross-component STRING
      marshalling landed in new `src/api/component_graph.zig` (outer component_instances × inner core_instances loop
      + boundary trampoline via `canon.CanonContext` copying the string caller-mem→callee-mem; typed
      `UnsupportedBoundaryType` for unimpl shapes). `component_model_assert` 159/0/0 (strlen `firstbyte("Z")→0x5A`
      PASS + adder flat intact); x86_64-verified @b4e33689 (ubuntu test-all exit 0); windows batched. **REMAINING (keeps this row)**: other aggregate shapes
      string + `list<primitive>` params + `string` RESULT DONE. **`string` RESULT DONE 2026-06-17 (@184b5e05)**: a
      no-param `() -> string` marshals its result across the boundary via a retptr trampoline (`RetPtrSig
      (*Caller,retptr)->void`; lift from callee → lower into importer via its CanonContext → write A-side (ptr,len)
      at retptr); `strret_graph` PASS (162/0). **error-trap FOLLOW-UP DONE 2026-06-17 (@30bd1881, SECURITY)**: the
      graph trampolines now use error-union sigs (`BoundaryError = Instance.InvokeError||OutOfMemory`, mirroring the
      WASI host fns — `defineFuncCtx`'s thunk surfaces a returned Zig error as a guest TRAP) instead of `callconv(.c)`
      + `catch 0`/untouched. A marshalling failure (OOB ptr/len, callee realloc/bounds, bad utf8) now TRAPS instead
      of silently returning 0/empty — a malicious component can't get a silent-wrong cross-component result.
      `oob_param_graph` adversarial test asserts `error.OutOfBoundsLoad`; EXEMPT-FALLBACK removed (no_workaround
      clean). **`list<primitive>`
      DONE 2026-06-17 (@689040e6)**: the boundary marshals a
      `list<u32>` (`listu32_graph` PASS, 160/0/0) — element size resolved at install via
      `canon.canonTypeFromDecoded`→`sizeOf` (a list param is a `type_index`, NOT a raw `.list` ValType; restricted
      to flat-scalar elements via `isFlatPrim`), `boundaryMarshal` copies `count*elem_size` bytes aligned to the
      element. **`(string)->string` DONE 2026-06-17 (@2b9b14ee)**: a `dup`-shape func (string param AND string
      result) marshals via a `(ptr,len,retptr)->void` trampoline composing the param-side lower with the
      result-side retptr lift/lower (`dup_graph` PASS, 163/0); error-union trapping. **COMMON shapes now ALL
      covered** (string/list params, string result, `(string)->string`, boundary error-trap). **REMAINING (keeps
      this row, consumer-gated — do NOT grind speculatively)**: record/result/tuple params + aggregate
      (string/list) RESULTS + multi-param-alongside-string + >2-component/deeper graphs + arity-general trampolines
      (the fixed sigs cap params to 2 / one aggregate). All correctly hit the typed `UnsupportedBoundaryType`
      deferral today; each lands when a fixture/consumer demands it. Async cross-component routing (the ADR-0195
      scheduler prerequisite) is a further axis.
