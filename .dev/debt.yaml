  - id: "D-233"
    layer: "code"
    status: "resolved"
    description: |-
      **RESOLVED (this commit) â€” harness fix landed.** Routed jit-mode `assert_trap` through `cur_jit` (spec_assert_runner_wasm_3_0.zig assert_trap handler: pack scalar args via scalarArgBits, `cur_jit.invoke` â†’ unwired-shape Error = skip, any other Error = trapped/pass, normal return = fail). Now assert_trap ACTUALLY tests the JIT (was the stale interp instance). Result: the original 8 "fails" were the harness artifact â€” `ref_cast_null` أ—4 now TRAP correctly on the JIT (FAILtrapNoTrap gone). JIT assert_trap 554/8 (meaningless) â†’ 202 pass / 55 fail / 305 skip (real). The 55 are REAL JIT trap gaps newly EXPOSED (never trap-tested before) â†’ filed D-234 (51 memory64-OOB + 4 gc/type-subtyping). Gated on jit_mode â†’ default interp gate unaffected. Below = the reclassification analysis that led here.
      **RECLASSIFIED â†’ RUNNER ARTIFACT, NOT A JIT CODEGEN BUG (CONFIRMED by code).** The 8 `ZWASM_SPEC_ENGINE=jit` assert_trap "fails" are because JIT-mode assert_trap is evaluated on the INTERP instance with STALE setup state, not on the JIT. Mechanism (definitive): `spec_assert_runner_wasm_3_0.zig:1242` â€” in jit_mode the setup `(invoke "init")` action runs ONLY on `cur_jit` (the JitInstance), never on the interp `instances_list` instance; but the assert_trap path (:1068) evaluates on `instances_list.items[idx_trap]` (interp). So the interp instance's table/global state is never populated by the JIT-applied setup â†’ `ref_cast_null`'s `table.get` returns null â†’ `ref.cast_null` on null PASSES (nullable) â†’ no trap â†’ FAILtrapNoTrap. A/B PROOF already in the data: interp-mode (setupâ†’interp + trapâ†’interp, synced) = assert_trap 562/0; jit-mode (setupâ†’cur_jit + trapâ†’interp, stale) = 554/8 â€” the only delta is which instance got the setup invoke. The JIT GC ref.cast / array.init CODE is FINE (the trampolines share the interp's passing `gcRefMatchesNonNullCore`/OOB checks; the single-cast unit tests pass). The 5-turn "ref_cast_null operand" chase (struck below) was a PHANTOM â€” debugging codegen for a test-harness eval gap. PROPER FIX (for ADR-0128 آ§10 "both backends" to actually verify JIT traps): route assert_trap through `cur_jit` in jit_mode (param-bearing JIT invoke via runScalar/the thunk path + trap_flag detection), mirroring the assert_return JIT path â€” substantial runner work, fresh cycle. Cheap interim (does NOT achieve both-backends, only de-noises): also run the setup invoke on the interp instance in jit_mode. Lesson: 2026-06-02-jit-mode-assert-trap-evaluates-on-interp-instance. ~~OLD (per-op trap-emission gap framing â€” WRONG): Clusters: **gc/ref_cast `ref_cast_null` أ—4** (idx 1-4 of the ref_cast.wast table = i31 / struct / array / any.convert_extern values, each `ref.cast structref|arrayref|i31ref` to a WRONG abstract type must trap "c