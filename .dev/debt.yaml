    description: |-
      **DISCHARGED `7c86b3a0` (GET) + `720e5793` (SET)**: gc struct.get/array.get/struct.set/array.set of an f32/f64 field/element now FP-class. ROOT CAUSE (pinned via disasm `ldr x9` then `fmov s0,s16`): the value was GPR-class (`vregClassOfOp else=>.gpr`) but f32 consumers (function return / call) read the FP home â†’ stale V0/XMM0. FIX: threaded per-typeidx gc field/elem valtypes onto ZirFunc (`arrayElemValType`/`structFieldValType` accessors, set in `compileOne` from `compile.zig` tables); `vregClassOfOp` â†’ `.fpr` for f32/f64 struct.get/array.get; GET emit loads into the FP file (arm64 LDR S/D + FMOV-from-GPR for register-offset; x86_64 GPR-load + MOVD/MOVQâ†’XMM); SET emit reads the FP operand (arm64 STR S/D + FMOVâ†’GPR; x86_64 MOVD/MOVQ XMMâ†’GPR). get_s/get_u i32-only (untouched). **jit corpus pass 538â†’544 (+6, all f32 fails); 0 ty=f32 fails remain.** Both arches (x86_64 cross-compile verified). Un-skipped the f32 cross-func red test â†’ green. ~~ORIGINAL (SURFACED `824fa694`; VALIDATED `6db5fbbd`): 6 f32 assert_return fails (`JITval [gc/{struct,array}] get ty=f32 got=0x69`).~~ **CONFIRMED f32-SPECIFIC** via a CORRECTLY-encoded cross-func control pair (`runner_gc_test.zig`): `(type $s (struct (field T))) ($inner (ref $s)->T = struct.get 0 0) (export "f" ()->T = T.const; struct.new 0; call $inner)` â€” **i32 â†’ 42 (correct, green test), f32 â†’ stale 0.0 instead of 2.5 (D-212 red, `skip.blocker(.D-212)`)**. So ref-arg passing + GPR results are fine; only the f32 result fails to reach V0/XMM0 across the call/return boundary. CAVEAT/CAUTION: last cycle's "i32 also fails" was a `SectionTooLarge` HAND-ENCODING bug, not a miscompile â€” hand-encoded multi-fn modules are error-prone (recompute section sizes carefully). **PINNED via disasm (`c963f41f`, arm64 inner fn `local.get 0; struct.get 0 0; end`)**: tail decodes to `ldr x9,[x16,#8]` (struct.get loads the f32 field into **GPR X9**, via `gprDefSpilled`) then `fmov s0, s16` (the f32-return marshals from **FP S16, NEVER WRITTEN** â†’ stale). So struct.get's result is GPR-class (`vregClassOfOp` `else=>.gpr`) but the f32-return reads the FP home â†’ class mismatch. (Same-fn worked by a regalloc-layout fluke; not reliable.) FIX (mechanical, fresh context â€” architectural, do NOT rush under heavy context): make struct.get/array.get of an f32/f64 field **FP-class** so producer + consumer agree: (1) `vregClassOfOp` (regalloc_vreg_class.zig) return `.fpr` for struct.get/array.get when field/elem valtype is f32/f64; (2) struct.get/array.get emit (both arches) `fpDefSpilled` + FP load (`encLdrSReg/DReg` arm64 / movss/movsd x86_64), mirror f32.load in `op_memory.zig`. THREADING (the work): both sites need the field/elem valtype from `ins` alone (ZirFunc/EmitCtx lack GC field types). Cleanest: add gc field/elem valtype accessors to ZirFunc (like `localValType`), populated at lowering (which already has `array_elem_valtypes` + can add `struct_field_valtypes`); array.get plain (sub 11) `extra` is currently 0 (free to stamp elem valtype); struct.get `extra`=fieldidx (taken) â†’ use a ZirFunc lookup or payload high-bits pack. Un-skip the f32 red test â†’ green; re-measure corpus. | f32 result of `struct.get`/`array.get` through a function return/call is left in a GPR, never moved to V0/XMM0 â†’ reads stale FP reg. i32 cross-func works (control green); f32 fails (red-skipped). Same-fn f32 works â€” anomaly, disasm to pin site. | 2026-05-31 | 2026-06-02 | `runner_gc_test.zig` (control+red); `src/engine/codegen/{arm64,x86_64}/ops/wasm_3_0/struct_get.zig`+`array_get.zig`; `op_memory.zig` (f32.load pattern); `regalloc_vreg_class.zig` (FP-class); lowering field-valtype threading; D-211; D-223; ROADMAP آ§10 / 10.G | `struct.new` stores field operands and `array.new` marshals the init value via the GPR path (`gprLoadSpilled` + `MOV Xn`/`MOV Rn`) â€” correct for i32/i64/ref elements/fields, WRONG for f32/f64 (the value lives in an FP register, not a GPR). The i32 `runI32Export` e2e tests pass