    refs: |-
      `src/engine/codegen/arm64/ops/wasm_3_0/ref_cast_null.zig` (THE emit — `structref`/`arrayref`/`i31ref`/`nullref` are NULLABLE → `ref.cast_null`, NOT ref_cast.zig); `src/engine/codegen/shared/jit_abi.zig:822` (jitGcRefCast → gcRefMatchesNonNullCore); `src/instruction/wasm_3_0/ref_test_ops.zig` (gcRefMatchesNonNullCore; isI31Ref); `test/spec/wasm-3.0-assert/gc/raw/ref_cast.wast:14-64`; D-211; D-212; ADR-0128 §2; debug_jit_auto skill.
      ROOT LOCALIZED (runtime probe, cyc this date — CASTPROBE in jitGcRefCast + CASTNULLEMIT in ref_cast_null.zig emit, both reverted): the bug is **operand-0 at fixed func positions** in `ref.cast_null`, NOT the trampoline/lowering/liveness. Evidence: ref_cast_null casts table[1] (i31, ref=0xf) to anyref/structref/arrayref/i31ref/nullref in sequence. At RUNTIME jitGcRefCast is called for the i31 ONLY with ht=0x6e(any)+0x6c(i31ref) — match=true, correct — and **NEVER with ht=0x6b(struct)/0x6a(array)/0x71(none)** for ref=0xf. Those casts ARE emitted (CASTNULLEMIT shows 0x6a/0x6b/0x71) but their inline `CBZ ref,.done` null-skip FIRES → operand reaching them is 0, so no trampoline call → no trap → func returns normally. Consistent per-target-type because positions are fixed in the once-compiled func (positions 1=any,4=i31 get 0xf; positions 2,3,5=struct,array,none get 0). RULED OUT: trampoline (shares interp gcRefMatchesNonNullCore, passes), lowering (all 5 emitted with correct ht bytes), liveness shape (`liveness_stack_effect.zig:156` ref.cast_null = pops1/pushes1, matches emit popUnary+push). NARROWED FURTHER (TDD repros, this cycle — runner_gc_test.zig): two minimal reproductions BOTH TRAP CORRECTLY (pass), so the bug is NOT generic multi-cast ref.cast_null: (1) `ref.cast_null any` then `ref.cast_null struct` on FRESH i31 operands; (2) same on a re-read NULLABLE `anyref` LOCAL (local.set i31 → local.get ×2). So the operand-0 effect needs the SPECIFIC corpus shape — a TABLE-held value populated by a SEPARATE `init` func (cross-func), 5 casts, and/or the `any.convert_extern` host-ref at table[4]. CAVEAT: the earlier "operand-0 at positions 2,3,5" was inferred from a MODULE-GLOBAL probe (CASTPROBE had no func tag → it conflated ref_cast_null with ref_cast_i31/struct/array/non_null in the same module); treat that positional claim as unproven. The 2 new tests are kept as regression coverage (no prior multi-cast ref.cast_null test existed). NEXT: build a TABLE-based repro (table (ref null any) + active/passive elem or a setter func, then ref.cast_null struct on table.get) — if that repros, the bug is in JIT table.get → ref.cast_null operand flow; else disasm the actual corpus ref_cast func (debug_jit_auto, dump JitBlock bytes). Discharge: JIT assert_trap 8→0. (array_init/data_drop ×4 + the 2 return fails are separate.)
