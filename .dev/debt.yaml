  - id: "D-233"
    layer: "code"
    status: "resolved"
    description: |-
      **RESOLVED (this commit) — harness fix landed.** Routed jit-mode `assert_trap` through `cur_jit` (spec_assert_runner_wasm_3_0.zig assert_trap handler: pack scalar args via scalarArgBits, `cur_jit.invoke` → unwired-shape Error = skip, any other Error = trapped/pass, normal return = fail). Now assert_trap ACTUALLY tests the JIT (was the stale interp instance). Result: the original 8 "fails" were the harness artifact — `ref_cast_null` ×4 now TRAP correctly on the JIT (FAILtrapNoTrap gone). JIT assert_trap 554/8 (meaningless) → 202 pass / 55 fail / 305 skip (real). The 55 are REAL JIT trap gaps newly EXPOSED (never trap-tested before) → filed D-234 (51 memory64-OOB + 4 gc/type-subtyping). Gated on jit_mode → default interp gate unaffected. Below = the reclassification analysis that led here.
      **RECLASSIFIED → RUNNER ARTIFACT, NOT A JIT CODEGEN BUG (CONFIRMED by code).** The 8 `ZWASM_SPEC_ENGINE=jit` assert_trap "fails" are because JIT-mode assert_trap is evaluated on the INTERP instance with STALE setup state, not on the JIT. Mechanism (definitive): `spec_assert_runner_wasm_3_0.zig:1242` — in jit_mode the setup `(invoke "init")` action runs ONLY on `cur_jit` (the JitInstance), never on the interp `instances_list` instance; but the assert_trap path (:1068) evaluates on `instances_list.items[idx_trap]` (interp). So the interp instance's table/global state is never populated by the JIT-applied setup → `ref_cast_null`'s `table.get` returns null → `ref.cast_null` on null PASSES (nullable) → no trap → FAILtrapNoTrap. A/B PROOF already in the data: interp-mode (setup→interp + trap→interp, synced) = assert_trap 562/0; jit-mode (setup→cur_jit + trap→interp, stale) = 554/8 — the only delta is which instance got the setup invoke. The JIT GC ref.cast / array.init CODE is FINE (the trampolines share the interp's passing `gcRefMatchesNonNullCore`/OOB checks; the single-cast unit tests pass). The 5-turn "ref_cast_null operand" chase (struck below) was a PHANTOM — debugging codegen for a test-harness eval gap. PROPER FIX (for ADR-0128 §10 "both backends" to actually verify JIT traps): route assert_trap through `cur_jit` in jit_mode (param-bearing JIT invoke via runScalar/the thunk path + trap_flag detection), mirroring the assert_return JIT path — substantial runner work, fresh cycle. Cheap interim (does NOT achieve both-backends, only de-noises): also run the setup invoke on the interp instance in jit_mode. Lesson: 2026-06-02-jit-mode-assert-trap-evaluates-on-interp-instance. ~~OLD (per-op trap-emission gap framing — WRONG): Clusters: **gc/ref_cast `ref_cast_null` ×4** (idx 1-4 of the ref_cast.wast table = i31 / struct / array / any.convert_extern values, each `ref.cast structref|arrayref|i31ref` to a WRONG abstract type must trap "cast failure"); gc/array_init_data + gc/array_init_elem ×1 (segment OOB trap); multi-memory/data_drop0 ×2 (init_active/init_passive after data.drop = OOB trap). KEY DIAGNOSTIC: `jitGcRefCast` (jit_abi.zig:822) calls the SAME `ref_test_ops.gcRefMatchesNonNullCore` the interp uses (which correctly traps), and the arm64 emit (ops/wasm_3_0/ref_cast.zig) traps on a 0 trampoline return — so the bug is NOT the cast algorithm or the emit's trap branch; it is JIT RUNTIME STATE fed to the trampoline (the `ref` u64 read from the table, and/or `rt.gc_type_infos_ptr`/`rt.gc_heap` pointers in the JitRuntime). HYPOTHESIS (UNVERIFIED — needs runtime inspection, do NOT assume): the table-stored ref value reaching jitGcRefCast is mis-encoded (e.g. i31 tag lost, or a struct ptr that readObjKindHeap mis-reads as matching) OR gc_heap/gti not wired into JitRuntime for this module → readObjKindHeap returns a kind that wrongly matches. NEXT: **debug_jit_auto** — lldb/probe `jitGcRefCast` args (ref, ht, gti!=null, heap!=null, is_i31, obj_kind) for ref_cast_null idx 1-4; compare to the interp values. The multi-index failure (i31 AND struct AND array) rules out an i31-only encoding bug. Then fix the wiring/encoding. Discharge: JIT assert_trap 8→0. (The 2 JIT return fails — gc/type-subtyping "run" call_indirect-subtype + eh/try_table — are SEPARATE, tracked toward D-198/EH.)
