    description: |-
      blocked-by (FOLLOW-TIME half needs cross-platform path-resolution rework +
      3-host test): WASI `path_*` confinement is escape-guarded on the GUEST path
      (`pathHasParentEscape` rejects absolute + `..`; resolution is `openat`-relative
      via a preopen dirfd). PLANT-TIME symlink confinement is now DONE
      (`symlinkTargetEscapes`, @<this>): a guest can no longer CREATE a symlink whose
      target escapes the preopen root (lexical containment vs the link's depth;
      absolute targets refused) → the "plant then read through it" escalation is
      closed for symlinks created via zwasm's API. REMAINING (the blocked half): no
      cap-std-style "beneath" confinement at FOLLOW time — `path_open`/`statFile`/
      `readLink` follow modes delegate to `std.Io.Dir` with no RESOLVE_BENEATH /
      O_NOFOLLOW component walk, so a PRE-EXISTING on-disk symlink (placed by
      something other than the guest, inside an operator-granted writable preopen)
      that escapes would still be followed. Only bites once a writable preopen
      containing attacker-or-foreign symlinks is granted to untrusted code (no
      embedder does today; CLI `--dir` is operator-chosen). あるべき論 fix: resolve
      each path component within the preopen, following symlinks only while they
      stay beneath the root (Linux `openat2(RESOLVE_BENEATH|RESOLVE_NO_MAGICLINKS)`;
      a manual component walk with `O_NOFOLLOW` + re-resolve elsewhere; or a
      post-resolve realpath-prefix check). Blocked because `std.Io.Dir` exposes no
      openat2/O_NOFOLLOW (the file deliberately avoids `std.posix` for Win64), the
      Host stores only `(host_handle, guest_path)` not a root PATH (so a realpath
      check needs new state), and the fix needs Mac+Linux+Windows verification.
      DISCHARGE: when FS-grant-to-untrusted ships, OR proactively as a
      `wasi/path.zig` resolver rework with a 3-host symlink-escape test.
      CW-V1 IMPACT = NONE today (verified 2026-06-08): only bites a guest given a
      WRITABLE preopen, and cw grants no writable preopen to untrusted wasm; the
      plant-time half (done) already blocks the guest-plant vector. Becomes
      relevant if cw later grants FS write to untrusted code. Priority for cw v1: LOW.
