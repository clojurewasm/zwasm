  - id: "D-291"
    layer: "code"
    status: "resolved"
    description: |-
      ✅ FIXED 2026-06-06 (arm64 op_call.zig `homedCallerSavedSpillReload`): ed25519 `--engine jit` now exits 0
      (was oob_table trap), `zig build test` + `test-spec` green. ROOT CAUSE: the arm64 homed-local cross-call
      spill SKIPPED callee-saved-bank homes (`id >= callee_saved_slot_boundary → continue`), wrongly assuming
      AAPCS64 callee-preservation — but per ADR-0060 the JIT prologue installs invariants into X19..X28 WITHOUT
      stack-saving, and a JIT callee that homes a local in X20..X22 clobbers it. func 11 (ed25519, 21 locals,
      high reg pressure) homed its saved-SP local2 in a callee-saved reg, call-crossing; `call 14`/`call 17`
      clobbered it → epilogue over-restored __stack_pointer to garbage → func 7 read corrupt sp → data-region
      result buffer → func 17 stored the funcptr global → cind oob_table trap. FIX: spill/reload callee-saved
      homes across calls too (removed the skip) — matches x86_64's already-correct `homedSpillReload` (no skip;
      RBX/R12-R14 also JIT-unsaved). ARM64-ONLY bug (x86_64 was correct); pending 3-host gate (windows). Full
      investigation chain + the trap_aux diag journey below = audit trail; see lesson. DISCHARGE pending 3-host green.
      note (ADR-0163 A; surfaced by D-289; CHARACTERIZED 2026-06-05): `shootout/ed25519.wasm` now JIT-COMPILES
      (D-289 lifted the frame-offset cap) but TRAPS at runtime under `--engine jit` (wasmtime exit 0; interp
      280s timeout = just slow). CHARACTERIZED via lldb: it is a **controlled JIT trap, NOT a SIGSEGV** — lldb
      caught NO signal; the process printed `Trap` + exited 1 cleanly. The `[stack_probe]` diag (margin ~16 MB,
      SP far above limit) is just context the SHARED trap stub prints → **NOT stack** either. So the JIT wrote
      a trap-code + jumped to the trap stub = a clean wasm trap (bounds / call_indirect-sig / unreachable /
      etc.; codes 0/1/2/3.. per D-165, written to the trap_code runtime slot). RULED OUT: stack exhaustion;
      SIGSEGV/wild-pointer; basic-op miscompile (test-spec is green under jit, covering i64.mul etc.); the
      D-289 GPR frame paths (many_locals + many_locals_spill verify correct values). LEFT: a PRE-EXISTING
      miscompile in some op/INTERACTION at ed25519's scale (regalloc-spill × call, a specific control/memory
      pattern) producing a wrong value → a clean trap, newly exposed (ed25519 never JIT-ran before).
      ADVANCE (2026-06-06, A-unblocked): the now-precise CLI prints `trap kind=oob_table` = JIT code 2 = the
      **call_indirect bounds check** (cind_bounds_fixups; op_table get/set OOB use the generic bucket, so this
      IS a call_indirect). ed25519 has exactly **3 call_indirect** sites, ALL with the identical index recipe
      `i32.const 0; i32.load offset=16777416; call_indirect (type 0)`. `table 0 = (table 2 2 funcref)` (2 slots;
      elem puts func 15 at index 1) so a valid index is 0/1; the trap means the loaded index is ≥2.
      `(data (;1;) (i32.const 16777416) "\\01\\00\\00\\00")` initialises that addr to **1** (mem=257 pages
      ≈16.06MB, in-bounds). RULED OUT (minimal repro: memory 257 + that data seg + `i32.load offset=16777416`
      == 1, JIT+interp BOTH exit 0): large-offset data-segment init + large-offset scalar load are CORRECT in
      isolation (arm64 op_memory.zig guards offset>0xFFFFFF via MOVZ/MOVK, line 177/187). So the bug is an
      INTERACTION. ELIMINATION (2026-06-06, 6 minimal repros, ALL JIT==interp==correct): (1) large-offset
      data-init+load; (2) single data seg; (3) two same-address data segs (order); (4) ed25519's EXACT two
      segments — seg0 275B @0x1000000 overlaps 0x1000028 with byte **8** at +200, seg1 writes 1 @0x1000028 →
      v2 correctly applies seg1-last == 1 (so data-seg overlap is NOT it; 8 was the suspicious lead, refuted);
      (5) grep: 16777416 appears ONLY in the 3 loads + the data seg — NO runtime store targets 0x1000028;
      (6) the exact cind pattern `i32.const arg; i32.const 0; i32.load offset=16777416; call_indirect (type
      (param i32))` through a 2-slot table (elem func@1) runs CLEAN on JIT. ⇒ instantiation puts 1 @0x1000028
      and nothing structurally reproduces the corruption → it is a **context-dependent regalloc/spill miscompile**
      that corrupts the load-base (`i32.const 0`) or the index in ed25519's full execution scale, NOT a memory/
      data/cind-lowering bug. CAPTURED (6e49ecad, gated cind-index diag — `JitRuntime.trap_aux` repurposed from
      _pad12, arm64 EmitCindStub kind=2 stores W17 (the index, live from `CMP W17,Wsize`) before clobber,
      entry.zig prints `[d-291] cind_index`): ed25519 `--engine jit -Dtrace-stackprobe=true` → **cind_index=2397**
      (table size 2). 2397 is WILD garbage — NOT the loaded 1, NOT the overlap-8 → the index register holds a
      completely wrong value. RE-LOCALIZED (2026-06-06, 2 more gated diags — trap_aux2 from _pad4):
      (i) load VALUE == cind index == 2397 (`2aadd509`) → NOT a spill/operand swap between load and cind;
      (ii) load EFFECTIVE ADDRESS == **0x10000c8 = 16777416** (`5c70edcb`) → the funcptr load reads the CORRECT
      address (earlier "0x1000028" was an arithmetic slip; 16777416 = 0x1000000+200). ⇒ the load + cind are
      INNOCENT; **memory[16777416] is CLOBBERED** from its data-seg-init 1 to 2397 between instantiation and the
      trapping cind. wasmtime keeps the index ≤1, so a v2 **STORE MISCOMPILE** writes 2397 onto the C funcptr
      global at 0x10000c8. CLOBBERER FOUND (`af2e1f18`, gated store-watchpoint trap_aux3/trap_aux4 from
      _pad5/_pad6): `clobber_store_val=2397 clobber_func_idx=17`. Func 17 is a standard **128-bit multiply**
      (__multi3-style): writes the product to [local0+0] (low) + [local0+8] (high), local0 = result-buffer ptr.
      Func 17 is CORRECT — it is called with **local0 ≈ 16777416 (the funcptr global), a WRONG result buffer**.
      The bug is in func 17's CALLER (one of 733) computing the result-buffer (a stack temp) address as
      16777416. **CONVERGES WITH D-289** (arm64 large-frame-offset): 16777416 is ~65KB below the ~16.06MB stack
      top (mem=257 pages), so the temp sits at a ~64KB frame offset → the caller uses the D-289 `frameAddrLarge`
      two-ADD path (or a still-capped FP/param/stack-args arm D-289 flagged as REMAINING). D-291 is almost
      certainly a BUG in that large-frame address computation, exposed once D-289 let ed25519 compile.
      AUDIT (2026-06-06, subagent over gpr.zig frame* + emit.zig prologue/epilogue/param-marshal): RULED OUT the
      simple `(off>>12)&0xFFF` >16MB truncation (it only bites at off ≥ 0x1000000; ed25519 frames are KB, not
      16MB). VERIFIED (read gpr.zig): gprLoadSpilled (L150) + gprStoreSpilled (L203) are SYMMETRIC (both X-form,
      cap 32760, then frameAddrLarge) → no asymmetry; frameAddrLarge (L53) is correct for ed25519-sized (KB)
      frames; the D-289-REMAINING param/stack-args caps would ERROR (UnsupportedOp), not miscompute — so the bug
      is NOT in these helpers. KEY: 16777416 is in the **DATA region (>16MB)**; the C stack/heap are BELOW the
      data (16MB+), so a stack temp should be a LOW (<16MB) address — the caller computes an address ~16MB TOO
      HIGH = a GROSS miscompile, not a small frame-offset slip. (Also noted a LATENT non-D-291 gap: arm64
      epilogue frame-restore at emit.zig ~1636/~1675 lacks the prologue's `frame_bytes > 0xFFFFFF` guard.)
      ⚠️ RE-LOCALIZED 2026-06-06 (trap_aux5/6 caller-capture, gated `call 17` arg0 in op_call.zig) — the
      "caller passes a wrong result-buffer (733 suspects)" framing is REFUTED. trap_aux5 gates each `call 17`
      on X1 (wasm arg0 = result ptr, since X0=runtime_ptr) == 16777416 → it NEVER fired (tested at TWO
      positions: right after marshalCallArgs AND post-spillHomedCallerSaved). The unconditional capture shows
      the last `call 17` = caller func 8, arg0=**0xffc3b0** (a VALID stack addr, ~15KB below the 16MB top). So
      NO caller passes 16777416 — func 17 RECEIVES a correct result-buffer, yet its store still lands at
      16777416. ⇒ the corruption is INSIDE func 17 (or the call-tail), NOT a caller. func 17 is __multi3: it
      pushes `local.get 0` (result ptr) at the VERY START, then ~40 i64 ops of 128-bit-multiply (spill-heavy,
      reuses param slots via local.tee), then `i64.store offset=8` using that early-held ptr as base. The
      held result-ptr (0xffc3b0) is corrupted to **__stack_pointer_init + 0xC8 = 16777416** across the heavy
      computation = a context-dependent REGALLOC/SPILL miscompile of the long-lived `local.get 0` operand.
      ⚠️ "P1 / func-17-internal" was REFUTED + ROOT-CAUSED 2026-06-06 to a __STACK_POINTER corruption chain.
      The earlier exact-`==16777416` gate MISSED the real buffer (it's 0x10000c0; only buffer+8 = 0x10000c8 =
      16777416). A robust `>= 0x1000000` (data-region) gate on `call 17` arg0 (op_call.zig, trap_aux5/6) fired:
      **highbuf_caller=7, highbuf_arg0=0x10000c0** (= __stack_pointer_init + 0xC0, in DATA). So func 7 passes
      func 17 a DATA-region result buffer; func 17 faithfully stores the hi word to [0x10000c0+8]=0x10000c8 =
      the funcptr global → clobber. func 17 is INNOCENT (the minimal /tmp/m3b.wat repro is clean — it stores
      correctly for any buffer/operands; the absolute-value + small-vs-large self-check both pass). func 7 does
      `global.get 0; i32.const 400; i32.sub; local.tee 3; global.set 0` then passes local3/+144/+208/+272 to
      func 17 — i.e. func 7 read __stack_pointer ALREADY > 16MB. ROOT (first-wins sp-overset watchpoint on
      `global.set 0` value > 0x1000000, op_globals.zig trap_aux7): **sp_overset_func=11**. func 11 is the FIRST
      to set __stack_pointer above its 0x1000000 init-max (sp only ever decrements). func 11 epilogue =
      `local.get 2; i32.const 480; i32.add; global.set 0` (restore sp = local2+480 = sp_entry); its prologue
      `sp-480`. So func 11's RESTORE over-sets sp > 16MB — either local2 (saved sp) is corrupted across func
      11's internal calls (`call 14` etc. — a homed-local spill bug) OR the `local2 + 480` i32.add is
      miscompiled (large-base address add, D-289 lineage). CHAIN: func 11 over-restores sp → propagates → func
      7 reads corrupt sp, computes data-region buffers → func 17 clobbers the funcptr global → cind oob_table.
      MECHANISM CONFIRMED 2026-06-06 (trap_aux8/9 captures): **func 11's saved-SP local (local2) is corrupted
      to GARBAGE across its body.** func 11 reads a VALID sp_entry (f11_sp_entry=0xffd830, <16MB) but its
      epilogue sets sp = **bad_restored_sp=0xffffffb0 = -80 (garbage)** = local2 + 480 ⇒ local2 = -560 (0xfffffdd0)
      at the epilogue, when it should be sp_entry-480 ≈ 0xffd650. So local2 (the frame base / saved SP, held
      across func 11's `call 14` + `call 17` invocations) is clobbered → epilogue over-restores __stack_pointer
      to garbage. func 11 has 21 i64 locals + calls = high reg/spill pressure. This is the canonical "long-lived
      local corrupted across a call" bug — likely the ADR-0155 homed-caller-saved spill/reload (local2's home
      reg not preserved across the BL, or a spill-slot collision among the 21 locals). NEXT: (1) confirm via a
      gated capture of local2 IMMEDIATELY before vs after func 11's `call 14`/`call 17` (which call corrupts it);
      (2) inspect func 11's regalloc — is local2 register-homed in a caller-saved reg that spillHomedCallerSaved
      fails to spill/reload, or spill-slot-aliased? (3) minimal repro: a func with a global-backed frame-base
      local that survives a call, +many locals to force the same regalloc pressure. Likely fix in
