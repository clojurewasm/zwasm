  - id: "D-245"
    layer: "code"
    status: "partial"
    description: |-
      **FIXED both gate arches (no-arg void path): arm64 `8eca59e3` (Mac-verified) + x86_64
      `de576a76` (ubuntu ReleaseSafe-verified). `entry.invokeAndCheckVoid`'s no-arg branch now
      calls the JIT via asm that save/restores the host callee-saved set (arm64 stp/ldp X19-X28;
      x86_64 push/pop RBX/R12-R15 + sub/add $8 for 16-align). `zwasm run --engine=jit` (=
      runVoidExport, the CLI path) now works in ReleaseSafe on both arches.** REMAINDER (status
      partial): (a) win64 host→JIT entry still `@call` (windowsmini phase-boundary); (b) the
      arg'd / i32 / v128 `invokeAndCheck*` variants still `@call` — ReleaseSafe-unsafe but
      Debug-only-used (spec runner / test harness run Debug); same asm-save fix applies. (c) DONE
      (`0c42e913`): ReleaseSafe regression gate `scripts/check_jit_releasesafe.sh` (build
      ReleaseSafe + run a SIMD `_start` via `--engine=jit`) wired into `gate_merge.sh`; also
      silenced the leftover `[stack_probe]` stderr diagnostic in release builds. (Historical root cause below.)
      Host→JIT calls do NOT preserve the host's callee-saved registers → ANY JIT
      execution from the Zig host SEGV-corrupts the heap in **ReleaseSafe** (works in
      Debug). Surfaced via `zwasm run --engine=jit` (ADR-0136, `8011293a`): exit 134 on
      EVERY module incl. an EMPTY `_start` (so NOT body/SIMD/memory/deinit specific).
      **ROOT CAUSE (2026-06-03, bisected):** the arm64 JIT prologue MOV-installs the pinned
      runtime cohort (X19 host_dispatch_base, X24 typeidx_base, X28 vm_base, …; jit_abi.zig:9+)
      from `rt` WITHOUT stack-saving the caller's X19–X28 (ADR-0017 sub-2d-ii / D-210), so the
      JIT body CLOBBERS callee-saved regs and its epilogue can't restore them. But
      `entry.invokeAndCheckVoid` calls the JIT via a plain `@call(.auto, f, .{rt})` with f a
      `callconv(.c)` fn — a normal C call, where the caller (optimized Zig host) keeps LIVE
      values in callee-saved X19–X28 across the call, trusting the callee to preserve them.
      ReleaseSafe does keep live values there → the JIT clobbers them → the host then computes
      with garbage (e.g. a slice ptr ~0x18) → SIGSEGV in the first `free` after the call
      (`compiled.deinit`→`deinitFuncResult`, or `owned.deinit` — whichever runs first; both are
      victims). Debug keeps nothing live in X19–X28 across the call → no corruption (luck).
      BISECTION (the proof): skip `owned.deinit` → crash moves to `compiled.deinit:204`; skip
      `callVoidNoArgs` (the JIT call) entirely → NO crash (deinits run clean). So the JIT call
      is the corruptor, not the deinits. This is a LATENT PROJECT-WIDE host→JIT issue: all JIT
      execution from Zig (spec runner, runI32Export, …) is ReleaseSafe-unsafe — masked only
      because those run in Debug. `--engine=jit` is the first release host→JIT path, so it bit
      first. **Blocks §11.3 gap DATA** (`run_bench.sh` builds ReleaseSafe → zwasm rows = null).
      DISCHARGE: wrap the host→JIT entry boundary in an asm trampoline that saves/restores the
      host callee-saved set around the `blr`/`call` (arm64 X19–X28 + FP/LR; x86_64 RBX/RBP/
      R12–R15) — `entry.invokeAndCheck*`'s `@call` is the single seam. Survey whether a
      register-preserving entry already exists (the spec runner's path) to route through. ADD a
      **ReleaseSafe** `runWasmJit` regression test (the Debug-only test is why this shipped).
      NOT a regression to existing behaviour (interp default unaffected; JIT was Debug-only).
    first_raised: "2026-06-03"
    last_reviewed: "2026-06-03"
    refs: |-
      `src/engine/codegen/shared/entry.zig` invokeAndCheckVoid (the `@call` seam) + callVoidNoArgs; `src/engine/codegen/shared/jit_abi.zig:9+` (cohort X19/X24/X28 = arm64 callee-saved); ADR-0017 sub-2d-ii (MOV-install cohort, not stack-save) + D-210; `src/cli/run.zig` runWasmJit (Debug-only test); ADR-0136; ROADMAP §11.3 / 11.3-simd-gap bundle
  - id: "D-244"
    layer: "code"
    status: "partial"
    description: |-
      **PARTIALLY DISCHARGED 2026-06-03 (`8011293a`, ADR-0136): `zwasm run --engine=jit`
      now JIT-executes compute/SIMD modules — the compute-SIMD CLI gap is closed and §11.3
      is unblocked. RESIDUAL: WASI I/O + `proc_exit` exit-code under the JIT (the d-3
      follow-up) — `--engine=jit` is compute-only; realworld WASI tools still need the
      interp (default).** (Historical root cause below.)
      `zwasm run` (default interp) traps `Unreachable` on ANY SIMD-128 op. ROOT CAUSE
      (2026-06-03, §11.3 ch3, corrected on 2nd dig):
      **SIMD execution is JIT-ONLY by design; the interp has NO SIMD execution, and
      `zwasm run` is always the interp.** Evidence: (1) `test/spec/simd_assert_runner.zig:1`
      = "SIMD spec assertion runner — JIT-execute"; the interp-side runner is
      `spec_assert_runner_non_simd` (the split is deliberate — §9.12-E exit shows
      `simd_assert_runner` 13301 pass via JIT vs `spec_assert_runner_non_simd` for scalar).
      (2) The per-op interp handlers are `NotMigrated` STUBS, not real impls
      (`i32x4_add.zig:30 interp_i32x4_add() → error.NotMigrated`; signature
      `fn() DispatchError!void` ≠ `InterpFn`, so `populateDispatchTable` correctly skips
      them). (3) No `@Vector` SIMD arithmetic exists anywhere under `src/interp/`. (4)
      `build_options.engine_mode` is DISCARDED at runtime (`main.zig:179 _ =
      build_options.engine_mode`), so even an `-Dengine=jit` build's `zwasm run` stays on
      the interp C-API path (`instance.zig:918 dispatchTable()` → `dispatch.zig:43`
      `table.interp[idx] orelse Trap.Unreachable`). So a SIMD op → null interp slot → trap.
      P12 (interp==jit) is NOT asserted for SIMD — interp SIMD was intentionally not built.
      PROVEN: `(func (export "_start") (v128.store 0 (i32x4.add ...)))` traps on `zwasm run`,
      runs clean on wasmtime/wazero/wasmer; an i32-only `_start` runs fine on zwasm.
      IMPLICATIONS: (a) **§11.3 SIMD gap analysis cannot bench zwasm via `zwasm run`** — it
      needs a JIT-EXECUTE bench path (zwasm JIT-compiles + runs the SIMD module + times it,
      as `simd_assert_runner` does via `engine.runner.CompiledWasm`). There is no CLI/bench
      JIT-execute entry point today. (b) Standalone v0.1.0 product gap: SIMD modules are
      unrunnable via the CLI at all (only via the JIT test harness). Discharge options
      (DESIGN-GRADE — may need an ADR): a `zwasm run --engine=jit` path that honours
      engine_mode and routes SIMD modules through the JIT executor; OR a dedicated
      bench-jit runner exe for §11.3 only; OR implement interp SIMD (huge: 207 ops, and
      contradicts the JIT-only design). The §11.3 prerequisite = the JIT-execute bench path.
    first_raised: "2026-06-03"
    last_reviewed: "2026-06-03"
    refs: |-
      `test/spec/simd_assert_runner.zig:1` (JIT-execute SIMD runner) + `spec_assert_runner_non_simd` (interp scalar runner); `src/instruction/wasm_2_0/i32x4_add.zig:30` (interp_i32x4_add → NotMigrated stub); `src/interp/dispatch.zig:43` (null slot → Trap.Unreachable); `src/api/instance.zig:918` (interp-only dispatchTable); `src/cli/main.zig:179` (engine_mode discarded); `src/engine/runner.zig` CompiledWasm (the JIT-execute path); ROADMAP §9.12-E / §11.3 / D-074 / 11.3-simd-gap bundle
  - id: "D-239"
    layer: "code"
    status: "partial"
    description: |-
      JIT compile-path REJECTS function-references modules (br_on_null / br_on_non_null /
      ref_as_non_null) — a §10-exit in-phase must-fix (ADR-0133 §4; NOT deferrable). TWO
      gaps (this turn's ground-truth, 2026-06-03; supersedes the handover's loose "D-198"
      attribution — D-198 is the INTERP GC rec-group subtyping debt, a different thing):
      (A) **VALIDATOR StackTypeMismatch** — ROOT CAUSE PINNED: the shared
      `validate/validator.zig` types `ref.func N` as the PRECISE `(ref func_type_indices[N])`
      ONLY when its `func_type_indices` map is non-empty (ADR-0123 D4, validator.zig:359/2416-2423);
      empty → legacy abstract `funcref`. The INTERP path BUILDS this map (func-idx→typeidx,
      imports-first) at `instantiate.zig:128-143` and passes it (`:386`) → `ref.func $f` :
      `(ref $t)` → passes. The JIT `compile.zig` validate path does NOT build/pass it → `ref.func`
      = abstract funcref → not a subtype of a `(ref $t)` param → StackTypeMismatch. Repro:
      br_on_null.0 func[4] `nonnullable-f` = `(call $nn (ref.func $f))` (no br_on_null even) fails.
      FIX: in `compile.zig`, build `func_type_indices` (mirror instantiate.zig:128-143:
      imported funcs' typeidx ++ defined funcs' typeidx) and thread it into the function-validate
      call (find the `validator`/`rv.validateFunction...` invocation; it currently passes `&.{}`/omits).
      (B) **EMIT UnsupportedOp** — the arm64/x86_64 op handler FILES exist
      (`codegen/{arm64,x86_64}/ops/wasm_3_0/{br_on_null,br_on_non_null,ref_as_non_null}.zig`) but are
      NOT wired into the per-arch emit dispatch (`codegen/arm64/emit.zig` switch has no entry → br_on_null.1
      hits `arm64/emit: failing op br_on_null`). FIX: add the 3 dispatch cases (verify the handler files
      are REAL, not inert stubs, per lesson `2026-06-02-instruction-wasm3-stubs-are-inert-metadata-anchors`).
      Note A is the primary blocker (4 of 5 fr-rejects + downstream); B only matters once A lets modules
      reach emit. Sibling rejects likely sharing root A: ref_is_null ElemSegmentTypeMismatch +
      ref_null InvalidGlobalInitExpr (const-expr ref typing) + the gc i31.6 — verify after A.
      Distinguishing probe done: func_type_indices is the shared-validator knob; interp populates, JIT doesn't.
      **PARTIAL (RESOLVED 2026-06-03, `faf23f0a`)**: both named gaps fixed — (A) `compile.zig` now passes the
      already-built `func_typeidxs` to `validateFunctionAndCollectSelectTypesWithMemory` (new param); (B) the 3
      ops wired into BOTH arm64 + x86_64 emit dispatch (x86_64 cross-compiled). function-references JIT dir
      8/0/31 → 20/0/19 (+12), global 796/1 → 808/1, no regression, +1 regression test. Resolved 5 of 8 fr
      rejects. **REMAINING 3 (distinct mechanisms, this row tracks them)**: (1) `br_on_null.1` UnsupportedOp —
      the emit handler is first-cut "forward-block targets only; function-return + loop targets → UnsupportedOp"
      (br_on_null.zig docstring); needs the loop/return-target emit path. (2) `ref_is_null.0`
      ElemSegmentTypeMismatch — NOT a ref.func issue; an elem-segment reftype validation gap on the JIT compile
      path. (3) ✅ `ref_null.0` DONE (`195856a1`): `rv.validateGlobalInitExpr` 0xD0 arm now reads the heaptype
      as s33 (non-negative = concrete typeidx → concrete ref); function-references 20/0/19 → 23/0/16, global
      808/1 → 811/1. ✅ `br_on_null.1` DONE (`be5a1a32`): arm64 br_on_null rerouted through the shared
      `op_control.branchOnReg` (function-return/loop/block; null-flag in a reserved scratch). Residual 1 left
      (`ref_is_null.0` = typed-ref table runtime → **D-240**, blocked). x86_64 br_on_null function-return parity
      still first-cut (arch-parity, D-238 bucket). Other §10 rejects: tail-call return_call_indirect (D-210),
      gc i31.6 (D-240 class), UnsupportedEntrySignature ×7.
    first_raised: "2026-06-03"
    last_reviewed: "2026-06-03"
    refs: |-
      `src/validate/validator.zig:359` (func_type_indices field) / `:2416-2423` (ref.func precise typing) / `:597`; `src/runtime/instance/instantiate.zig:128-143` (interp builds the map) + `:386` (passes it); `src/engine/compile.zig` (JIT validate call — must build+pass); `src/engine/codegen/arm64/emit.zig` (dispatch switch — add 3 cases) + `codegen/arm64/ops/wasm_3_0/{br_on_null,br_on_non_null,ref_as_non_null}.zig`; ADR-0123 D4; ADR-0133 §4 (in-phase must-fix); test/spec/wasm-3.0-assert/function-references/raw/br_on_null.wast
  - id: "D-238"
    layer: "code"
    status: "blocked-by"
    description: |-
      x86_64 parity for cross-instance EH on JIT (ADR-0134 cycle 3). Cycle 2b
      (`4f73d9ee`) made cross-instance EH work on **arm64** (Mac): the bridge thunk
      now `MOV X29,SP` FP-links its frame so the FP-walk unwinder reaches the caller
      frame, + the spec runner registers instances in `eh_registry` + per-frame
      table dispatch. The x86_64 bridge thunk (`src/engine/codegen/x86_64/thunk.zig`)
      was NOT given the equivalent RBP-frame-link, so a cross-instance JIT throw on
      x86_64 still can't reach the caller's catch (the thunk frame isn't a chain
      link; cf. the D-184 "sniffed" RBP read for the `PUSH RBP; PUSH R15; MOV RBP,RSP`
      prologue — the x86_64 thunk needs a matching RBP setup so `loadFrameSniffed`
      traverses it). NOT gated by the default 3-host `test-all` (the JIT corpus is
      Mac-only, opt-in `ZWASM_SPEC_ENGINE=jit`), so no regression today — this is an
      arch-parity gap, lower priority than the Mac JIT correctness that drives §10.
      ALSO ship ADR-0114's `cross_module_throw_propagation.wat` edge fixture (the
      removal-condition fixture) once x86_64 lands so both arches are covered. FIX:
      mirror the arm64 D1 change on the x86_64 thunk (establish an RBP frame the
      unwinder can walk), verify on `ubuntunote` via a JIT-corpus run of the EH dir.
    first_raised: "2026-06-03"
    last_reviewed: "2026-06-03"
    refs: |-
      `src/engine/codegen/x86_64/thunk.zig` (needs RBP frame-link); `src/engine/codegen/arm64/thunk.zig` (the arm64 D1 reference, `4f73d9ee`); `src/engine/codegen/shared/frame_chain_adapter.zig:60-76` (x86_64 sniffed read, D-184); ADR-0134 cycle 3; ADR-0114 (cross_module_throw_propagation.wat removal cond)
