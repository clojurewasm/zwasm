  - id: "D-314"
    layer: "code"
    status: "note"
    description: |-
      note (RE-SCOPED 2026-06-12 — the sandboxing-triad bundle d314-jit-sandbox
      CLOSED; what remains here is the long-tail design-upgrade list). SHIPPED,
      3-host green: interrupt/cancel + fuel + memory-cap on BOTH engines + CLI +
      C-API — JIT prologue interrupt poll both arches (c1a9da15/6d56f517), loop
      back-edge interrupt polls + R15-forcing + RUNNING-loop thread-raiser tests
      (72801881/b365c190), JIT fuel via fuel_metered/fuel_cell polls beside the
      interrupt polls with kind 17 = TrapKind.out_of_fuel (a6d7ae72, design rev
      in ADR-0179), JIT memory cap via MemGrowCtx.host_max_pages (866d784e), CLI
      --fuel/--timeout/--max-memory on both engines (ce2ded2b, io-event-loop
      timer -> shared interrupt flag), C-API zwasm_instance_* setters +
      zwasm_trap_kind + real zwasm.h (f1a88e77).
      REMAINING (design upgrades, demand-driven):
      (a) epoch-COUNTER (per-store deadline ticks) over the v0 binary flag +
          a runtime-level pre-instantiate StoreLimits struct (ADR-0179 draft).
      (b) ~~JIT-side table-elements limit~~ DONE 2026-06-15 (`bd355258` initial eager-alloc
          early-reject in runWasiLenient + `fa4678f4` jitTableGrow honors rt.store_table_elements_max,
          set from RunLimits.max_table_elements; CLI `--max-table-elements`). Sandbox triad's table
          leg now cross-engine. JitRuntime gained a trailing `store_table_elements_max` (maxInt=unlimited).
      (c) .cwasm + component CLI limits threading (today the CLI REFUSES the
          flags there loudly rather than running unsandboxed).
      (d) facade/C-API JIT-backed instances (the SEAM asserts in
          zwasm/instance.zig stay; rides
          .dev/architecture/jit_facade_integration_scope.md — the gating spike
          is the generic argument-ABI trampoline).
      (e) JIT poll code-size: prologue ~60 B + per-back-edge 48 B (arm64) /
          62 B (x86_64) + stubs, unconditional per fn — MEASURE on a realworld
          corpus, consider an opt-in compile flag (perf-measure-first).
      CW-V1 IMPACT = NONE (cw consumes the interp-only facade; its untrusted
      code already runs sandboxed).
