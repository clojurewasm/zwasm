  - id: "D-292"
    layer: "code"
    status: "note"
    description: |-
      note (user-directed 2026-06-05; ADR-0164): trap/crash/exception diagnostics & UX are opaque +
      inconsistent across engines. The JIT path prints a bare `Trap` (no kind) where v1 + v2-interp give
      per-kind messages — a v1-parity regression (surfaced by D-291). Program (ADR-0164, time-consuming →
      FRONT of the clean session): A) surface the specific trap KIND + message on ALL engines (wire the JIT
      trap-code → `Trap` kind → interp-parity `surfaceTrap`); B) crash-vs-trap distinction (internal SIGSEGV/
      @panic = INTERNAL ERROR not `Trap`; ideal zero host-crash; restrict the `[stack_probe]` diag to genuine
      stack-overflow). **B-core: ✅ DONE (ADR-0166; bundle closed). Investigation corrected the stale "no signal
      handling" premise (production installs ZERO handlers; the VEH/test-runner ones are JIT-recovery/test-only).
      Impl: POSIX sigaction (c395cf64) + Windows VEH (8c076db2) + First=1 fix (400c7006, the gate caught it
      losing to Zig's own First=0 segfault VEH) → internal SIGSEGV now prints "internal error" + exit 70 (vs
      clean trap exit 1 / silent signal). `test-internal-fault` build step in test-all, 3-host GREEN incl.
      windows OK @400c7006. Lesson 2026-06-06-windows-custom-fault-veh-must-be-first.** **C) ✅ DONE
      (c2650de5): JIT uncaught throw/throw_ref → uncaught_exception (code 12), both arches — fixed a latent
      x86_64 mis-report (uncaught JMP → unreach_fixups = code 5). interp parity.** **D) ✅ DONE (2026-06-06,
      subagent audit vs wasmtime 43 / wasmer 5 / v1): zwasm-v2's trap messages match the spec canonical strings +
      wasmer/v1 (better than v1's non-canonical wording); exit-1-for-traps aligns with wasmer/v1 (wasmtime=134
      outlier); no wasm-backtrace = acceptable per ADR-0159 minimalism (wasmer/v1 also omit it). The ONE real
      finding (JIT call_indirect null-elem mislabel) → filed D-294; minor "undefined element" wording also in
      D-294.** **⇒ ADR-0164 trap-crash-exception-diagnostics PROGRAM COMPLETE (A + B-core + C + D + D-293).**
      Remaining product fixes are debt-rowed (D-294, D-291). (Historical: workstream A first UNBLOCKED D-291.)
      PROGRESS (b6da8604, 2026-06-06): workstream A CLI surface done — JIT/AOT run paths thread trap_kind →
      trap_surface.jitTrapCode → CLI per-kind message; single-message interp-parity (double-`Trap` bug fixed,
      genuine trap = exit 1 not re-raised error.Trap).
      PROGRESS (A1 6fcbabbd / A2 687d1a73 / A3 this-commit, 2026-06-06): codegen widening DONE for the COMMON 4
      trap kinds — unreachable=5, oob_memory=6, div_by_zero=7, int_overflow=8 now record PRECISE per-kind codes,
      UNIFIED across arm64+x86_64 (was the arch-divergent generic bucket). Mechanism: dedicated per-kind trap
      stub + per-kind fixup channel demuxed from the shared bounds_fixups (arm64 EmitCindStub / x86_64
      emitTrapExitStub). A1+A2 3-host green (Mac+ubuntu+windows, dca1b7a1). REMAINING A→0 for the common 4;
      the OTHER still-generic kinds (oob_table, invalid_conversion, trunc int_overflow, null_reference,
      cast_failure, array_oob) are filed as D-293. Then B (scope [stack_probe]) / C / D.
      DISCHARGE: all engines emit clear per-kind trap messages + crash/trap/exception cleanly distinguished +
      audit-gap list closed-or-deferred.
