  - id: "D-475"
    layer: "code"
    status: "note"
    description: |-
      i64-indexed TABLES (memory64's table extension) are rejected at parse
      (gap-class #2: wasm-tools accepts `(table i64 0 funcref)`, zwasm → "module
      decode/validate failed"). Found by the smith_v4 campaign (custom-page-sizes
      + memory64 features); minimal repro `(module (table i64 0 funcref))`. zwasm
      supports memory64 MEMORIES (D-209) but tables are modelled as i32-indexed
      only — `TableType` carries no `idx_type` field, and the table-op runtime
      (table.get/set/grow/size/fill/copy/init, call_indirect, elem-segment offset)
      assumes i32 indices. So this is NOT a quick parse-acceptance fix (unlike the
      GC-reftype gap @fae437597 where the runtime was already ready) — it needs
      `TableType.idx_type` + i64-index threading through the table ops + the JIT
      bounds-check codegen. DISCHARGE: a memory64-table feature slice (model the
      idx_type, widen the table-op index path, JIT i64 table bounds). The
      runtime memory64 memory path (D-209) is the precedent for the idx_type
      plumbing. Counterpart shared-everything-threads smith modules are a SEPARATE
      out-of-scope proposal (correct to reject). PRIORITY ELEVATED 2026-06-20:
      this is a SPEC-CONFORMANCE gap, NOT just niche-completeness — the Wasm 3.0
      spec testsuite RAW corpus already contains i64-table tests (`memory64/raw/
      table.wast:50` = `(table i64 0 funcref)`, `table_copy_mixed.wast` =
      `(table $t64 i64 30 30 funcref)` + i64-index table.copy, `call_indirect.wast`
      = `(table $t64 i64 funcref)`), but they are NOT DISTILLED into a runnable
      `memory64/table*/` subdir (only the memory ops — load64/memory_copy/fill/
      grow64/etc. — are distilled), so zwasm's "100% spec, 0 skip" claim silently
      OMITS the i64-table coverage. So the IMPLEMENTATION HAS A READY TDD CORPUS:
      distil the raw memory64 `table*.wast` + `call_indirect.wast` i64 cases and
      drive the feature to green against them (the gap closes when those distil +
      pass on both engines + 3 hosts).
      SLICES 1+2+3 DONE — table64 fully works under the INTERP (reference engine).
      Slice 1 @3cbc804ef: parse i64 table TYPES (zir.IdxType + TableEntry.idx_type,
      readLimits decodes the 0x04 bit defined+imported, v3_0-gated). Slices 2+3
      @389131e36 (bundled — slice 2 alone = validates-but-mis-executes hazard):
      slice 2 = validator per-table index width (tableIdxType → 7 table-op +
      call_indirect sites; table.size/grow push i64; i32-on-i64 now rejects);
      slice 3 = interp runtime (TableInstance.idx_type; handlers pop index/n +
      push size/grow at width; FULL i64 read so a >2^32 index trips OOB — real
      correctness fix; overflow-safe grow). Enabled by validator_helpers.zig
      extraction @d96297628 (restored cap headroom). JIT GUARD @389131e36:
      compileWasm rejects i64-table modules with Error.JitTable64Unsupported (the
      JIT codegen still indexes at i32 width — clean fail, not silent miscompile;
      interp doesn't route through compileWasm). SLICE 5 (spec corpus) @3454905ef
      + @a7609a65b: distilled 11 of 13 table64 spec dirs into wasm-3.0-assert,
      ALL interp-green (table_get/set/fill/size/copy/copy_mixed/init/call_indirect/
      -sub/br_table/return_call_indirect; memory64 manifests 10→21). The @a7609a65b
      fix = i64-table active ELEMENT-segment offset (interp used i32-only
      evalConstI32Expr → InstantiateFailed / i32-truncated offset mis-populated the
      table → call_indirect/table.copy/table.init wrong) — routed through the
      i64 evaluator; turned table_copy(1220 traps)/table_init(632)/call_indirect(104)
      fully green. The u64-LIMITS fix @cf02b765c: a table64 declares u64 min/max
      (spec §5.3.5) but TableEntry kept them u32 (slice-1), so readLimits' u32 LEB
      read overflowed and rejected valid `(table i64 0 4294967296 funcref)` /
      max=2^64-1 types (table.30/32 ValidateFailed). Widened TableEntry +
      TableInstance + C-API table handle min/max to u64 (~12 files; wasm-c-api/JIT/
      AOT saturate to u32, i64 tables JIT-guarded); closed table.30/32. SELF-CONTAINED
      table64 is now FULLY interp-conformant (11/13 spec dirs green). The last 2
      dirs (table.12/34, table_grow.6/7 = UnknownImport) are a HARNESS-COVERAGE gap,
      NOT a zwasm conformance miss (lesson `2026-06-20-spec-harness-cross-module-
      table-unwired`): the spec-assert harness wires `(register)` cross-module
      imports for func (resolveCrossModuleImports, kind!=.func continue) + global
      (applyImportedGlobalsFromRegistered) ONLY — no table/memory equivalent — so a
      module importing a registered TABLE fails LinkError.UnknownImport. NOT
      table64-specific (i32 cross-module register-table fails identically); zwasm's
      linker DOES support it (Linker.defineTable→TableAlias, D-201b). To close: add
      applyImportedTablesFromRegistered to the harness (mirror the globals path) —
      read-only imports only; table_grow.6 GROWS an imported table + TableAlias
      value-snapshots refs (stales on cross-module grow), needing *TableInstance
      pointer-sharing (D-199 memory precedent) first. (4) JIT i64 table-bounds
      codegen — **DONE 2026-07-06** (develop/d475-table64-jit, C1-C4): C1 widened
      TableSlice.len/max→u64 (stride 24→32; tableslice_{len,funcptrs}_off consts)
      + JitRuntime.table_size→u64 (absorbed _pad0, offsets unchanged) +
      table_grow_fn (u64 delta / i64 result) + jitCallIndirectResolve (u64 idx) +
      per-table idx_types threaded onto ZirFunc (tableIdxType accessor); C2/C3
      idx_type-conditional index widths on BOTH arches (get/set/grow/fill/copy/
      init + call_indirect/return_call_indirect inline + subtype-trampoline) with
      ADDS+B.HS / ADD+JC wrap guards on i64 sums (memory64 pattern; i32 tables
      byte-identical); C4 removed JitTable64Unsupported + fixed two interp-
      fallback-masked JIT-setup gaps (elem offset evalConstI32Expr→
      evalConstOffsetU64 in setup.zig; elem offset_expr validated .i32-fixed→
      per-target-table elemOffsetValType in compile.zig — the @a7609a65b JIT
      mirrors). Forced `--engine jit` sweep over all 11 distilled table64 dirs
      clean. REMAINING (unchanged scope, NOT table64-specific): the harness
      cross-module register-table wiring above (table.12/34, table_grow.6/7).
    first_raised: "2026-06-20"
    last_reviewed: "2026-07-06"
    refs: |-
      src/engine/codegen/shared/jit_abi.zig (TableSlice u64 len/max; table_size u64)
      src/engine/codegen/{arm64,x86_64}/{op_table,op_call,op_tail_call}.zig (idx_type widths)
      src/engine/compile.zig (elemOffsetValType), src/engine/setup.zig (u64 elem offsets)
      test/spec/wasm-3.0-assert/memory64/ (11 table64 dirs, JIT-native)
