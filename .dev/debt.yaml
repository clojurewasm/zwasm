  - id: "D-331"
    layer: "code"
    status: "partial"
    description: |-
      **PRIMARY GAP FIXED 2026-06-15 `10d7d2b2`**: the root cause was a FIXED `[256]Frame` control-
      nesting stack in the JIT liveness pass (`max_control_stack=256`) — fat standard-Go runtime funcs
      (go_hello_wasi func[303]: 11151 instrs, >256 nested blocks) overflowed it. Made `block_stack` an
      allocator-backed slice that doubles on demand. Result: realworld JIT compile-pass **47/56 → 55/56**
      (8 of 9 go_* flip compile-op → compile-pass); `zig build test` green (no regression); boundary
      fixture `test/edge_cases/p9/block/deep_control_nest_300` (300 blocks → i32:42).
      ---
      **(A) ENTRY-SIG HYPOTHESIS WAS A RED HERRING — REAL CAUSE FOUND + FIXED 2026-06-15**: the
      `UnsupportedEntrySignature` for go_* did NOT come from `runWasiLenient`'s entry gate at all (a
      debug print placed there never fired). Tracing UPSTREAM: it came from `setupRuntimeLinked`
      (setup.zig) — a **fixed `table_size > 4096` reject** (`globals_count > 4096` shares the line). Go
      wasip1 declares a ~5790-entry funcref table → tripped the cap; the interp (instantiate.zig allocs
      `min` cells uncapped) ran go_* fine — the exact dynamic-vs-fixed pattern as the [256]Frame control
      stack. FIX: removed the arbitrary cap (both buffers are allocator-backed below, no fixed-array
      dependency). Boundary fixture `test/edge_cases/p10/large_table/over_4096` (5000-entry table → i32:42).
      go_hello now COMPILES + INSTANTIATES + RUNS — prints correct stdout ("Hello from Go/WASI!").
      **BUT this revealed the genuine deep gap**: go_* then **JIT-MISCOMPILE** — Go's runtime detects
      internal corruption AFTER the correct output (NON-DETERMINISTIC across runs: `poll_oneoff` fatal /
      `badmorestackg0` / `unlock of unlocked lock` / `switchToCrashStack0`). Non-determinism ⇒ a
      memory-corruption miscompile (uninit reg/stack-class), D-330/D-283 class — NOT an entry-sig or
      WASI-host gap (poll_oneoff is wired, jit_dispatch.zig:352, same impl as interp).
      CHARACTERIZED 2026-06-15 (subagent, arm64): (1) go_hello stdout is BYTE-IDENTICAL to interp (91 B,
      fully correct) — corruption is ONLY in Go-runtime teardown, after the visible work. (2) Root fault
      = `runtime.panicmem`/`sigpanic` (a WILD/NIL POINTER DEREF) in `runtime.main`; the top-line
      `poll_oneoff` "fatal error / panic during panic" is a CASCADE (freezetheworld re-enters WASI while
      panicking) — a secondary symptom, not the cause. (3) Deterministic within a session (5 runs
      byte-identical) but cross-session message variation (badmorestackg0/unlock-of-unlocked) ⇒ heisenbug,
      state/timing-sensitive corruption (NOT a fixed wrong constant). (4) No env/fuel/ZWASM_JIT_RUN knob
      influences it. HYPOTHESIS: a store with wrong width/offset OR a clobbered callee-saved/scratch reg in
      a HOT Go-runtime helper (GC write-barrier / memmove / linear-mem bounds path) leaves a bad heap/stack
      pointer, latent until the teardown deref. DISCHARGE (A-next): build a per-function interp-fallback
      bisect (run a function-exclusion list under interp, rest JIT) to localize WHICH compiled go-runtime
      func introduces corruption — this INFRA does not exist yet (build it first) — OR heap-checksum diff
