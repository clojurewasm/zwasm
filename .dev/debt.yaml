  - id: "D-506"
    layer: "code"
    status: "note"
    description: |-
      FP spill stage-2 scaffold (D-505 follow-on). arm64 has only 2 FP spill
      stages (V29/V30; `abi.fp_spill_stage_vregs`), so the 3-source SIMD handlers
      `emitV128Bitselect` / `emitV128FpFma` (and the mirror `emitV128Select`)
      cannot spill-stage their 3rd/4th live V operand — a spilled v1/v2 (a/b) hits
      a bare `resolveFp` → `UnsupportedOp` → the `.auto` JIT falls back to interp
      (correct, ADR-0200; just loses JIT for that module). These sites are
      `// SPILL-EXEMPT` (op_simd.zig). NOT a correctness bug — a JIT-coverage /
      perf cliff under high v128 pressure. FULL fix = extend the FP spill scaffold
      to a 3rd stage (V31) with careful sequencing (c is consumed into dst before
      v1/v2 are needed, freeing its stage) AND reconcile with the D-070 V31
      alias-stash. Non-trivial handler redesign + `abi.zig` reservation change →
      own ADR when a real high-pressure-SIMD consumer or bench motivates it.
    first_raised: "2026-07-03"
    last_reviewed: "2026-07-03"
    refs: |-
      src/engine/codegen/arm64/op_simd.zig (emitV128Bitselect / emitV128FpFma
      SPILL-EXEMPT) · src/engine/codegen/arm64/abi.zig:229 fp_spill_stage_vregs ·
      D-070 (V31 alias-stash) · D-505 (discharge, git log)
