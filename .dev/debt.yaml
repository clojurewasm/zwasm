  - id: "D-525"
    layer: "build"
    status: "note"
    description: |-
      The `-Dgc` build option is INERT: `build.zig` threads it to
      `build_options.enable_gc`, whose only reader is the
      `src/feature/gc/register.zig` re-export that nothing consumes —
      GC compiles in (and executes) whenever `-Dwasm=v3_0` (the default);
      the actual strip lever is the wasm-level DCE (`check_build_dce.sh`
      asserts `gc_struct`/`i31_new` absent from v1_0/v2_0 builds only).
      ADR-0115 §3 planned `enable_gc` as the op-handler compile-time gate
      ("WAMR-equivalent nuclear strip") but the op handlers never adopted
      it. DISCHARGE (pick one): (a) wire the gate — branch the wasm_3_0
      GC per-op registrations/handlers on `enable_gc` + extend
      check_build_dce with a `-Dgc=false` leg (binary-size relevant,
      cf. ADR-0204); or (b) retire the flag + the register.zig re-export
      and amend ADR-0115 §3. Docs corrected 2026-07-17 (migration guide
      no longer claims "GC opt-in via -Dgc").
    first_raised: "2026-07-17"
    last_reviewed: "2026-07-17"
    refs: |-
      ADR-0115 §3; scripts/check_build_dce.sh; migration_v1_to_v2.md §3.2
  - id: "D-522"
    layer: "api"
    status: "note"
    description: |-
      Binary-size campaign lever #1 (ADR-0204 D1): collapse the
      `api.jit_host_bridge` comptime thunk cross-product — 1,311 KB / 5,453
      syms, i.e. 92% of the whole api.* bucket (t2fp × 2,880 = 900 KB,
      t1fp × 960 = 282 KB, t0..t4 × 320 each ≈ 124 KB; measured 2026-07-16,
      ReleaseSafe arm64 CLI 5,282,584 B at 71cccba76). Axes characterized
      2026-07-16: arg-kinds x RetKind(5) x MAX_HOST_SLOTS(64); the x64
      slot axis exists only to comptime-hardcode the slot index K.
      **Stage 1 DONE 2026-07-16** (shared noinline fpBridge1/fpBridge2
      bodies; thunks forward-only): jit_host_bridge 1,311 KB -> 232 KB
      (-82%), whole CLI 5,282,584 -> 4,173,736 B (-21%), no ABI change.
      Campaign CLOSED with stage 1 (v2.2.1; ADR-0204 Implemented).
      RESIDUAL = stage 2 only: collapse the x64 slot axis by conveying K
      at runtime (call site materializes the slot index before BLR) —
      remaining recoverable ~200 KB (209 KB of per-slot thunks -> ~15 KB
      shared), against a JIT call-sequence change on both arches + AOT
      format touch. Demand-driven; trigger = a real embedder squeezed on
      size after v2.2.1, or the next size campaign. Do not grind
      speculatively (measure-first; cf. the D-521 refutation lesson
      2026-07-16-outlining-once-called-handlers-size-neutral.md).
      Constraints unchanged: no api break, no per-call regression beyond
      noise (ADR-0181 bench series).
    first_raised: "2026-07-16"
    last_reviewed: "2026-07-16"
    refs: |-
      ADR-0204 D1; from_cljw_05 request 2 (re-prioritized: thunk
      cross-product >> api-surface gating, which ADR-0073 already covers)
    front: binary-size
  - id: "D-509"
    layer: "code"
    status: "note"
    description: |-
      Front G-senior-gap (v0.2.0-line, big — schedule as its own campaign, not
      a /continue drive-by). **Threads proposal multi-agent completion.**
      Probe-verified 2026-07-06: zwasm ALREADY executes the threads opcodes
      single-agent (shared-memory parse + i32.atomic.load + memory.atomic.wait32
      correct via ADR-0168 atomic_* callbacks) — the gap is ACTUAL concurrency:
      (1) shared Memory objects across instances/threads (today each instance
      owns its memory; needs refcounted shared backing + coordinated grow —
      cf. D-199 pointer-sharing precedent); (2) host thread spawn surface
      (wasi-threads or WASIX-style thread_spawn; peers: WAMR lib-pthread +
      thread-mgr + lib-wasi-threads, wasmer WASIX futex/thread_spawn);
      (3) REAL wait/notify blocking semantics cross-thread (current wait
      returns immediately per single-agent semantics — verify + fix);
      (4) interp `Diagnostic` is `threadlocal` (existing blocked-by row notes
      the Phase-14 mapping decision); (5) JIT codegen: atomics must become
      genuinely atomic under contention (LSE/lock-prefix widths audit).
      proposal_watch: Threads = Phase 4, zwasm intent v0.2.0. ADR + ROADMAP
      §9-scope amendment required at kickoff (per §18.2).
