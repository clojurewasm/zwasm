  - id: "D-315"
    layer: "code"
    status: "blocked-by"
    description: |-
      blocked-by (FOLLOW-TIME half needs cross-platform path-resolution rework +
      3-host test): WASI `path_*` confinement is escape-guarded on the GUEST path
      (`pathHasParentEscape` rejects absolute + `..`; resolution is `openat`-relative
      via a preopen dirfd). PLANT-TIME symlink confinement is now DONE
      (`symlinkTargetEscapes`, @<this>): a guest can no longer CREATE a symlink whose
      target escapes the preopen root (lexical containment vs the link's depth;
      absolute targets refused) → the "plant then read through it" escalation is
      closed for symlinks created via zwasm's API. REMAINING (the blocked half): no
      cap-std-style "beneath" confinement at FOLLOW time — `path_open`/`statFile`/
      `readLink` follow modes delegate to `std.Io.Dir` with no RESOLVE_BENEATH /
      O_NOFOLLOW component walk, so a PRE-EXISTING on-disk symlink (placed by
      something other than the guest, inside an operator-granted writable preopen)
      that escapes would still be followed. Only bites once a writable preopen
      containing attacker-or-foreign symlinks is granted to untrusted code (no
      embedder does today; CLI `--dir` is operator-chosen). あるべき論 fix: resolve
      each path component within the preopen, following symlinks only while they
      stay beneath the root (Linux `openat2(RESOLVE_BENEATH|RESOLVE_NO_MAGICLINKS)`;
      a manual component walk with `O_NOFOLLOW` + re-resolve elsewhere; or a
      post-resolve realpath-prefix check). Blocked because `std.Io.Dir` exposes no
      openat2/O_NOFOLLOW (the file deliberately avoids `std.posix` for Win64), the
      Host stores only `(host_handle, guest_path)` not a root PATH (so a realpath
      check needs new state), and the fix needs Mac+Linux+Windows verification.
      DISCHARGE: when FS-grant-to-untrusted ships, OR proactively as a
      `wasi/path.zig` resolver rework with a 3-host symlink-escape test.
      CW-V1 IMPACT = NONE today (verified 2026-06-08): only bites a guest given a
      WRITABLE preopen, and cw grants no writable preopen to untrusted wasm; the
      plant-time half (done) already blocks the guest-plant vector. Becomes
      relevant if cw later grants FS write to untrusted code. Priority for cw v1: LOW.
    first_raised: "2026-06-08"
    last_reviewed: "2026-06-08"
    refs: |-
      src/wasi/path.zig (symlinkTargetEscapes DONE; resolve / pathHasParentEscape; the FOLLOW-time gap is pathOpen/statFile/readLink follow modes via std.Io.Dir); src/wasi/host.zig (PreopenEntry: host_handle + guest_path, no host root path)
  - id: "D-316"
    layer: "code"
    status: "note"
    description: |-
      note (additive API, LOW): partial — a per-instance TABLE-element cap now
      exists (`Instance.setTableElementsLimit` → `store_table_elements_max`,
      enforced in both the interp `table.grow` handler and the facade `Table.grow`,
      mirroring `setMemoryPagesLimit`). REMAINING: no STORE-level limiter for
      instance/table/memory COUNTS across a store (wasmtime `ResourceLimiter` /
      `StoreLimits`) — a host driving many guest-requested instantiations has no
      structural ceiling on the number of instances/tables/memories. あるべき論: a
      store-level limiter hook configured on the Engine/Store. Additive; design
      where it lives (Engine InitOpts vs Store) when an embedder needs it.
      DISCHARGE: add the store-level limiter struct + wire instantiation through it.
      CW-V1 IMPACT = NONE + LOW INTRINSIC VALUE TODAY (verified 2026-06-08): there
      is NO guest-triggered instantiation path in zwasm — the HOST drives every
      `instantiate` explicitly, so an embedder (incl. cw) already bounds its own
      instance/table/memory COUNT. A store-level count limiter only gains value
      once a guest can trigger instantiation (e.g. a future host API). The
      guest-blowup vector that DID matter — a single guest's `table.grow` — is
      already capped per-instance (`setTableElementsLimit`). So building the
      store-count knob now would be a speculative feature; keep as a note until a
      guest-triggered instantiation path exists. Priority for cw v1: LOW.
    first_raised: "2026-06-08"
    last_reviewed: "2026-06-08"
    refs: |-
      src/zwasm/engine.zig (InitOpts); src/runtime/instance/instantiate.zig (instance/table alloc); src/runtime/runtime.zig (growMemory page cap)
  - id: "D-312"
    layer: "infra"
    status: "blocked-by"
    description: |-
      blocked-by (Zig upstream): zig-emitted ELF objects lack a `.note.GNU-stack`
      section, so a non-zig system linker (gcc/clang) linking `libzwasm.a` on Linux
      warns "missing .note.GNU-stack section implies executable stack" (deprecated;
      may become a hard ld error in future). Link still SUCCEEDS (verified ubuntu
      gcc, returns 42). Consumer mitigation = `-Wl,-z,noexecstack` (documented in
      the `static-lib` build step + docs/migration_v1_to_v2.md C-API link line).
      No build-API knob exists: the exec-stack property is set at the consumer's
      FINAL link; a static `.a` is just an object archive. DISCHARGE: when Zig
      emits `.note.GNU-stack` for its objects (watch ziglang/zig), drop the
      documented consumer flag. Companion fact (not a defect): external linkers
      also need `-lm` (zwasm references trunc/truncf/…); documented. No compiler-rt
      gap (zig bundles it into the .a — Q4 verified, better than v1 #23).
    first_raised: "2026-06-08"
    last_reviewed: "2026-06-08"
    refs: |-
      build.zig (static-lib step); docs/migration_v1_to_v2.md (C-API external link line); scripts/test_extlink.sh
  - id: "D-294"
    layer: "code"
    status: "partial"
    description: |-
      partial: JIT call_indirect on a NULL (uninitialized, in-bounds) table element mislabelled its trap as
      indirect_call_mismatch (code 3); interp + all 3 reference engines (wasmtime/wasmer/v1, D-292-D audit) say
      "uninitialized element". A pure LABEL bug (always trapped, exit 1 — only the kind was wrong, D-293 class).
      ✅ INLINE PATHS FIXED (4fa16b29, 2026-06-06): a null slot's stored typeidx is maxInt(u32) (the no-func
      sentinel; compile_init.zig pre-seeds the typeidxs buffer), distinct from any canonical id. Clean insertion
      at each inline cind-sig site — `CMP/CMN typeidx, 0xFFFFFFFF ; J(E/B.EQ) → uninitialized_elem (code 13)`
      PRECEDES the sig CMP (typeidx already loaded). New uninit_elem_fixups channel mirrors cind_sig → code-13
      stub both arches (x86_64 CMP+JE→emitTrapExitStub; arm64 CMN W16,#1 + B.EQ→EmitCindStub). Covers
      call_indirect + return_call_indirect, table-0 + multi-table, both arches. jitTrapCode 13 =>
      uninitialized_elem. Tests: runner_trap_test exec (null → 13) + byte-exact emit tests updated. Verified
      JIT+interp both emit "uninitialized element". 3-host pending (ubuntu test-all kicked @4fa16b29).
      RESIDUAL 1 (narrow): the SUBTYPING resolve-trampoline path (jitCallIndirectResolve, op_call.zig arm64 ~309
      / x86_64 equiv) collapses OOB/sig/NULL all into funcptr=0 → a null elem under a subtyping module still
      reports code 3. Fixing it needs the trampoline to RETURN a distinct null sentinel (not funcptr=0) so the
      caller can branch to code 13 — a different (non-inline) mechanism. Low priority (subtyping + null elem is rare).
      RESIDUAL 2 (cosmetic): call_indirect OOB-INDEX prints `out of bounds table access` (oob_table) but spec
      canonical is "undefined element"; table.get OOB stays "out of bounds table access".
      REASSESSED 2026-06-06 (NOT cheap — folds into D-293): JIT trap-code 2 (oob_table) is SHARED by
      call_indirect bounds AND table.get/set/copy/fill OOB (op_table.zig routes all to cind_bounds_fixups →
      code 2). Giving call_indirect OOB a distinct "undefined element" needs SPLITTING the shared code-2
      channel into call_indirect-bounds vs table-access-bounds — precisely the D-293 kinded-fixup refactor, not
      a standalone constant. AND it is conformance-neutral: the spec runner matches by trap-KIND
      (wast_runtime_runner.zig:959) and the corpus baker maps `undefined element → OutOfBoundsTableAccess`
      (regen_wasmtime_misc tag_map), so the suite passes today; RESIDUAL 2 = bare-CLI-message polish only.
      → Both residuals (R1 subtyping-trampoline sentinel, R2 code-2 channel split) are D-293-class; the
      load-bearing D-294 bug (inline null-elem mislabel) is FIXED (4fa16b29). Residuals fold into D-293.
    first_raised: "2026-06-06"
    last_reviewed: "2026-06-06"
    refs: |-
      Fixed: 4fa16b29. src/engine/codegen/{arm64,x86_64}/{op_call,op_tail_call,ctx,emit}.zig +
      x86_64/op_control.zig (demux) + api/trap_surface.zig (jitTrapCode 13). Tests: runner_trap_test.zig,
      x86_64/emit_test_int.zig, arm64/emit_test_call.zig. Residual 1: jitCallIndirectResolve trampoline.
  - id: "D-292"
    layer: "code"
    status: "note"
    description: |-
      note (user-directed 2026-06-05; ADR-0164): trap/crash/exception diagnostics & UX are opaque +
      inconsistent across engines. The JIT path prints a bare `Trap` (no kind) where v1 + v2-interp give
      per-kind messages — a v1-parity regression (surfaced by D-291). Program (ADR-0164, time-consuming →
      FRONT of the clean session): A) surface the specific trap KIND + message on ALL engines (wire the JIT
      trap-code → `Trap` kind → interp-parity `surfaceTrap`); B) crash-vs-trap distinction (internal SIGSEGV/
      @panic = INTERNAL ERROR not `Trap`; ideal zero host-crash; restrict the `[stack_probe]` diag to genuine
      stack-overflow). **B-core: ✅ DONE (ADR-0166; bundle closed). Investigation corrected the stale "no signal
      handling" premise (production installs ZERO handlers; the VEH/test-runner ones are JIT-recovery/test-only).
      Impl: POSIX sigaction (c395cf64) + Windows VEH (8c076db2) + First=1 fix (400c7006, the gate caught it
      losing to Zig's own First=0 segfault VEH) → internal SIGSEGV now prints "internal error" + exit 70 (vs
      clean trap exit 1 / silent signal). `test-internal-fault` build step in test-all, 3-host GREEN incl.
      windows OK @400c7006. Lesson 2026-06-06-windows-custom-fault-veh-must-be-first.** **C) ✅ DONE
      (c2650de5): JIT uncaught throw/throw_ref → uncaught_exception (code 12), both arches — fixed a latent
      x86_64 mis-report (uncaught JMP → unreach_fixups = code 5). interp parity.** **D) ✅ DONE (2026-06-06,
      subagent audit vs wasmtime 43 / wasmer 5 / v1): zwasm-v2's trap messages match the spec canonical strings +
      wasmer/v1 (better than v1's non-canonical wording); exit-1-for-traps aligns with wasmer/v1 (wasmtime=134
      outlier); no wasm-backtrace = acceptable per ADR-0159 minimalism (wasmer/v1 also omit it). The ONE real
      finding (JIT call_indirect null-elem mislabel) → filed D-294; minor "undefined element" wording also in
      D-294.** **⇒ ADR-0164 trap-crash-exception-diagnostics PROGRAM COMPLETE (A + B-core + C + D + D-293).**
      Remaining product fixes are debt-rowed (D-294, D-291). (Historical: workstream A first UNBLOCKED D-291.)
      PROGRESS (b6da8604, 2026-06-06): workstream A CLI surface done — JIT/AOT run paths thread trap_kind →
      trap_surface.jitTrapCode → CLI per-kind message; single-message interp-parity (double-`Trap` bug fixed,
      genuine trap = exit 1 not re-raised error.Trap).
      PROGRESS (A1 6fcbabbd / A2 687d1a73 / A3 this-commit, 2026-06-06): codegen widening DONE for the COMMON 4
      trap kinds — unreachable=5, oob_memory=6, div_by_zero=7, int_overflow=8 now record PRECISE per-kind codes,
      UNIFIED across arm64+x86_64 (was the arch-divergent generic bucket). Mechanism: dedicated per-kind trap
      stub + per-kind fixup channel demuxed from the shared bounds_fixups (arm64 EmitCindStub / x86_64
      emitTrapExitStub). A1+A2 3-host green (Mac+ubuntu+windows, dca1b7a1). REMAINING A→0 for the common 4;
      the OTHER still-generic kinds (oob_table, invalid_conversion, trunc int_overflow, null_reference,
      cast_failure, array_oob) are filed as D-293. Then B (scope [stack_probe]) / C / D.
      DISCHARGE: all engines emit clear per-kind trap messages + crash/trap/exception cleanly distinguished +
      audit-gap list closed-or-deferred.
    first_raised: "2026-06-05"
    last_reviewed: "2026-06-06"
    refs: |-
      `.dev/decisions/0164_trap_crash_exception_diagnostics_ux.md`; `src/runtime/trap.zig` (Trap set); `src/cli/run.zig` (surfaceTrap + runWasmJit generic Trap); `src/cli/diag_print.zig`; `src/platform/stack_limit.zig`; `~/Documents/MyProducts/zwasm/src/cli.zig` (v1 per-kind msgs); D-291 (motivating case); D-165 (JIT trap-code infra)
  - id: "D-293"
    layer: "code"
    status: "partial"
    description: |-
      note (2026-06-06; spun out of D-292 A3): the JIT `bounds_fixups` channel is a generic catch-all that
      multiplexes MANY trap kinds, not just oob_memory. D-292 A1–A3 demuxed the common 4 (unreachable / div /
      overflow / oob_memory). STILL-GENERIC (report "kind not yet distinguished" on JIT/AOT, a v1/interp-parity
      gap): oob_table (op_table.zig table.get/set/copy/init + call_indirect bounds), invalid_conversion +
      trunc int_overflow (op_convert.zig / arm64 bounds_check.zig float→int trap), null_reference
      (ref.as_non_null, struct/array null deref, call_ref null), cast_failure (ref.cast / i31.get), array_oob
      (array.get/set/fill/copy/init/new_*). A per-site classification table exists (the A3 survey). The clean
      fix is a KINDED-FIXUP REFACTOR: replace `bounds_fixups: ArrayList(u32)` with a kinded list (byte+kind) or
      add a per-kind channel each, route every append to its kind, emit one stub per kind. ~50 sites across both
      arches → an architectural/rework-style chunk, NOT a quick fix. Lower frequency than the common 4 so
      deferred behind D-292 B/C/D; pick up as a follow-on widening (or fold into workstream D's audit-gap close).
      SLICE-1 DONE (`15a54fdf`): oob_table (code 2) now precise + UNIFIED across arm64+x86_64 for table-access
      (get/set/fill/copy/init) + call_indirect bounds (x86_64 oobtable_fixups channel built; arm64 op_table
      re-routed to cind_bounds_fixups; sig/null sites correctly left generic). Test: table.get OOB → code 2.
      SLICE-2 DONE (`24a405eb`): indirect_call_mismatch (code 3) now precise + UNIFIED — x86_64 demuxed its
      inline-sig JNE (op_call.zig table-0 548 + multi-table 599; op_tail_call both) out of generic
      bounds_fixups into a new cind_sig_fixups channel → emitTrapExitStub code 3, matching arm64 (already
      code-3). Subtyping-trampoline null (497) + call_ref null (708) correctly left generic. Test: ()->()
      funcref called as (i32)->() → code 3 (JIT+interp parity, CLI-confirmed).
      SLICE-3 DONE (`0892ee36`): trapping-trunc cohort (i32/i64.trunc_f32/f64_s/u). NaN (x86_64 UCOMI-self JP /
      arm64 FCMP-self B.VS) → new invalid_conv_fixups channel → code 9 = invalid_conversion (new jitTrapCode 9);
      out-of-range (JAE/JB/JBE / B.GE/B.LT) → existing overflow_fixups → code 8 = int_overflow (shared w/ div_s).
      Both arches (x86_64 op_convert.emitFpTruncTrap{Signed,Unsigned} thread 2 channels; arm64
      bounds_check.emitTrunc{32,64}BoundsCheck route per-condition). Test: nan→9, 1e30→8 (JIT+interp parity).
      SLICE-4a DONE (`ebb87e33`): completed the trap SURFACE. Discovery: null_reference / cast_failure /
      uncaught_exception existed in runtime.Trap but were ABSENT from the TrapKind surface enum + mapInterpTrap,
      so the INTERP itself mis-reported them as binding_error ("host invocation error") — a real interp-parity
      bug, not just a JIT gap. Added the 3 variants (C-ABI 11/12/13) + spec messages ("null reference" / "cast
      failure" / "uncaught exception") + mapInterpTrap arms. Observable: interp ref.as_non_null/null → kind=
      null_reference. JIT codegen codes for these = slice-4b+.
      SLICE-4b DONE (`2b1fa81f`): JIT null_reference (code 10) for call_ref-null + ref.as_non_null, both arches
      (new null_ref_fixups channel). ALSO fixed a latent arm64 mis-classification — call_ref null reused
      cind_bounds_fixups → reported oob_table (code 2); now code 10. Tests: call_ref null → 10 (was 2 arm64),
      ref.as_non_null → 10.
      SLICE-4c DONE (`8980bebe`): the 4 core GC accessors (struct.get/set + array.get/set) — null-deref → code 10
      null_reference; array index OOB → code 6 oob_memory (the interp raises OutOfBoundsLoad/Store for array
      bounds → shares the memory-oob kind, NO new TrapKind needed). Both arches, 12 sites, existing channels.
      Tests: struct.get null → 10, array.get OOB → 6. Survey (subagent) classified all ~29 GC trap sites/arch.
      SLICE-4d DONE (`0d13e635`): ref.cast / ref.cast_null subtype-mismatch → new code 11 = cast_failure, both
      arches (new cast_fail_fixups channel; the jitGcRefCast 0-return TEST/CMP+JE/B.EQ — for ref.cast a null
      operand is itself a cast failure per spec §4.4.5, so the single 0-return maps cleanly; ref.cast_null's
      null-passthrough is a local control-flow branch, untouched). TrapKind.cast_failure + wast_runner arm
      already exist (slice-4a). Test: ref.cast mismatch → 11.
      SLICE-4e DONE (`b5af6e2b`): struct.get_s + i31.get_s + i31.get_u null → code 10 null_reference (was
      generic code 1), both arches (routed the 6 sites' null-branch from bounds_fixups → existing
      null_ref_fixups). struct.get_s was the signed sibling slice-4c MISSED (it fixed struct.get/set); i31.get_s/u
      were never demuxed. Each has a SINGLE null failure mode → mechanical re-route, no new TrapKind. Re-survey
      (2026-06-13) CORRECTED the stale "array_oob TrapKind" recipe: that would contradict slice-4c (array index OOB
      = oob_memory code 6, deliberate); AND the GC array.* trampolines are NOT mechanically routable.
      STATUS: D-293 JIT trap precision SUBSTANTIALLY COMPLETE (all common + GC null/bounds/cast + struct_s/i31
      precise both arches; interp surface complete). REMAINING (low-priority, interp ALREADY precise so no
      user-facing gap on the default engine): the GC array.* trampolines (array.init_data/copy/fill/init_elem/
      new_data/new_elem) — each single 0-return from jitGcArray* mixes ≥6 distinct failure modes (null-ref / OOM /
      segidx-OOB / dropped-segment / dst-OOB / src-OOB), so they CANNOT be routed by re-channeling a fixup. The
      proper (larger, low-priority) fix = have the helper RETURN A KIND discriminant the stub maps. next free JIT
      code = 12. Reopen if a GC-on-JIT program needs precise array-trap codes; else leave.
      RE-SURVEYED 2026-06-14 (barrier RE-CONFIRMED, stays deferred): walked the full mechanism — the proper
      fix needs (a) a NEW stub variant per arch that sets trap_flag but does NOT MOVZ a static trap_kind (the
      helper owns the kind), since EmitCindStub bakes ONE static code per channel and these sites demux ≥6
      modes dynamically; (b) a new gc_array_trap_fixups channel ×2 arches; (c) a ~30-site convention where each
      helper failure path writes its precise TrapKind to rt.trap_kind (the trap_kind_off field) before
      `return 0` — gated on an interp-parity survey of each mode's exact TrapKind. Overloading the return slot
      to carry ref-or-kind would trip single_slot_dual_meaning. Net: multi-cycle architectural surface for ZERO
      conformance gain (spec runner passes today) + ZERO default-engine gain (interp already precise) → correctly
      "else leave"; this row IS the saved survey so the next resume doesn't re-walk it.
      (Below: the original slice-1 survey, kept as the method template.)
      SLICE-1 PLAN — oob_table (code 2), surveyed 2026-06-06 (DO BOTH ARCHES TOGETHER; a runVoidExportWasi test
      asserting code 2 FAILS the x86_64/ubuntu gate if x86_64 stays generic → the test enforces parity).
      DISCOVERY: x86_64 has NO oob_table precision at all — its call_indirect bounds AND table bounds all append
      to the generic `bounds_fixups` (op_call.zig:529,583 = bounds; op_table.zig:257,306,485,600,614,825,836).
      arm64 IS precise for cind (cind_bounds_fixups→EmitCindStub code 2) but generic for op_table. EDITS:
      (a) arm64 — re-route the 7 op_table bounds appends `ctx.bounds_fixups`→`ctx.cind_bounds_fixups` (all 7 are
      B.HS/B.HI bounds = oob_table, VERIFIED: arm64/op_table.zig:182,233,393,503,515,726,736). (b) x86_64 — BUILD
      an `oobtable_fixups` channel mirroring A3's `oob_fixups`: ctx.zig (InitArgs+EmitCtx+init), emit.zig
      (local+wire), op_control.zig emitEndInter (`emitTrapExitStub(ctx, 2)`, 6-byte JAE patch); thread the new
      positional param through op_call.zig (`emitCallIndirect`+`emitCallRefIndirect`+ctx-adapters) routing
      **ONLY the bounds appends 529+583** to oobtable, and op_table.zig (emitTableGet/Set/Fill/Copy/Init + their
      ctx-adapters) routing all 7 table-bounds appends. ⚠️ DO NOT route op_call.zig 495/546/597 (sig-mismatch
      =code 3 → indirect_call_mismatch) or 706 (call_ref null=null_reference) to oobtable — those are DIFFERENT
      kinds (a subagent plan mis-classified them). Test: hand-assembled `_start` doing `table.get` (or
      call_indirect into a 0/under-sized table) with OOB idx → runVoidExportWasi trap_code==2==oob_table.
    first_raised: "2026-06-06"
    last_reviewed: "2026-06-14"
    refs: |-
      D-292 (parent program, ADR-0164) + D-165 (trap-code infra); src/api/trap_surface.zig (jitTrapCode);
      src/engine/codegen/{arm64,x86_64}/{op_table,op_convert,op_call,op_tail_call,ops/wasm_3_0/*}.zig +
      arm64/bounds_check.zig (the still-generic append sites)
  - id: "D-289"
    layer: "code"
    status: "note"
    description: |-
      note (ADR-0163 A; arm64 frame-offset imm12 cap). ROOT = arm64 frame-relative LDR/STR use a scaled
      imm12 (cap 16380 W / 32760 X / 65520 Q); a function whose frame (locals+spills, spill_base sits ABOVE
      locals) exceeds it → UnsupportedOp. x86_64-CLEAN (disp32). COMPLETENESS gap vs D-244. **GPR PATHS
      FIXED + VERIFIED (`340eaf5e`)**: `gpr.frameAddrLarge` (two-ADD SP+off) + `frameLdrGpr`/`frameStrGpr`,
      applied to body local.get/set/tee (i32/i64/ref), prologue scalar zero-init + home-seed, and gpr.zig
      spill load/store. Loads self-compute into dst; stores use X16/IP0 (body) or the other spill-stage reg.
      Tests `test/edge_cases/p9/large_frame/many_locals.{wat} (local off ~40k → 305419896)` +
      `many_locals_spill (spill off >32760 → 210)` green + 83 edge + full test, no regression.
      FP/v128 LOCAL ARMS FIXED + VERIFIED (`7dfc5992`, 2026-06-06): `gpr.frameLdrFp`/`frameStrFp` (S/D/Q,
      large path materialises SP+off into X16/IP0 since the V-reg dst can't self-compute) applied to
      local.get/set/tee f32/f64/v128 in emit.zig (caps + truncating offset_w/x/q casts removed). New fixture
      `test/edge_cases/p9/large_frame/d289_fp_large_frame.wat` (5000 f64 locals → local[4999] off ~40000 > the
      32760 D-form cap; round-trips 1234.5, returns 1) green + many_locals/spill no regression (85/0) + full
      test + lint clean. REMAINING param-marshal + stack-args arms are CONTRIVED-ONLY (reachability analysis
      2026-06-06): `param_off_u = local_base_off + layout.offsets[p_idx]` and params occupy the LOWEST offsets
      (indices 0..num_params first), so a param crosses the 32760 cap only when `local_base_off`
      (= outgoing_max_bytes) is itself huge — i.e. the function CALLS something with a >32 KB stack-arg area
      (~4000+ stack args to one call); the stack-args SOURCE arm (`[X29, #16+8*idx]`) needs >4095 incoming
