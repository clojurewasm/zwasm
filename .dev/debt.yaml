  - id: "D-184"
    layer: ""
    status: "note"
    description: |-
      Root cause identified via diagnostic probe (D-184 probe commit `200c9600`, reverted this commit): the x86_64 SysV JIT prologue emits `PUSH RBP; PUSH R15; MOV RBP, RSP` (in that order — `emit.zig:268-272`). MOV captures RBP AFTER the R15 push, so `[RBP, 0] = saved R15` (a heap addr = rt ptr value), `[RBP, 8] = saved RBP`, `[RBP, 16] = saved RIP`. The unwinder's `loadFrame` blindly read slots 0/1, treating saved R15 as caller_fp → next iteration's frame-ptr was bogus → SEGV. Fix: new `frame_chain.loadFrameSniffed(fp, code_map)` does a CodeMap-aware sniff — checks whether `[fp, 8]` (standard SysV layout) OR `[fp, 16]` (zwasm uses_runtime_ptr layout) resolves to a JIT body address via CodeMap.lookup, and returns the corresponding (caller_fp, caller_rip) pair. arm64 unaffected (standard AAPCS64 prologue chains cleanly via `STP X29, X30; MOV X29, SP`). Mac local + cross-compile x86_64-linux green; ubuntu verify pending Step 0.7.
