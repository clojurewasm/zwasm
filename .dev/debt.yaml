      landed `--aot`/`--wasmer` lanes) that runs each fixture via the WASI-aware JIT path + byte-diffs stdout vs
      wasmtime ‚ÄĒ the real JIT-correctness net. The 9 COMPILE-OP (go_* UnsupportedOp) remain genuine unimplemented-op
      gaps (separate, real).
      ---
      **LANE LANDED 2026-06-15 `219dbd17`** (`zig build test-realworld-diff-jit`; `runWasmJitCaptured`). REAL signal
      replacing the false 12-trap framing: **`diff_runner [jit]: 45/56 matched vs wasmtime, 2 mismatched, 9 skipped`**.
      So the true remaining JIT work is precise: (A) **2 genuine JIT miscompiles** ‚ÄĒ `c_sha256_hash` (wasmtime 107B /
      jit 91B) + `emcc_fasta` (154B / 87B); interp byte-matches wasmtime, JIT emits SHORT/wrong output ‚áí a real
