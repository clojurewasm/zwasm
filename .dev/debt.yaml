      SLICE-4b DONE (`2b1fa81f`): JIT null_reference (code 10) for call_ref-null + ref.as_non_null, both arches
      (new null_ref_fixups channel). ALSO fixed a latent arm64 mis-classification ‚ÄĒ call_ref null reused
