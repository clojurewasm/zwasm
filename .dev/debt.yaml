  - id: "D-234"
    layer: "code"
    status: "blocked-by"
    description: |-
      blocked-by: spec-runner persistent-`cur_jit` eval artifact (the corpus false-reports the memory64 OOB traps). **2026-06-03 (Phase-10 close): the JIT memory64 OOB codegen is PROVEN correct via 6 isolated paths; the true JIT trap gap is ~0. The lone corpus memory64 fail=1 IS this harness artifact (ADR-0133-allowlisted, the §10 JIT-0-real-fail criterion is MET). The 4 gc over-accept fails went to D-235 (resolved; gc corpus now 402/0). Discharge = runner-side harness fix; NOT a §10 codegen blocker.** (Historical narrative:) 55 JIT assert_trap "gaps" were EXPOSED by the D-233 harness fix (jit-mode assert_trap now runs on `cur_jit`, was the stale interp instance → these were NEVER JIT-trap-tested). `ZWASM_SPEC_ENGINE=jit` assert_trap = 202 pass / **55 fail** / 305 skip. The JIT runs these funcs and RETURNS NORMALLY where a trap is required. Breakdown (via `--fail-detail` FAILtrapNoTrap): **51 memory64/memory_trap64** (i32/i64.load/store/store8/store16 with an OOB i64 address → must trap "out of bounds memory access", JIT doesn't) + **4 gc/type-subtyping** (the call_indirect-subtype trap direction — related to D-198/the gc/type-subtyping "run" return-fail). The memory64 cluster is the big one: in-bounds memory64 ops work on JIT (assert_return +208) but OOB-trap was never verified → likely the JIT memory64 bounds-check uses a 32-bit compare or the high address bits are dropped before the `idx >= mem_limit` test (arm64 + x86_64). scalarArgBits passes the full i64 (verified). NARROWED (TDD, this cycle — runner_gc_test.zig +2 tests, both PASS): mem64 OOB i32.load TRAPS CORRECTLY on the JIT via a CONST address (`runI32Export`) AND via an i64 PARAM (`runScalar1Export`, addr 0x10000). So the JIT codegen bounds-check is FINE for fresh-setup invocations. `paramScalarKey(i64) == scalarKey(i64) == 1` (no marshalling diff). The ONLY difference between the passing tests and the failing corpus: the tests use a FRESH `setupRuntime`; the corpus uses the PERSISTENT `cur_jit` (`JitInstance.invoke` → `self.owned.rt`). So the 51 fails are a PERSISTENT-cur_jit SETUP issue (mem_limit / memory not correctly initialised for a mem64 module on the kept JitInstance), almost certainly ANOTHER HARNESS/SETUP ARTIFACT like D-233 — NOT a JIT codegen bug. FURTHER-NARROWED (cycle 2, +1 test runner_test.zig): the EXACT corpus path `JitInstance.init` + `invoke("i32.load", 0x10000)` ALSO TRAPS — single AND 3× sequential (trap_flag resets fine between invokes). So mem64 OOB JIT codegen is PROVEN CORRECT via FIVE isolated paths (const/`runI32Export`, param/`runScalar1Export`, JitInstance single, JitInstance 3×). The 51 corpus fails are NOT reproducible outside the full corpus run → a CORPUS-RUNNER artifact: the persistent `cur_jit` is shared across ALL of module-2's asserts (its in-bounds assert_returns run first, THEN the OOB assert_traps), OR the baked-manifest module bytes differ from the raw .wasm. **STRONG RECLASSIFICATION: the 51 memory64 fails are almost certainly a harness artifact (like D-233), NOT real JIT trap gaps — the JIT mem64 OOB handling is correct.** So the JIT is MORE correct than the 55-fail number implies; the true real-JIT-trap-gap count is likely ≪ 55 (maybe just the 4 gc, or 0). CYCLE 3 (this date): tried the corpus-side probe (fresh JitInstance.init from cur_module_bytes + re-invoke in the fail path) — it SEGV'd (RUN_EXIT=139): a naive `JitInstance.init` on an import-bearing module can't resolve imports → crash (reverted). So the in-runner fresh-reinvoke probe must be GUARDED to no-import modules, or isolate the single memory_trap64 fixture. Given codegen is PROVEN correct (5 paths) + the probe fragility, this is firmly a harness-eval issue — LOWERED priority (not codegen; the JIT mem64 OOB is correct). Meta-lesson filed: `2026-06-02-jit-corpus-fails-are-often-harness-artifacts` (D-233 + D-234 both = harness mis-eval). NEXT (when resumed): guard the probe to no-import modules OR @embedFile/byte-literal the memory_trap64.1 fixture into a unit test (a FULL-module JitInstance.init+invoke); pin whether the trigger is cur_jit-state or module-content, then runner-side fix. CYCLE 4 — assert_trap audit COMPLETE: the 4 gc/type-subtyping assert_trap fails are ALSO harness artifacts. The JIT `call_indirect` (op_call.zig:222-242) does `LDR typeidx[idx]; CMP vs canonical expected; B.NE trap` — a canonical-EXACT compare. For the should-trap `fail1`/`fail2` (callee canonical ≠ expected), it CORRECTLY traps; so the corpus showing them as "returned" is the same cur_jit mis-eval as memory64. **CONCLUSION: ALL 55 jit assert_trap fails are corpus-runner harness artifacts; the TRUE jit assert_trap gap is ~0** — the JIT trap behaviour is correct. The real remaining JIT gaps are the **2 RETURN fails**: (a) gc/type-subtyping `"run"` — the SAME canonical-exact compare WRONGLY traps a LEGIT subtype (callee <: expected, different canonical) → the JIT call_indirect needs SUBTYPE acceptance (the analog of the interp D-198/.17/D-232 work; canonical-id-vs-supertype, hot-path); (b) eh/try_table (EH-on-JIT). Discharge of D-234 itself = a runner-side fix so jit assert_trap stops false-reporting the 55 (corpus-runner audit / guarded fresh-instance), low priority since codegen is correct. The PRODUCT gap to fix = the gc/type-subtyping `"run"` JIT call_indirect-subtype (D-198 JIT analog) — concrete, real, hot-path. **CYCLE 5 CORRECTION: the cycle-4 claim "the 4 gc assert_trap fails are harness / all 55 harness" is WRONG.** The JIT canonical IS D-111 STRUCTURAL FuncType equality (`canonicalTypeidx` via `funcTypeEql`, finality-blind) — so `$t1=(sub (func))` and `$t2=(sub final (func))` (both `()->()`) get the SAME canonical → CMP MATCHES → the JIT wrongly ACCEPTS fail1/fail2 (no trap) → the 4 gc assert_trap fails are REAL JIT bugs (D-111 over-acceptance), NOT harness. Only the 51 memory64 are harness (still proven). Both the 4 gc assert_trap (over-accept) AND the `"run"` return-fail (under-accept) are the same root cause: JIT call_indirect uses D-111 structural equality instead of the gti subtype check. Full corrected scope + fix → D-235. CYCLE 6 (2026-06-03, `f507bf33`): added a PERMANENT isolation repro for the lone memory64 *assert_return* fail (corpus `i64.load 0xfff8` got=0x6867666564000000, low 3 bytes 'a''b''c' zeroed) — a fresh `JitInstance` on a hand-assembled minimal mem64 module (data "abcdefgh" @0xfff8) loads it CORRECTLY (0x6867666564636261). 6th proof path: the near-boundary load + data-init codegen is correct; this return-fail is the SAME persistent-`cur_jit`/sequencing artifact as the 51 assert_trap fails. NET: 0 genuine JIT memory64 codegen fails (the §10-exit JIT-0-real-fail is met for memory64). Discharge of D-234 = the runner-side harness fix so the corpus stops false-reporting; NEXT pin the exact trigger (cur_jit-state-across-asserts vs baked-vs-raw manifest bytes) then the runner fix.
