  - id: "D-235"
    layer: "code"
    status: "resolved"
    description: |-
      **RESOLVED 2026-06-03 (`2b48dfdc`).** Ported ADR-0131 gti subtype semantics to JIT `call_indirect`. JIT corpus: gc/type-subtyping assert_trap **4→0**; assert_return 762/2/531 (no regression); Mac test-all + lint green. SHIPPED mechanism DEVIATED from the prep (two latent prep gaps): (1) JIT `setup.zig` also had to materialise gti for FUNC-only-subtyping modules — D-232 fixed only the interp (`instantiate.zig`); setup still gated gti on `needs_gc_heap` → a func-subtyping module got `gc_type_infos_ptr=null` → trampoline over-rejects. (2) The prep's "trampoline ON CMP-mismatch" had a FATAL regalloc flaw: ANY trampoline call inserted mid-`call_indirect` clobbers caller-saved regs holding the op's arg/idx operands (regalloc doesn't model the inserted call). SHIPPED: store RAW typeidx in `typeidx_base` for subtyping modules; a `jitCallIndirectResolve(rt,table_idx,idx,expected)→funcptr|0` trampoline (bounds+`concreteReachesGti`+funcptr lookup) called BEFORE marshalling; operands force-spilled via regalloc inclusive crossing for `call_indirect` (`ZirFunc.uses_type_subtyping`, mirroring struct.new) so they survive the C-ABI clobber; arm64 stashes funcptr in X17, x86_64 re-derives inline (all-callee-saved pool). Non-subtyping byte-identical (gated). Lesson `2026-06-03-jit-trampoline-mid-op-clobbers-operands`. (Prep doc now stale on mechanism; bug analysis below stands.) ---- ORIGINAL PREP SUMMARY:
      **FULL EXECUTION PREP → `.dev/jit_call_indirect_subtype_prep.md`** (complete design + reference chain + edit plan per file + RED-test bytes + verification; built for a FRESH CLEAR session to execute in one pass per user directive 2026-06-02 — do NOT half-bake in bloated context). Summary below. JIT `call_indirect` type-check is D-111 STRUCTURAL FuncType equality (`canonical_type.canonicalTypeidx` = lowest index with `funcTypeEql` params/results) — FINALITY-BLIND and SUBTYPE-BLIND. typeidx_base[idx] stores the D-111-canonical typeidx (setup.zig:441/621/692); the sig-check is `LDR W16,[X24,X17,LSL#2]; CMP W16,#expected_d111canonical; B.NE trap` (arm64 op_call.zig:239-250 + x86_64 equiv). Two REAL bugs (NOT harness — corrects the cyc-4 audit note that wrongly called the 4 gc fails harness): (A) OVER-acceptance → the **4 gc/type-subtyping assert_trap fails**: `$t1=(sub (func))` vs `$t2=(sub final (func))` are both FuncType `()->()` → SAME D-111 canonical → CMP matches → JIT wrongly ACCEPTS `fail1`/`fail2` (must trap; distinct identity/finality). (B) UNDER-acceptance → the gc/type-subtyping **`"run"` RETURN-fail**: `$t1=(sub $t0 (func (result (ref null $t1))))` <: `$t0` but their FuncTypes DIFFER (result `(ref null $t1)` vs `(ref null func)`) → different D-111 canonical → CMP mismatch → JIT wrongly TRAPS a legit subtype. The interp fixed BOTH via D-232/ADR-0131 (gti `concreteReaches` authoritative + canonical_ids distinguish finality); the JIT still uses the coarse D-111 structural compare. FIX (mirror interp D-232 on JIT; hot-path, both arches): when gti present, the sig-check must use the gti subtype check, not D-111 structural. Mechanism: (1) store the gti canonical id (ADR-0126, finality-aware) in typeidx_base when gti present (else keep D-111 for non-GC modules) — so structurally-equal-but-distinct types get DIFFERENT canonical → CMP no longer wrongly matches; (2) on the CMP mismatch, CALL a trampoline `jitCallIndirectSubtypeOk(rt, callee_typeidx, expected_typeidx) callconv(.c) u32` = `concreteReachesGti(gti, callee, expected)` (the declared-supertype-chain subtype check; make `concreteReachesGti` pub) before trapping. This fixes (A) [mismatch → trampoline → not-subtype → trap] AND (B) [mismatch → trampoline → is-subtype → accept]. RED tests: (A) `$t1`/`$t2` structurally-equal-distinct → call_indirect on the wrong one TRAPS; (B) `$t1<:$t0` (declared, FuncType differs) → accepts. MUST NOT regress 762 assert_return / non-GC call_indirect. CRUX/RISK: reconciling the typeidx_base canonicalization (currently D-111) with the gti canonical_ids/supertype chains — verify alignment for non-GC (no gti → D-111 unchanged) and GC modules. Implements ADR-0131 semantics on the JIT (cite). Closes 4 gc assert_trap + 1 return fail; the other return fail = eh/try_table (separate/deeper).
    first_raised: "2026-06-02"
    last_reviewed: "2026-06-03"
    refs: |-
      `src/engine/codegen/arm64/op_call.zig:239-250` (sig check) + x86_64 `op_call.zig` equivalent; `src/engine/codegen/shared/jit_abi.zig` (new trampoline, near jitGcRefCast:822); `src/instruction/wasm_3_0/ref_test_ops.zig` (concreteReachesGti:125 — reuse the supertype-chain logic); `src/engine/codegen/shared/canonical_type.zig` (canonicalTypeidx); ADR-0131; ADR-0116; D-198; ADR-0128 §10
  - id: "D-234"
    layer: "code"
    status: "blocked-by"
    description: |-
      blocked-by: spec-runner persistent-`cur_jit` eval artifact (the corpus false-reports the memory64 OOB traps). **2026-06-03 (Phase-10 close): the JIT memory64 OOB codegen is PROVEN correct via 6 isolated paths; the true JIT trap gap is ~0. The lone corpus memory64 fail=1 IS this harness artifact (ADR-0133-allowlisted, the §10 JIT-0-real-fail criterion is MET). The 4 gc over-accept fails went to D-235 (resolved; gc corpus now 402/0). Discharge = runner-side harness fix; NOT a §10 codegen blocker.** (Historical narrative:) 55 JIT assert_trap "gaps" were EXPOSED by the D-233 harness fix (jit-mode assert_trap now runs on `cur_jit`, was the stale interp instance → these were NEVER JIT-trap-tested). `ZWASM_SPEC_ENGINE=jit` assert_trap = 202 pass / **55 fail** / 305 skip. The JIT runs these funcs and RETURNS NORMALLY where a trap is required. Breakdown (via `--fail-detail` FAILtrapNoTrap): **51 memory64/memory_trap64** (i32/i64.load/store/store8/store16 with an OOB i64 address → must trap "out of bounds memory access", JIT doesn't) + **4 gc/type-subtyping** (the call_indirect-subtype trap direction — related to D-198/the gc/type-subtyping "run" return-fail). The memory64 cluster is the big one: in-bounds memory64 ops work on JIT (assert_return +208) but OOB-trap was never verified → likely the JIT memory64 bounds-check uses a 32-bit compare or the high address bits are dropped before the `idx >= mem_limit` test (arm64 + x86_64). scalarArgBits passes the full i64 (verified). NARROWED (TDD, this cycle — runner_gc_test.zig +2 tests, both PASS): mem64 OOB i32.load TRAPS CORRECTLY on the JIT via a CONST address (`runI32Export`) AND via an i64 PARAM (`runScalar1Export`, addr 0x10000). So the JIT codegen bounds-check is FINE for fresh-setup invocations. `paramScalarKey(i64) == scalarKey(i64) == 1` (no marshalling diff). The ONLY difference between the passing tests and the failing corpus: the tests use a FRESH `setupRuntime`; the corpus uses the PERSISTENT `cur_jit` (`JitInstance.invoke` → `self.owned.rt`). So the 51 fails are a PERSISTENT-cur_jit SETUP issue (mem_limit / memory not correctly initialised for a mem64 module on the kept JitInstance), almost certainly ANOTHER HARNESS/SETUP ARTIFACT like D-233 — NOT a JIT codegen bug. FURTHER-NARROWED (cycle 2, +1 test runner_test.zig): the EXACT corpus path `JitInstance.init` + `invoke("i32.load", 0x10000)` ALSO TRAPS — single AND 3× sequential (trap_flag resets fine between invokes). So mem64 OOB JIT codegen is PROVEN CORRECT via FIVE isolated paths (const/`runI32Export`, param/`runScalar1Export`, JitInstance single, JitInstance 3×). The 51 corpus fails are NOT reproducible outside the full corpus run → a CORPUS-RUNNER artifact: the persistent `cur_jit` is shared across ALL of module-2's asserts (its in-bounds assert_returns run first, THEN the OOB assert_traps), OR the baked-manifest module bytes differ from the raw .wasm. **STRONG RECLASSIFICATION: the 51 memory64 fails are almost certainly a harness artifact (like D-233), NOT real JIT trap gaps — the JIT mem64 OOB handling is correct.** So the JIT is MORE correct than the 55-fail number implies; the true real-JIT-trap-gap count is likely ≪ 55 (maybe just the 4 gc, or 0). CYCLE 3 (this date): tried the corpus-side probe (fresh JitInstance.init from cur_module_bytes + re-invoke in the fail path) — it SEGV'd (RUN_EXIT=139): a naive `JitInstance.init` on an import-bearing module can't resolve imports → crash (reverted). So the in-runner fresh-reinvoke probe must be GUARDED to no-import modules, or isolate the single memory_trap64 fixture. Given codegen is PROVEN correct (5 paths) + the probe fragility, this is firmly a harness-eval issue — LOWERED priority (not codegen; the JIT mem64 OOB is correct). Meta-lesson filed: `2026-06-02-jit-corpus-fails-are-often-harness-artifacts` (D-233 + D-234 both = harness mis-eval). NEXT (when resumed): guard the probe to no-import modules OR @embedFile/byte-literal the memory_trap64.1 fixture into a unit