      v128-spill, untested patches risk silent bugs ‚ÄĒ lesson `runi32export-host-arch-arm64-only-emit-x86-gate-red`).
      AUDIT DONE 2026-06-16: the op_simd_int_cmp_lane.zig `resolveXmm(src)` sites are NOT cmp/shift binops but more
      SINGLE-v128-source ops ‚ÄĒ Bitmask √ó4, Extend Low/High √ó2, ExtaddPairwise. **ALL 4 Bitmask widths DONE both
