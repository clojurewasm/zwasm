      applied to body local.get/set/tee (i32/i64/ref), prologue scalar zero-init + home-seed, and gpr.zig
      spill load/store. Loads self-compute into dst; stores use X16/IP0 (body) or the other spill-stage reg.
      Tests `test/edge_cases/p9/large_frame/many_locals.{wat} (local off ~40k → 305419896)` +
      `many_locals_spill (spill off >32760 → 210)` green + 83 edge + full test, no regression.
      FP/v128 LOCAL ARMS FIXED + VERIFIED (`7dfc5992`, 2026-06-06): `gpr.frameLdrFp`/`frameStrFp` (S/D/Q,
      large path materialises SP+off into X16/IP0 since the V-reg dst can't self-compute) applied to
      local.get/set/tee f32/f64/v128 in emit.zig (caps + truncating offset_w/x/q casts removed). New fixture
      `test/edge_cases/p9/large_frame/d289_fp_large_frame.wat` (5000 f64 locals → local[4999] off ~40000 > the
      32760 D-form cap; round-trips 1234.5, returns 1) green + many_locals/spill no regression (85/0) + full
      test + lint clean. REMAINING param-marshal + stack-args arms are CONTRIVED-ONLY (reachability analysis
      2026-06-06): `param_off_u = local_base_off + layout.offsets[p_idx]` and params occupy the LOWEST offsets
      (indices 0..num_params first), so a param crosses the 32760 cap only when `local_base_off`
      (= outgoing_max_bytes) is itself huge — i.e. the function CALLS something with a >32 KB stack-arg area
      (~4000+ stack args to one call); the stack-args SOURCE arm (`[X29, #16+8*idx]`) needs >4095 incoming
