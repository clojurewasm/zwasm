# CI — the host-local gate on the 3 supported OSes, mirroring the local
# 3-host gate (Mac aarch64 + Linux x86_64 + Windows x86_64). Each matrix leg
# runs `scripts/ci_gate.sh` so CI verifies exactly what the maintainer runs
# per host (single source of truth); the differential oracle uses wasmtime
# when the install step succeeds.
#
# Triggers: pull_request (any target) + push to `main` + manual dispatch.
# `main` is the trunk and is ruleset-protected: no direct pushes — every change
# lands via a `develop/*` branch → PR → this gate must pass → merge. A push to
# `main` is therefore a merged PR (its `push` run does the extended checks).
#
# Doc-only changes skip the heavy 3-host build/test: the `changes` job detects
# whether any non-doc path changed and short-circuits `gate` when not. So the
# expensive matrix never runs for a pure docs/comment PR — but `ci-required`
# (the single required status check) still reports success, so the PR stays
# mergeable without burning three runners. Keep the branch ruleset's required
# check pointed at `ci-required`, NOT the individual `gate (...)` legs.
#
# The Windows leg is advisory (continue-on-error): the authoritative Windows
# verification is a native Windows x86_64 host, and the hosted
# `windows-2022` runner has shown seed-dependent Debug flakiness (D-245).
# Mac/Linux are blocking.

name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether any non-doc path changed. Doc-only PRs then skip the heavy
  # 3-host `gate` matrix while `ci-required` still reports success, so the
  # branch ruleset's required check stays satisfiable. Only SHAs (never a
  # branch name / title / body) reach the shell, so there is no injection seam.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect non-doc changes
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_HEAD: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            range="${PR_BASE}...${PR_HEAD}"
          elif [ "$EVENT" = "push" ]; then
            if ! git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
              echo "code=true" >> "$GITHUB_OUTPUT"; echo "new-branch push -> run gate"; exit 0
            fi
            range="${PUSH_BEFORE}..${PUSH_HEAD}"
          else
            echo "code=true" >> "$GITHUB_OUTPUT"; echo "manual dispatch -> run gate"; exit 0
          fi
          files="$(git diff --name-only "$range")"
          echo "changed files:"; printf '%s\n' "$files"
          # Paths that do NOT need the 3-host build/test gate (docs / meta only).
          nondoc="$(printf '%s\n' "$files" | grep -vE '(^|/)[^/]*\.md$|^docs/|^\.dev/|^\.claude/|^LICENSE$' || true)"
          if [ -n "${nondoc//[[:space:]]/}" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"; echo "non-doc changes -> run 3-host gate"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"; echo "doc-only -> skip 3-host gate"
          fi

  gate:
    name: gate (${{ matrix.name }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.runs-on }}
    continue-on-error: ${{ matrix.advisory || false }}
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aarch64-macos
            runs-on: macos-15
            zig-dir: zig-aarch64-macos-0.16.0
            extended: true
          - name: x86_64-linux
            runs-on: ubuntu-22.04
            zig-dir: zig-x86_64-linux-0.16.0
            extended: true
          - name: x86_64-windows
            runs-on: windows-2022
            zig-dir: zig-x86_64-windows-0.16.0
            advisory: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Cache Zig 0.16.0
        id: cache-zig
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.local/zig-0.16.0
          key: zig-0.16.0-${{ matrix.name }}

      - name: Install Zig 0.16.0 (Unix)
        if: runner.os != 'Windows' && steps.cache-zig.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.local
          curl -fsSL "https://ziglang.org/download/0.16.0/${{ matrix.zig-dir }}.tar.xz" -o /tmp/zig.tar.xz
          tar -xJf /tmp/zig.tar.xz -C ~/.local
          mv "$HOME/.local/${{ matrix.zig-dir }}" "$HOME/.local/zig-0.16.0"

      - name: Install Zig 0.16.0 (Windows)
        if: runner.os == 'Windows' && steps.cache-zig.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.local" | Out-Null
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip" -OutFile "$env:TEMP\zig.zip"
          Expand-Archive -Path "$env:TEMP\zig.zip" -DestinationPath "$HOME\.local" -Force
          Move-Item -Path "$HOME\.local\zig-x86_64-windows-0.16.0" -Destination "$HOME\.local\zig-0.16.0"

      - name: Add Zig to PATH (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: echo "$HOME/.local/zig-0.16.0" >> "$GITHUB_PATH"

      - name: Add Zig to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$HOME\.local\zig-0.16.0"

      # Reference oracle for the interp-vs-JIT-vs-wasmtime differential. Best
      # effort: the differential runner degrades to a SKIP when it is absent,
      # so a download hiccup must not fail the gate.
      - name: Install wasmtime (reference oracle, best effort)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          source .github/versions.lock
          v="v${WASMTIME_VERSION}"
          case "${{ runner.os }}" in
            Linux)   asset="wasmtime-${v}-x86_64-linux";   ext="tar.xz" ;;
            macOS)   asset="wasmtime-${v}-aarch64-macos";  ext="tar.xz" ;;
            Windows) asset="wasmtime-${v}-x86_64-windows"; ext="zip"    ;;
          esac
          url="https://github.com/bytecodealliance/wasmtime/releases/download/${v}/${asset}.${ext}"
          mkdir -p "$HOME/.local/bin"
          cd "$HOME/.local/bin"
          if [ "$ext" = "zip" ]; then
            curl -fsSL "$url" -o wasmtime.zip && unzip -j -o wasmtime.zip
          else
            curl -fsSL "$url" -o wasmtime.tar.xz && tar -xJf wasmtime.tar.xz --strip-components=1 "${asset}/wasmtime"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Build-time dependency: `zig build test-all` runs `wasm-tools parse` to
      # produce spectest.wasm from test/spec/spectest.wat (build.zig). Required
      # (not best-effort) — test-all cannot build without it.
      - name: Install wasm-tools (build-time, required for test-all)
        shell: bash
        run: |
          set -euo pipefail
          source .github/versions.lock
          v="${WASM_TOOLS_VERSION}"
          case "${{ runner.os }}" in
            Linux)   asset="wasm-tools-${v}-x86_64-linux";   ext="tar.gz" ;;
            macOS)   asset="wasm-tools-${v}-aarch64-macos";  ext="tar.gz" ;;
            Windows) asset="wasm-tools-${v}-x86_64-windows"; ext="zip"    ;;
          esac
          url="https://github.com/bytecodealliance/wasm-tools/releases/download/v${v}/${asset}.${ext}"
          mkdir -p "$HOME/.local/bin"
          cd "$HOME/.local/bin"
          if [ "$ext" = "zip" ]; then
            curl -fsSL "$url" -o wt.zip && unzip -j -o wt.zip
          else
            curl -fsSL "$url" -o wt.tar.gz && tar -xzf wt.tar.gz --strip-components=1 "${asset}/wasm-tools"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        shell: bash
        run: |
          zig version
          wasm-tools --version
          wasmtime --version || echo "wasmtime absent — differential will SKIP"

      # Extended checks (lint + 6-combo build DCE + ReleaseSafe JIT smoke + AOT
      # cross-compile) are ~10 cold-cache builds and dominate wall-clock, so they
      # run ONLY on the merge to `main` (push) — not on every PR / dispatch, which
      # get the fast core gate (fmt + test-all, ~10 min). windows is always core.
      - name: ci_gate.sh
        shell: bash
        env:
          ZWASM_CI_EXTENDED: ${{ (github.event_name == 'push' && matrix.extended) && '1' || '0' }}
        run: bash scripts/ci_gate.sh

  # The SINGLE required status check (point the branch ruleset here, not at the
  # individual `gate (...)` legs). Passes when the change was doc-only (gate
  # skipped by design) OR when the 3-host gate succeeded. `always()` so it also
  # runs when `gate` was skipped. The advisory Windows leg is continue-on-error,
  # so `needs.gate.result` is 'success' whenever Mac + Linux pass.
  ci-required:
    name: ci-required
    needs: [changes, gate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verdict
        env:
          CODE: ${{ needs.changes.outputs.code }}
          GATE_RESULT: ${{ needs.gate.result }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$CODE" != "true" ]; then
            echo "doc-only change — 3-host gate intentionally skipped; PASS"
            exit 0
          fi
          echo "gate result: $GATE_RESULT"
          if [ "$GATE_RESULT" = "success" ]; then
            echo "3-host gate passed; PASS"
            exit 0
          fi
          echo "::error::3-host gate did not pass (result=$GATE_RESULT)"
          exit 1
