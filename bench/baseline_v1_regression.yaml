# bench/baseline_v1_regression.yaml
#
# Per-fixture interp wall-clock baseline recorded for the
# Phase-6 / §9.6 / 6.4 deliverable. Phase-7+ JIT runs compare
# against this floor; A13 holds the regression suite green
# from this point forward.
#
# Subset rationale: 5 of the 39 PASS-bucket realworld fixtures
# the ones that runWasm carries to a stable u8 exit code
# reproducibly. 35+ fixtures excluded as needs-Phase-6-follow-up
# execution-coverage work (10 SKIP-VALIDATOR + 39 trap-mid-
# execution; the 5 picked here are within the 39-trap subset
# but produce stable wall-clock numbers because the trap site
# is reproducible). Spread (stddev) and repeatability under
# noise are what matter, not absolute speed (per ROADMAP §9.6
# / 6.4 row text).
#
# Regen: bash scripts/record_baseline_v1_regression.sh
#
# **Status (2026-05-03 / Phase 6 reopen)**: per ADR-0011 §3
# this yaml is preserved through the revert as a regression-
# detection sanity check; numbers are still trap-time, not
# completion-time. Honest replacement happens at Phase 6
# honest-close (work item 6.H per ADR-0012 §6) when 6.E lifts
# enough fixtures into the completion bucket. Until then,
# treat the entries below as a frozen pre-revert baseline.

