# bench/results/history.yaml — append-only per-phase-boundary
# benchmark records.
#
# Migrated to this path 2026-05-04 per §9.6 / 6.H + ADR-0012 §7
# (was `bench/baseline_v1_regression.yaml` + `bench/history.yaml`,
# now superseded). Layout convention:
#
#   bench/results/recent.yaml   — gitignored, rolling per-commit
#   bench/results/history.yaml  — committed, append-only, phase
#                                 boundaries only
#
# Schema (per entry):
#   - date: <ISO 8601 UTC>
#     commit: <full SHA>
#     arch: aarch64-darwin | x86_64-linux | x86_64-windows
#     reason: "<phase-tag>: <one-line>"
#     runs: <int>
#     warmup: <int>
#     benches:
#       - name: <bench-name>
#         median_ms: <float>      # preferred (P50)
#         mean_ms: <float>        # legacy entries
#         stddev_ms: <float>
#         min_ms: <float>
#         max_ms: <float>
#
# This file is append-only (ROADMAP §A9). Rows are added by
# scripts/record_merge_bench.sh and (Phase 13+) the GitHub Actions
# bench-record job. Never edit historical rows.
#
# **Status (2026-05-04 / Phase 6 reopen revert + 6.H migration)**:
# the entry below is the pre-revert baseline preserved through
# the Phase 6 reopen per ADR-0011 §3. Numbers are still trap-time,
# not completion-time, so they document a frozen-in-time signal
# rather than a runnable regression floor. The "Phase 6 close
# baseline" entry (post-6.E completion-bucket lift) lands at
# Phase 11+ when scripts/run_bench.sh + record_merge_bench.sh
# finish their stub→hyperfine wiring (currently their TODO p11
# markers).

