# Skip-impl one-way ratchet history — ADR-0050 amend (D-3 / D-4).
#
# Append one row per chunk-close commit. `scripts/check_skip_impl_ratchet.sh`
# (skeleton at this seed; completed in §9.12-A) reads this file at pre-push
# time and FAILs the push if the current commit's skip-impl count is
# strictly greater than the most recent committed row, unless an `exempt`
# field cites an Accepted ADR.
#
# Schema (per row):
#   commit:                  git SHA of the chunk-close commit (or "(baseline)")
#   timestamp:               ISO-8601 (UTC)
#   non_simd_skip_impl:      integer; `spec_assert_runner_non_simd` manifest skip-impl
#   simd_skip_impl:          integer; `simd_assert_runner` manifest skip-impl
#   total:                   non_simd_skip_impl + simd_skip_impl (manifest sum)
#   runtime_debt_trackable:  integer; ADR-0078 class `debt-trackable` SKIP-* count
#   runtime_adr_required:    integer; ADR-0078 class `ADR-required` SKIP-* count
#   runtime_internal:        integer; ADR-0078 class `runner-internal` SKIP-* count
#                            (informational; never gates)
#   note:                    short human note (optional)
#   exempt:                  ADR-NNNN slug if this row legitimately increases
#                            the count (must reference an Accepted ADR)
#
# Gate semantics (per ADR-0078 / D-155 part 1):
#   gated_total = total + runtime_debt_trackable + runtime_adr_required
# Per-class runtime fields are missing on pre-D-155-part-1 rows; the script
# defaults them to 0 for backward compat.
#
# Phase 9 completion master plan §7.3 + ADR-0050 (Amend; D-3 / D-4 pending
# §9.12 collab Accept).

